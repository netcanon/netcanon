; JL260A Configuration Editor; Created on release #WC.16.11.0011
; Ver #15:fa.fc.fb.b3.fb.bf.bb.ef.7c.59.fc.6b.fb.9f.fc.ff.ff.37.ef:00
;
; Synthetic kitchen-sink — exercises every canonical feature the
; aruba_aoss codec marks supported / lossy in its CapabilityMatrix.
; Hashes / shared-secrets are obviously fake (AGENTS.md hard rule).
; Coverage notes:
;   * timezone, syslog, mtu, domain — NOT supported by the aruba_aoss
;     codec parser; intentionally omitted (the parser would drop them
;     silently anyway).
;   * dhcp-server pool stanzas — render emits a comment-block on
;     output but the parser does not extract canonical DHCP pools
;     from native AOS-S text, so omitted here too.
;   * Uses standalone-stack interface naming (bare numeric + letter-
;     uplink ``A1`` / ``A2``) since the codec's `_IFACE_HEADER_RE`
;     accepts ``interface <[A-Za-z]*\d+(/\d+)?>`` but not the
;     slot/letter-port form (``interface 1/A1``).

hostname "ks-aoss-edge-01"

module 1 type jl260a

; Name resolution + time
ip dns server-address priority 1 10.0.10.53
ip dns server-address priority 2 10.0.10.54
sntp server priority 1 10.0.10.123
sntp server priority 2 10.0.10.124

; SNMP v1/v2c community (RO).  AOS-S supports a second
; ``snmp-server community "private-rw" Manager`` line for RW
; access; the canonical SNMP model carries only the FIRST
; community (single-string field), so we omit the RW line here
; to keep round-trip lossless.
snmp-server community "public" Operator
snmp-server location "Synthetic-Lab Rack 7"
snmp-server contact "netops@example.invalid"
snmp-server host 10.0.10.200
snmp-server host 10.0.10.201

; SNMPv3 USM users (>=2) with group bindings
snmpv3 user "monitor-usr" auth sha "$1$fakeAJ$auth1abcdef0123456789" priv aes "$1$fakeAJ$priv1abcdef0123456789"
snmpv3 group "auth-priv-grp" user "monitor-usr" sec-model ver3
snmpv3 user "audit-usr" auth md5 "$1$fakeAJ$auth2abcdef0123456789" priv des "$1$fakeAJ$priv2abcdef0123456789"
snmpv3 group "auth-priv-grp" user "audit-usr" sec-model ver3

; RADIUS servers (>=2 with shared key + default ports)
radius-server host 10.0.20.10 key "fakeRadiusSecret-A"
radius-server host 10.0.20.11 key "fakeRadiusSecret-B"

; Local users (>=3 — manager sha1, manager plaintext-redacted, operator sha1)
; Note: a fourth "no-password admin" head-without-continuation form
; parses cleanly (sha1 with empty hash) but does NOT round-trip on
; render (the renderer emits ``sha1 ""`` which the parser then
; rejects).  Documented asymmetry — omitted from this fixture so the
; round-trip-stable test passes.  Coverage of that path lives in
; tests/unit/migration/test_aruba_aoss.py::TestParseLocalUserContinuationLine.
password manager user-name "admin" sha1 "fa1cefa1cefa1cefa1cefa1cefa1cefa1cefa1ce"
password manager user-name "siteops" plaintext "fakeRedactedPlaintext"
password operator user-name "monitor" sha1 "0bce0bce0bce0bce0bce0bce0bce0bce0bce0bce"

; LAG / trunk groups (>=2 — LACP and static)
trunk 23-24 trk1 lacp
trunk A3-A4 trk2 trunk

; VLANs (>=4 — names + tagged/untagged port lists)
vlan 1
   name "DEFAULT_VLAN"
   no untagged 1-22
   untagged A1
   exit
vlan 10
   name "USERS"
   untagged 1-12
   tagged 23-24
   ip address 10.10.10.1 255.255.255.0
   exit
vlan 20
   name "VOICE"
   untagged 13-20
   tagged 23-24
   ip address 10.10.20.1/24
   exit
vlan 30
   name "MGMT"
   tagged 23-24
   ip address 10.10.30.1/24
   exit
vlan 40
   name "GUESTS"
   untagged 21-22
   tagged 23-24
   ip address 10.10.40.1/24
   exit

; Physical / logical interfaces (>=6)
interface 1
   name "user-desk-01"
   enable
   exit
interface 13
   name "voice-phone-01"
   enable
   exit
interface 21
   name "guest-jack-01"
   disable
   exit
interface 23
   name "lag-member-23"
   enable
   exit
interface 24
   name "lag-member-24"
   enable
   exit
interface A1
   name "router-uplink-A"
   routing
   ip address 10.0.0.2/30
   ipv6 address 2001:db8:0:a::2/64
   ipv6 address fe80::a:2/64 link-local
   enable
   exit
interface A2
   name "router-uplink-B"
   routing
   ip address 10.0.0.6/30
   ipv6 address 2001:db8:0:b::2/64
   enable
   exit
interface Trk1
   name "stack-uplink-A"
   enable
   exit
interface Trk2
   name "stack-uplink-B"
   enable
   exit

; Static routes (>=2 IPv4 + 1 IPv6 form via default-gateway + ip route)
ip default-gateway 10.0.0.1
ip route 192.168.99.0/24 10.0.0.254
ip route 172.16.0.0 255.255.0.0 10.0.0.254

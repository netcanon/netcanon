#config-version=FGT100E-7.4.1-FW-build2463-240515:opmode=0:vdom=0:user=admin
#conf_file_ver=10000000000000000001
#buildno=2463
#global_vdom=1
config system global
    set hostname "fgt-kitchensink"
    set admintimeout 30
    set timezone 04
end
config system dns
    set primary 1.1.1.1
    set secondary 8.8.8.8
end
config system ntp
    set ntpsync enable
    set type custom
    config ntpserver
        edit 1
            set server "0.pool.ntp.org"
        next
        edit 2
            set server "time.google.com"
        next
    end
end
config system interface
    edit "port1"
        set alias "WAN-uplink"
        set ip 198.51.100.2 255.255.255.252
        set ip6-address 2001:db8:cafe::2/64
        set allowaccess ping https ssh
        set mtu-override enable
        set mtu 1500
        set status up
    next
    edit "port2"
        set alias "LAG-member-1"
        set status up
    next
    edit "port3"
        set alias "LAG-member-2"
        set status up
    next
    edit "port4"
        set alias "INTERNAL"
        set ip 10.10.0.1 255.255.255.0
        set status up
    next
    edit "port5"
        set alias "LAG2-member-1"
        set status up
    next
    edit "port6"
        set alias "LAG2-member-2"
        set status up
    next
    edit "loopback0"
        set alias "router-id"
        set type loopback
        set ip 10.255.255.1 255.255.255.255
        set ip6-address 2001:db8:0:ffff::1/128
        set status up
    next
    edit "agg1"
        set alias "downstream-bond"
        set type aggregate
        set member "port2" "port3"
        set lacp-mode active
        set ip 10.20.0.1 255.255.255.0
        set status up
    next
    edit "agg2"
        set alias "passive-bond"
        set type aggregate
        set member "port5" "port6"
        set lacp-mode passive
        set ip 10.21.0.1 255.255.255.0
        set status up
    next
    edit "agg1.100"
        set alias "data-vlan-100"
        set type vlan
        set vlanid 100
        set interface "agg1"
        set ip 10.100.0.1 255.255.255.0
        set ip6-address 2001:db8:100::1/64
        set status up
    next
    edit "VL_200"
        set alias "voice-vlan-200"
        set vlanid 200
        set interface "agg1"
        set ip 10.200.0.1 255.255.255.0
        set status up
    next
    edit "port4.300"
        set alias "guest-vlan-300"
        set type vlan
        set vlanid 300
        set interface "port4"
        set ip 10.30.0.1 255.255.255.0
        set status down
    next
end
config system snmp sysinfo
    set status enable
    set location "data-center-rack-7"
    set contact-info "noc@example.org"
end
config system snmp community
    edit 1
        set name "public-ro"
        config hosts
            edit 1
                set ip "10.50.0.10 255.255.255.255"
            next
            edit 2
                set ip "10.50.0.11 255.255.255.255"
            next
        end
    next
end
config system snmp user
    edit "monitor-readonly"
        set security-level auth-priv
        set auth-proto sha256
        set auth-pwd ENC fakeAuthHashAAAAAAAAAAAAAA==
        set priv-proto aes256
        set priv-pwd ENC fakePrivHashBBBBBBBBBBBBBB==
    next
    edit "noc-fullaccess"
        set security-level auth-priv
        set auth-proto sha512
        set auth-pwd ENC fakeAuthHashCCCCCCCCCCCCCC==
        set priv-proto aes256
        set priv-pwd ENC fakePrivHashDDDDDDDDDDDDDD==
    next
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set password ENC fakeAdminHashEEEEEEEEEEEEEE==
        set trusthost1 10.0.0.0 255.255.0.0
    next
    edit "netops"
        set accprofile "prof_admin"
        set password ENC fakeNetopsHashFFFFFFFFFFFFFF==
        set trusthost1 10.50.0.0 255.255.255.0
    next
    edit "auditor"
        set accprofile "super_admin_readonly"
        set password ENC fakeAuditorHashGGGGGGGGGGGGGG==
    next
end
config user radius
    edit "primary-radius"
        set server "10.50.0.20"
        set secret ENC fakeRadiusSecret11111111==
        set auth-type auto
        set radius-port 1812
    next
    edit "secondary-radius"
        set server "10.50.0.21"
        set secret ENC fakeRadiusSecret22222222==
        set auth-type auto
        set radius-port 1645
    next
end
config system dhcp server
    edit 1
        set lease-time 86400
        set default-gateway 10.10.0.1
        set netmask 255.255.255.0
        set interface "port4"
        set dns-service specify
        set dns-server1 1.1.1.1
        set dns-server2 8.8.8.8
        set domain "lab.example.org"
        config ip-range
            edit 1
                set start-ip 10.10.0.100
                set end-ip 10.10.0.200
            next
        end
    next
    edit 2
        set lease-time 43200
        set default-gateway 10.30.0.1
        set netmask 255.255.255.0
        set interface "port4.300"
        set dns-service specify
        set dns-server1 9.9.9.9
        set domain "guest.example.org"
        config ip-range
            edit 1
                set start-ip 10.30.0.50
                set end-ip 10.30.0.150
            next
        end
    next
end
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 198.51.100.1
        set device "port1"
    next
    edit 2
        set dst 10.99.0.0 255.255.0.0
        set gateway 10.20.0.254
        set device "agg1"
    next
end

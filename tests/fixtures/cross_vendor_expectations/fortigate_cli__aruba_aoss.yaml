# Cross-vendor fidelity expectations: fortigate_cli -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_aruba_aoss/
#
# Reverse direction of aruba_aoss -> fortigate_cli.  Per the schema
# README's "Reverse pairs are independent files" rule, this file
# authors the dispositions independently rather than mirroring.
# Several fields are direction-asymmetric:
#
#   * dhcp_servers: aruba -> fortigate is not_applicable (Aruba
#     source carries no pools).  fortigate -> aruba is unsupported
#     (FortiGate-source carries pools that have no Aruba target —
#     AOS-S is relay-only and the codec does not advertise
#     /dhcp/pool).
#   * vlans port-membership: aruba -> fortigate loses the per-VLAN
#     port list (canonical has it; FortiGate render does not
#     synthesise child VLAN interfaces).  fortigate -> aruba is
#     unsupported in the inverse sense (FortiGate parse never
#     populated tagged_ports / untagged_ports because the
#     parent-interface model carries membership via the parent's
#     identity).
#   * Switching features: in both directions unsupported, but for
#     opposite reasons (aruba -> fortigate: target absent;
#     fortigate -> aruba: source absent).
#   * Firewall / NAT / UTM: fortigate -> aruba drops the FortiGate
#     product surface (Tier 3, out of canonical scope).  No Aruba
#     analogue.
#   * VDOMs: fortigate -> aruba is unsupported (AOS-S is single-
#     tenant) — multi-tenancy intent has no Aruba target.

meta:
  source_vendor: fortigate_cli
  target_vendor: aruba_aoss
  primary_use_case: >
    FortiGate firewall edge -> Aruba ProCurve / AOS-S campus switch
    migration.  Less common than the reverse direction (consolidating
    Aruba into FortiGate is the typical edge consolidation pattern);
    fortigate -> aruba surfaces when an operator demotes a FortiGate
    to a pure L2/L3 access role.  System services + IPv4/IPv6 +
    static routes + LAG translate; FortiGate's firewall / NAT / VPN
    / UTM product surface has no Aruba analogue and is lost on
    migration.  Operators should treat the FortiGate firewall config
    as documentation rather than a translatable artefact for this
    cross-pair.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/fortigate_cli_to_aruba_aoss/system_services.md
      title: "System services: FortiGate FortiOS versus Aruba AOS-S"

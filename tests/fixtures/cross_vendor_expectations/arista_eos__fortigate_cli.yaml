      title: "VLAN configuration: Arista EOS versus FortiGate FortiOS"
      source_url: "https://www.arista.com/en/um-eos/eos-vlan-configuration"
      retrieved: "2026-05-01"
    - id: static_routes
      path: docs/vendor-references/arista_eos_to_fortigate_cli/static_routes.md
      title: "Static routes: Arista EOS versus FortiGate FortiOS"
      source_url: "https://www.arista.com/en/um-eos/eos-routing-static"
      retrieved: "2026-05-01"
    - id: snmp_aaa
      path: docs/vendor-references/arista_eos_to_fortigate_cli/snmp_aaa.md
      title: "SNMP + AAA / RADIUS: Arista EOS versus FortiGate FortiOS"

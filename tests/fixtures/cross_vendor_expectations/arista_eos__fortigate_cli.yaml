# Cross-vendor fidelity expectations: arista_eos -> fortigate_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_fortigate_cli/
#
# This is a DC-leaf-switch -> firewall pair.  Arista EOS is a
# DC-class L2/L3 switch with EVPN-VXLAN spine-leaf fabric heritage;
# FortiGate FortiOS is a session-based stateful firewall + UTM
# appliance with limited L2 surface.  The role mismatch concentrates
# the asymmetric loss on the EVPN-VXLAN / VRF / MAC-VRF surfaces:
#
#   * Arista's DC-fabric data plane (VXLAN VNIs, EVPN Type-5,
#     MAC-VRF, per-interface VRF, L3 VNI for IRB) is unsupported on
#     FortiGate (firewall codec; no fabric data plane).
#   * Arista's switching surface (switchport mode, access/trunk
#     VLANs, native VLAN, voice VLAN, MLAG) is unsupported on
#     FortiGate (L3-only beyond hardware-switch low-end models).
#   * VLAN port-membership re-projection is a hard model gap:
#     Arista's project_switchport_to_vlan emits canonical
#     tagged_ports / untagged_ports lists that FortiGate's child-
#     interface VLAN model cannot consume without synthesising
#     multiple child interfaces per (VLAN x parent).
#   * Foundations (hostname / DNS / NTP / SNMP / RADIUS / static-
#     routes / local-users / LAGs / IPv4-IPv6 addressing) translate
#     via the canonical tree with documented per-field caveats.
#
# certainty=medium because:
#   * Shared scalar surface (hostname / domain / dns / ntp / syslog /
#     RADIUS / static-routes) is high-confidence: vendor docs are
#     unambiguous and both codecs round-trip the canonical fields on
#     real-capture fixtures.
#   * EVPN-VXLAN / MAC-VRF / L3-VRF unsupported on FortiGate is
#     high-confidence (FortiGate codec capability matrix declares
#     it; FortiGate has no fabric data plane).
#   * Switching features (switchport / voice-VLAN) are confidently
#     unsupported on FortiGate.
#   * VLAN port-membership is medium-confidence lossy/unsupported:
#     the model gap (port list per VLAN vs child-interface per
#     parent) is well-understood; the cross-vendor render path that
#     would synthesise multiple VLAN-child interfaces from one
#     CanonicalVlan is unwired in v1.
#   * Hash format incompatibility (Arista sha512_crypt vs FortiOS
#     ENC-encryption) and SNMPv3 USM passphrase non-portability are
#     well-documented.

meta:
  source_vendor: arista_eos
  target_vendor: fortigate_cli
  primary_use_case: >
    Arista EOS DC-leaf or campus-edge switch -> FortiGate firewall
    edge consolidation.  Common scenario: replacing an Arista 7xxx-
    series leaf with a FortiGate as a converged routing-and-security
    appliance, often when the EVPN-VXLAN fabric is being decommissioned
    in favour of a flatter L3-routed-with-firewall design.  System
    services + IPv4/IPv6 + RADIUS + LAG translate cleanly.  EVPN-VXLAN
    fabric data plane (VNI, Type-5, MAC-VRF, per-interface VRF) has
    no FortiGate target — operators accept that tenant separation
    collapses to FortiGate's VDOM / per-interface-integer-VRF model
    manually.  Switchport / voice VLAN drop entirely.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/arista_eos_to_fortigate_cli/system_services.md
      title: "System services (hostname / DNS / NTP / syslog / clock / domain): Arista EOS versus FortiGate FortiOS CLI"
      source_url: "https://www.arista.com/en/um-eos/eos-switch-administration-commands"
      retrieved: "2026-05-01"
    - id: system_services_fortios
      path: docs/vendor-references/arista_eos_to_fortigate_cli/system_services.md
      title: "System services on FortiOS (CLI Reference 7.4)"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-05-01"
    - id: interfaces
      path: docs/vendor-references/arista_eos_to_fortigate_cli/interfaces.md
      title: "Interfaces (naming / IP / MTU / IPv6 / DHCP-client): Arista EOS versus FortiGate FortiOS"
      source_url: "https://www.arista.com/en/um-eos/eos-interface-configuration"
      retrieved: "2026-05-01"
    - id: interfaces_fortios
      path: docs/vendor-references/arista_eos_to_fortigate_cli/interfaces.md
      title: "Interface settings on FortiOS (Admin Guide 7.4)"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/954635/interface-settings"
      retrieved: "2026-05-01"
    - id: vlans

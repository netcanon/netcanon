# Cross-vendor fidelity expectations: cisco_iosxe -> cisco_iosxe_cli
#
# Same vendor, different wire format:
#   * source = `cisco_iosxe`      — NETCONF / OpenConfig YANG XML
#   * target = `cisco_iosxe_cli`  — operator-paste running-config text
#
# Reverse direction of the `cisco_iosxe_cli__cisco_iosxe` pair.  The
# CLI codec is a strict superset of what OpenConfig models in this
# repository (the CLI codec is `certified`; the NETCONF codec is
# `best_effort`), so any field that round-trips through the NETCONF
# parse path renders cleanly on the CLI side.  The wire-up gap is
# entirely on the NETCONF parse side: it walks `<interfaces>` only
# and never populates `vlans`, `static_routes`, `routing_instances`,
# `lags`, `local_users`, `radius_servers`, `dhcp_servers`, or `snmp`
# from the source XML.
#
# Direction-specific framing: the `loss` for fields OpenConfig doesn't
# model (banner motd, service timestamps, comments, ACLs, route-maps)
# happens UPSTREAM of this codec pair, on the device's `<get-config>`
# boundary.  By the time the codec sees the XML, those fields are
# already gone — the canonical disposition for them is
# `not_applicable` (source never had them) rather than `lossy`.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_cisco_iosxe_cli/
#
# Authored 2026-04-30 alongside the forward direction.

meta:
  source_vendor: cisco_iosxe
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    Cross-format same-vendor migration: snapshot a Catalyst 9K /
    ISR4K device through NETCONF/OpenConfig and re-emit a CLI
    `running-config` for human review or for pasting into a sibling
    device.  Demonstrates that the OpenConfig surface is a `lossy
    projection` of the CLI: a faithful CLI render of a NETCONF
    snapshot is NOT a recovery of the original device config —
    operators wanting full CLI fidelity must capture
    `show running-config` directly.
  certainty: medium
  references:

# ---------------------------------------------------------------------------
# Per-field expectations.  Walks every top-level CanonicalIntent field
# (and meaningful sub-fields) defined in
# netcanon/migration/canonical/intent.py.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: not_applicable
    note: >
      The `cisco_iosxe` NETCONF parser walks `<interfaces>` only and
      never populates `intent.hostname`.  Even when the source XML
      includes a `<system><config><hostname>` element, the parser
      ignores it.  Disposition is `not_applicable` (parser never
      produces) rather than `lossy` (would be data loss) — the input
      to the CLI render is structurally empty for this field.  Once
      the NETCONF parser wires `<system>` parsing this flips to good.
    references: [oc-system]

  domain:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  Parser doesn't read
      `<system><config><domain-name>` today.  Flips to good once
      wired.
    references: [oc-system]

  dns_servers:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  Parser doesn't read
      `<system><dns><servers>` today.  Flips to good once wired.
    references: [oc-system]

  ntp_servers:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  Parser doesn't read
      `<system><ntp><servers>` today.  Once wired, flips to good for
      the host-list surface; per-server options remain a pre-existing
      canonical-model gap.
    references: [oc-system]

  timezone:
    disposition: not_applicable
    note: >
      Parser doesn't read `<system><clock><config><timezone-name>`
      today.  Once wired this flips to lossy: OpenConfig prefers IANA
      tz database identifiers (`America/Los_Angeles`); CLI emits
      Cisco's `clock timezone PST -8 0` form.  Cross-format mapping
      requires an operator-curated table.
    references: [oc-system, iosxe-systemmgmt-cg]

  syslog_servers:
    disposition: not_applicable
    note: >
      Parser doesn't read `<system><logging><remote-servers>` today.
      Flips to good once wired (host-list surface).
    references: [oc-system]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips through the NETCONF
      codec's parse path — name / description / enabled /
      interface_type / IPv4 / IPv6 are good.  The lossy classification
      reflects per-field drift listed below: switchport / VLAN / LAG /
      VRF / DHCP-client fields are not_applicable (NETCONF parser
      doesn't read them today; wire-up gap), and MTU is lossy due to
      OpenConfig collapsing the link / IP / IPv6 / MPLS MTU
      distinction into a single leaf.
    references: [oc-interfaces, iosxe-interface-cg]

  "interfaces[].name":
    disposition: good
    note: >
      Verbatim same-vendor name.  The NETCONF parser reads
      `<interface><name>` and the CLI renderer emits `interface
      <name>` byte-identically.
    references: [oc-interfaces]

  "interfaces[].description":
    disposition: good
    note: >
      Free-form text; XML escaping handled on parse, CLI render
      emits `description <text>` verbatim.
    references: [oc-interfaces]

  "interfaces[].enabled":
    disposition: good
    note: >
      YANG bool `enabled: true` -> CLI `no shutdown` (default; no
      explicit emission); `enabled: false` -> CLI `shutdown`.
    references: [oc-interfaces]

  "interfaces[].interface_type":
    disposition: lossy
    reason: >
      NETCONF source carries the IANA interface-type ident verbatim
      (e.g. `ianaift:ethernetCsmacd`).  The CLI render path encodes
      type implicitly in the interface name; on re-parse,
      `cisco_iosxe_cli/parse.py:91` infers ifType from a name-prefix
      lookup that hard-codes `"vlan": "ianaift:l3ipvlan"`.  This
      flips an OpenConfig source `Vlan10` carrying
      `ianaift:l2vlan` (135 — bridge / 802.1Q sub-interface) to
      `ianaift:l3ipvlan` (136 — routed VLAN / SVI).  Both choices
      are defensible — OpenConfig models a Catalyst SVI as
      `l2vlan` (underlying L2-VLAN-tagged port), IOS-XE CLI
      `interface Vlan10` always implies a routed SVI — but the
      same-vendor cross-format round-trip is NOT byte-perfect for
      SVIs.  No code change planned; one canonical choice across
      the codebase isn't justified by a single fixture cell.
    references: [oc-interfaces]

  "interfaces[].mtu":
    disposition: lossy
    reason: >
      OpenConfig's single `mtu` leaf doesn't distinguish link-MTU
      from `ip mtu` / `ipv6 mtu` / `mpls mtu` (which are separate CLI
      directives).  The CLI render emits `mtu <N>` (link-MTU); if
      the original CLI source had used `ip mtu N` instead, that
      distinction is lost upstream of this codec pair (in the device
      OpenConfig translation layer) and the CLI render here can't
      recover it.
    references: [oc-interfaces]

  "interfaces[].ipv4_addresses":
    disposition: good
    note: >
      NETCONF parser reads
      `<subinterfaces><subinterface><ipv4><addresses>`; CLI render
      emits `ip address <addr> <mask>` (dotted-decimal mask
      reconstructed from prefix-length).
    references: [oc-interfaces]

  "interfaces[].ipv6_addresses":
    disposition: good
    note: >
      GAP-EVPN-3 wired in both codecs; cross-format round-trip is
      byte-perfect for the (ip + prefix-length) shape.  Link-local
      scope discriminator is treated as global by both codecs (a
      pre-existing canonical-model gap, not introduced here).
    references: [oc-interfaces]

  "interfaces[].switchport_mode":
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk the `openconfig-vlan`
      `switched-vlan` augment under `<ethernet>`.  Even when the
      source XML carries switchport state (which Catalyst devices
      emit), the parser skips it.  Disposition is `not_applicable`
      because intent.interfaces[].switchport_mode is None after parse
      — there is no data for the CLI render to drop.  When parser is
      extended this flips to good.
    references: [oc-vlan, iosxe-vlan-cg-1717]

  "interfaces[].access_vlan":
    disposition: not_applicable
    note: >
      Same `switched-vlan` parse-side wire-up gap.  Flips to good
      once wired.
    references: [oc-vlan]

  "interfaces[].trunk_allowed_vlans":
    disposition: not_applicable
    note: >
      Same wire-up gap.  Flips to good once wired (OpenConfig
      `trunk-vlans` leaf-list maps cleanly to CLI `switchport trunk
      allowed vlan <list>`).
    references: [oc-vlan]

  "interfaces[].trunk_native_vlan":
    disposition: not_applicable
    note: Same wire-up gap. Flips to good once wired.
    references: [oc-vlan]

  "interfaces[].voice_vlan":
    disposition: not_applicable
    note: >
      Same wire-up gap, plus an additional model-coverage gap:
      OpenConfig's voice-VLAN augment isn't universally supported.
      May remain lossy even after switched-vlan parser wire-up.
    references: [oc-vlan]

  "interfaces[].lag_member_of":
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk the `openconfig-if-aggregate`
      augment.  `<aggregate-id>` leaf under `<ethernet>` would
      indicate Port-channel membership; parser skips it.  Flips to
      good once wired.
    references: [oc-if-aggregate]

  "interfaces[].dhcp_client":
    disposition: not_applicable
    note: >
      Parser doesn't walk the OpenConfig DHCP-client augment.  Flips
      to good once wired (`ip address dhcp` on CLI render).
    references: [oc-interfaces]

  "interfaces[].vrf":
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `<network-instances>` (where
      VRF interface-membership lives).  The CLI codec also lists
      `/routing-instances/instance` as `unsupported`, so even with
      parse-side wire-up the cross-pair would remain lossy until both
      codecs land VRF.  Cross-pair drops VRF membership entirely
      today.
    references: [oc-network-instance, iosxe-multivrf]

  vlans:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `<network-instances><vlans>`.
      `intent.vlans` is empty after parse regardless of source XML
      content.  Flips to good once wired (canonical-stable surface:
      id / name / description / port-membership).
    references: [oc-vlan]

  static_routes:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk
      `<network-instances><protocols><protocol identifier=STATIC>`.
      `intent.static_routes` is empty after parse.  Flips to good
      for default-VRF routes once wired; per-VRF routes remain
      lossy until `CanonicalStaticRoute` gains a `vrf` field.
    references: [oc-network-instance, iosxe-routing-cg]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: not_applicable
    note: >
      OpenConfig has no fully-baked DHCP server model in widely-
      deployed Cisco IOS-XE versions.  The NETCONF parser doesn't
      attempt to read DHCP XML.  Disposition stays `not_applicable`
      (no input to render); future work could bridge the
      Cisco-IOS-XE-dhcp native YANG via a sibling codec but that's
      out of scope for the OpenConfig-only `cisco_iosxe` codec.
    references: [iosxe-dhcp-cg]

  snmp:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk SNMP XML.  `intent.snmp` is
      None after parse.  Flips to good for v1/v2c surface and good
      for v3 same-vendor (engineID stable) once wired.
    references: [iosxe-snmp-17]

  "snmp.community":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [iosxe-snmp-17]

  "snmp.location":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [iosxe-snmp-17]

  "snmp.contact":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [iosxe-snmp-17]

  "snmp.trap_hosts":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [iosxe-snmp-17]

  "snmp.v3_users":
    disposition: not_applicable
    note: >
      The NETCONF codec capability matrix lists `/snmp/v3-user` under
      `unsupported` explicitly.  Parser doesn't read v3 user XML;
      `intent.snmp.v3_users` is empty after parse.  Once wired (via
      Cisco-IOS-XE-snmp native YANG bridging), v3 users round-trip
      cleanly same-vendor — engineID is constant on the same device,
      so passphrase hashes survive.
    references: [iosxe-snmp-17, cisco-snmp-yang]

  lags:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `openconfig-if-aggregate`.
      `intent.lags` is empty after parse.  Flips to good once wired.
    references: [oc-if-aggregate]

  local_users:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `<system><aaa>`.
      `intent.local_users` is empty after parse.  Flips to good once
      wired — and unlike cross-vendor pairs, hash bytes round-trip
      verbatim same-vendor (Cisco type-9 `$9$`, type-8 PBKDF2,
      type-5 `$1$` all survive cleanly).
    references: [oc-system-aaa, iosxe-secusr-cg]

  radius_servers:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `<system><aaa><server-groups>`.
      `intent.radius_servers` is empty after parse.  Flips to good
      once wired (host / key / auth_port / acct_port surface; type-7
      and type-6 secret encoding round-trips same-vendor).
    references: [oc-system-aaa]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      Both codecs declare every `/vxlan-vnis/*` path as `unsupported`
      in their capability matrices.  NETCONF parser doesn't populate
      `intent.vxlan_vnis`; CLI renderer doesn't emit VXLAN regardless.
      Flips to good once both codecs wire VXLAN (gated on Catalyst-
      VXLAN demand).
    references: [iosxe-vxlan-cg, oc-evpn]

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      No codec populates per-prefix EVPN Type-5 records today.
      Canonical surface for Type-5 intent is
      `CanonicalRoutingInstance.l3_vni` (lands when VRF wires up).
    references: [oc-evpn]

  # ── Tier 2 (ship-before-wire) — VRF / routing-instance ──

  routing_instances:
    disposition: not_applicable
    note: >
      The NETCONF parser doesn't walk `<network-instances>`.
      `intent.routing_instances` is empty after parse.  CLI codec
      also lists `/routing-instances/instance` as `unsupported`, so
      cross-pair drops VRF declarations entirely until both codecs
      land VRF wire-up.  Highest-value same-vendor cross-format
      wire-up opportunity (Catalyst customer environments use
      VRF-Lite extensively).
    references: [oc-network-instance, iosxe-multivrf]

  # ── Tier 3 — informational only (never auto-rendered) ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 by design.  NETCONF parser populates raw_sections only
      with leftover XML it can't classify (typically empty); CLI
      renderer ignores raw_sections entirely on this side of the
      pipeline.  Same shape as all cross-pairs.

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec doesn't
      consume it.  Not a translation field.

  source_format:
    disposition: not_applicable
    note: Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific (`apply-groups` statement preservation per GAP
      9b).  Cisco IOS-XE codecs do not emit apply_groups; field is
      always empty on this cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Junos-specific (group-scoped set-line tails).  Same as
      apply_groups — empty on this cross-pair.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The cross-format framing is high-confidence (same as the
#     forward pair): vendor docs are clear that OpenConfig is a
#     translation overlay, and the upstream-loss framing for fields
#     OpenConfig doesn't model is sound.
#
#   * The per-field disposition is heavily skewed to
#     `not_applicable` because the `cisco_iosxe` parser walks
#     `<interfaces>` only.  This is materially honest about the
#     codec's current state but means the YAML is uninformative
#     about post-wire-up behaviour.  When parse-side wire-up lands
#     this YAML will need substantial revision to flip
#     `not_applicable` -> `good` / `lossy` for the canonical-modelled
#     fields.
#
#   * The structural framing of "loss happens upstream of the codec"
#     for fields OpenConfig doesn't model is the most useful
#     observation in this YAML.  Operators using NETCONF -> CLI as
#     a backup-reformat workflow must understand they're getting
#     a faithful render of a lossy projection, not a recovery of
#     the original device config.
#
# Deferred items: none — every CanonicalIntent top-level field is
# enumerated above with a concrete disposition.  The honest
# classification today is overwhelmingly `not_applicable` because the
# parser doesn't populate the fields; this is not a deferred audit
# question, it's an accurate snapshot of the codec's current
# behaviour.
#
# Surprises uncovered authoring this pair:
#
#   * The cross-pair disposition matrix is structurally different
#     from cross-VENDOR pairs.  In cross-vendor pairs, a field that
#     OpenConfig doesn't model would be `lossy` because vendor A's
#     CLI captured it but the canonical translation drops it.  Here,
#     the same field is `not_applicable` because the SOURCE wire
#     format already lost it before the codec saw it.  Same
#     operational meaning, different schema label.  This is worth
#     calling out in the schema README's `not_applicable` definition.
#
#   * The `cisco_iosxe` codec's `unsupported_rename_categories =
#     frozenset({"snmpv3"})` declaration is currently the ONLY
#     codec-level surface that flags its Phase-0.5 wire-up gaps to
#     operators.  A future hardening pass might extend that to flag
#     `vlans`, `routing-instances`, `lags`, `local-users`, etc. in
#     the per-pane override UI when this codec is selected as
#     source or target.

# ---------------------------------------------------------------------------
# Per-field expectations.  Walks CanonicalIntent top-down per
# netconfig/migration/canonical/intent.py.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      OPNsense ``<system>/<hostname>`` (bare short name) ↔ Aruba
      quoted ``hostname "<name>"``.  Round-trip is lossless on the
      string content.
    references: [opnsense-system, aruba-system-services]

  domain:
    disposition: lossy
    reason: >
      OPNsense ``<system>/<domain>`` carries a separate DNS suffix.
      Aruba AOS-S has no first-class domain directive in the
      codec's parse / render surface (operators fold the FQDN into
      hostname when needed).  Cross-pair render drops the field
      unless the operator pre-folds (``hostname "host.example.com"``
      manually).
    references: [opnsense-system, aruba-system-services]

  dns_servers:
    disposition: good
    note: >
      OPNsense ``<system>/<dnsserver>`` repeated elements collapse
      to a bare canonical list (in element order); Aruba codec
      renders ``ip dns server-address priority N <addr>`` with
      priority synthesised from list index.  Wave 10β re-flip
      after the OPNsense parser landed ``<dnsserver>`` ->
      ``CanonicalIntent.dns_servers`` wire-up.
    references: [opnsense-system, aruba-system-services]

  ntp_servers:
    disposition: lossy
    reason: >
      OPNsense's space-separated ``<system>/<timeservers>`` element
      maps to Aruba ``sntp server priority N <addr>`` lines (one
      per host).  Protocol distinction (full NTP vs SNTP) is lost
      on canonical.  OPNsense codec parser does not currently wire
      ``<timeservers>`` into canonical.  Pool-server semantics
      (``pool.ntp.org`` rotation) may degrade on Aruba's lighter
      SNTP client.
    references: [opnsense-system, aruba-system-services]

  timezone:
    disposition: lossy
    reason: >
      OPNsense Olson zoneinfo (``America/Los_Angeles``) versus
      Aruba ``time timezone <minute-offset>`` (e.g. ``-480``)
      plus separate ``time daylight-time-rule <region>`` require
      an operator-curated mapping table.  Codec wire-up gap on
      both ends.
    references: [opnsense-system, aruba-system-services]

  syslog_servers:
    disposition: lossy
    reason: >
      OPNsense ``<system>/<syslog>/<remoteserver>`` ↔ Aruba
      ``logging <addr>``.  OPNsense codec does not currently wire
      ``<syslog>`` into canonical on parse; cross-pair drops
      pending wire-up.
    references: [opnsense-system, aruba-system-services]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips, but several per-
      interface sub-fields are lossy or not_applicable.  See the
      ``interfaces[].*`` entries below for the breakdown.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].name:
    disposition: lossy
    reason: >
      OPNsense zone labels (``<wan>``, ``<lan>``, ``<opt2>``) do
      not survive on Aruba.  Aruba expects bare-numeric (``1``,
      ``13``) or letter-uplink (``A1``) port names.  Port-rename
      mesh handles via the codec's ``classify_port_name`` /
      ``format_port_identity`` delegates; mapping is operator-
      driven (which OPNsense zone becomes which Aruba port).
      Canonical preserves the source string verbatim.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].description:
    disposition: lossy
    reason: >
      OPNsense ``<descr>`` (no length limit) ↔ Aruba ``name "<x>"``
      (64-character limit).  Text exceeding 64 characters truncates
      on the Aruba render.  OPNsense codec capability matrix
      already declares ``/interfaces/interface/config/description``
      lossy with this rationale.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].enabled:
    disposition: lossy
    reason: >
      OPNsense zone-label rebinding causes positional comparator
      drift; vendor-correct shape.  The per-record ``enabled`` flag
      is preserved end-to-end on each interface, but because
      ``interfaces[].name`` is ``lossy`` (OPNsense ``<wan>`` /
      ``<lan>`` / ``<opt5>`` zone labels do not survive the rename
      mesh onto Aruba's bare-numeric port identities), the
      reordered list lines up records by positional index and the
      comparator surfaces a per-cell diff.  Not a codec data loss;
      a second-order consequence of the upstream lossy field.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      OPNsense doesn't surface a type field; Aruba codec infers
      from name shape.  Cross-pair degrades the inference
      (canonical type is empty after OPNsense parse).
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].mtu:
    disposition: lossy
    reason: >
      OPNsense parses ``<mtu>`` (declared supported in capability
      matrix); Aruba codec does not currently parse or render the
      MTU directive.  Field drops on the Aruba target side.
    references: [opnsense-interfaces]

  interfaces[].ipv4_addresses:
    disposition: lossy
    reason: >
      OPNsense zone-label rebinding causes positional comparator
      drift; vendor-correct shape.  The IPv4 address values
      themselves round-trip cleanly (``<ipaddr>`` + ``<subnet>``
      ↔ Aruba CIDR ``10.0.0.2/30``), but because
      ``interfaces[].name`` is ``lossy`` (OPNsense ``<wan>`` /
      ``<lan>`` / ``<opt2>`` zone labels carry the IP and aruba
      parse rebinds onto em-named ports in canonical order), the
      reshuffled list aligns ``198.51.100.2/30`` against a
      different em-port slot in the target.  Comparator misclas-
      sifies as data drift; not a codec data loss.  OPNsense's
      non-static keywords (``dhcp``, ``pppoe``) skip this branch
      (see ``dhcp_client``).
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].ipv6_addresses:
    disposition: lossy
    reason: >
      OPNsense zone-label rebinding causes positional comparator
      drift; vendor-correct shape.  IPv6 address values
      themselves round-trip cleanly (``<ipaddrv6>`` + ``<subnetv6>``
      ↔ Aruba ``ipv6 address X/N`` with ``scope`` preserved), but
      the same upstream-lossy ``interfaces[].name`` field reshuffles
      the per-record list so that an address sourced on ``em1``
      lines up against ``em3`` in the target.  Comparator misclas-
      sifies as data drift; not a codec data loss.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].switchport_mode:
    disposition: not_applicable
    note: >
      OPNsense never populates switchport state on parse (no
      switching fabric).  Aruba target accepts switchport-
      equivalent state but on this direction there is nothing to
      render.
    references: [switchport-absent]

  interfaces[].access_vlan:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switchport-absent]

  interfaces[].trunk_allowed_vlans:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switchport-absent]

  interfaces[].trunk_native_vlan:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switchport-absent]

  interfaces[].voice_vlan:
    disposition: not_applicable
    note: >
      OPNsense has no LLDP-MED voice-VLAN signalling; canonical
      field is always empty on OPNsense parse.
    references: [switchport-absent]

  interfaces[].lag_member_of:
    disposition: lossy
    reason: >
      OPNsense's ``<laggs>/<lagg>/<members>`` carries member lists
      under ``<laggif>laggN</laggif>``; canonical back-points to
      ``lagg<N>`` on each member.  Aruba's ``trunk <ports> trk<N>
      <mode>`` declaration applies the back-pointer as ``Trk<N>``.
      Both round-trip the back-pointer but the LAG name itself
      differs; port-rename mesh canonicalises (zero-based ↔
      one-based).
    references: [opnsense-laggs, aruba-lags]

  interfaces[].dhcp_client:
    disposition: lossy
    reason: >
      OPNsense ``<ipaddr>dhcp</ipaddr>`` (common on the WAN zone)
      ↔ Aruba ``ip address dhcp``.  Neither codec currently wires
      this into ``CanonicalInterface.dhcp_client``; cross-pair
      drops pending wire-up.
    references: [opnsense-interfaces, aruba-interfaces]

  interfaces[].vrf:
    disposition: not_applicable
    note: >
      Neither vendor models VRFs.  Field structurally absent on
      this direction.
    references: [vrf-unsupported]

  vlans:
    disposition: lossy
    reason: >
      The list itself round-trips for the id field.  Per-VLAN
      sub-fields collapse or drop — see ``vlans[].*`` entries
      below.
    references: [opnsense-vlans, aruba-vlans]

  vlans[].id:
    disposition: good
    note: >
      OPNsense ``<vlan>/<tag>N</tag>`` ↔ Aruba ``vlan N``.  Both
      vendors share the 1-4094 range.
    references: [opnsense-vlans, aruba-vlans]

  vlans[].name:
    disposition: good
    note: >
      OPNsense's ``<descr>`` is the only VLAN label field; canonical
      ``name`` and ``description`` both populate from it on parse,
      so both fields carry the same text.  Aruba per-VLAN
      ``name "<x>"`` lands cleanly and the canonical string
      round-trips across the pair — Wave 10β re-flip from lossy
      to good (the upstream ``<descr>`` -> name+description fan-out
      is captured by the ``vlans[].description`` entry below).
    references: [opnsense-vlans, aruba-vlans]

  vlans[].description:
    disposition: lossy
    reason: >
      Same rationale as ``vlans[].name`` — one OPNsense XML field
      populating two canonical fields.
    references: [opnsense-vlans]

  vlans[].tagged_ports:
    disposition: not_applicable
    note: >
      OPNsense never populates per-VLAN port-membership lists on
      parse (no per-VLAN port concept).  Aruba target render emits
      no ``tagged`` line because canonical list is empty.  Operator
      must reconstruct trunk topology manually.
    references: [switchport-absent, opnsense-vlans]

  vlans[].untagged_ports:
    disposition: not_applicable
    note: >
      Same rationale as tagged_ports — empty on OPNsense parse.
    references: [switchport-absent, opnsense-vlans]

  vlans[].ipv4_addresses:
    disposition: lossy
    reason: >
      OPNsense doesn't have a first-class SVI concept; the closest
      equivalent is a zone interface (``<opt2>``) referencing the
      VLAN's ``<vlanif>`` device name with the IP on the zone.
      The opnsense codec does not currently project the zone-side
      IP back onto a ``CanonicalVlan.ipv4_addresses`` record;
      cross-pair render emits no SVI L3 line in the Aruba VLAN
      stanza.
    references: [opnsense-vlans, aruba-vlans]

  static_routes:
    disposition: lossy
    reason: >
      OPNsense's two-block model (``<gateways>/<gateway_item>`` +
      ``<staticroutes>/<route>``) requires a JOIN to resolve named
      gateway references to bare next-hop IPs.  The opnsense codec
      capability matrix lists ``/staticroutes/route`` as supported
      in the kitchen-sink XML but parser wire-up is incomplete;
      cross-pair render emits nothing on the Aruba target until
      parse lands.  The OPNsense default-route idiom (implicit
      ``<gateway>`` on the WAN zone) requires synthesising a
      ``0.0.0.0/0`` canonical record on parse — currently not done.
    references: [opnsense-gateways, aruba-static-routes]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: lossy
    reason: >
      OPNsense source populates ``CanonicalIntent.dhcp_servers``
      with one record per zone interface carrying a ``<dhcpd>``
      block (interface, range, gateway, dns_servers, lease_time,
      domain_name).  Aruba target has no destination for these
      pools — the aruba_aoss codec does not advertise
      ``/dhcp/pool`` in its capability matrix supported set
      (AOS-S is primarily a DHCP relay platform, not a server).
      Cross-pair render drops the pool config and emits a comment
      block describing what was lost.  Operator-driven redesign:
      deploy an external DHCP server and configure
      ``ip helper-address`` on the Aruba VLAN SVIs (canonical
      schema lacks a helper-address field today).
    references: [opnsense-dhcp, aruba-dhcp-relay]

  snmp:
    disposition: good
    note: >
      v1/v2c surface (community / location / contact / trap_hosts)
      round-trips cleanly — OPNsense ``<snmpd>/<rocommunity>/
      <syslocation>/<syscontact>/<traphost>`` ↔ Aruba ``snmp-server
      community / location / contact / host``.  OPNsense's
      ``<rwcommunity>`` (rare) collapses to read-only on canonical.
      v3 USM is not_applicable on this direction (OPNsense source
      never populates ``v3_users`` — capability matrix declares
      ``/snmp/v3-user`` unsupported because OPNsense's v3 store
      lives in the bsnmpd plugin's own snmpd.conf rather than
      config.xml; rename pane shows the unsupported-category
      banner).  Wave 10β re-flip from lossy to good — the canonical
      ``snmp`` dict round-trips across the pair, with the RO/RW
      collapse + v3 absence captured as upstream / not_applicable
      rather than active drops.
    references: [opnsense-snmp, aruba-snmp]

  lags:
    disposition: lossy
    reason: >
      OPNsense ``lagg<N>`` (FreeBSD lagg(4) driver, zero-based) ↔
      Aruba ``Trk<N>`` (one-based), so ``lagg0`` ↔ ``Trk1`` via
      the port-rename mesh.  Member lists round-trip via the
      rename mesh.  LACP modes: OPNsense ``<proto>lacp</proto>`` ↔
      Aruba ``lacp``; OPNsense ``<proto>none</proto>`` ↔ Aruba
      ``trunk`` (static).  OPNsense's failover / loadbalance /
      roundrobin protos have no Aruba LACP equivalent and collapse
      to ``trunk`` with a comment.  OPNsense codec parses
      ``<laggs>`` but its capability matrix doesn't currently
      advertise ``/lag/aggregate``; round-trip is partial pending
      wire-up.
    references: [opnsense-laggs, aruba-lags]

  local_users:
    disposition: lossy
    reason: >
      OPNsense bcrypt hashes (``$2a$`` / ``$2b$`` / ``$2y$``) MAY
      be accepted by recent Aruba firmware (16.11+ bcrypt support);
      older AOS-S firmware accepts only SHA-1 hex, in which case
      the cross-pair fails on apply and operators reset the
      password.  Cross-pair render passes the bcrypt blob verbatim.
      Privilege number collapses to Aruba's two-role model:
      privilege >= 15 -> ``manager``, otherwise ``operator``.
      OPNsense's binary admin / non-admin source already maps
      directly to Aruba's two roles, so privilege loss is minimal
      in practice.
    references: [opnsense-users, aruba-users]

  radius_servers:
    disposition: good
    note: >
      OPNsense ``<authserver>`` with ``<host>`` /
      ``<radius_secret>`` / ``<radius_auth_port>`` /
      ``<radius_acct_port>`` ↔ Aruba ``radius-server host <ip>
      key "<secret>"`` (with default ports 1812/1813).  Round-trips
      host / port pair cleanly.  OPNsense's per-server protocol /
      timeout fields drop on render (no canonical model).
    references: [opnsense-radius, aruba-radius]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      opnsense codec capability matrix lists ``/vxlan-vnis/vni``
      under unsupported ("VXLAN not modelled — OPNsense is a
      firewall codec") so canonical list is always empty on
      OPNsense parse.  aruba_aoss codec also lists the path under
      unsupported.  Field structurally absent on this direction.

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      Same rationale as vxlan_vnis — OPNsense has no EVPN concept
      so canonical list is always empty on OPNsense parse.

  routing_instances:
    disposition: not_applicable
    note: >
      OPNsense ``config.xml`` has no VRF / routing-instance
      schema.  Aruba AOS-S has no VRF concept.  Both ends absent.
    references: [vrf-unsupported]

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 dict by design — never auto-rendered.  OPNsense-source
      firewall / NAT / VPN / captive-portal / plugin content may
      land here but Aruba target couldn't accept it as a stateful
      filter / NAT / VPN — campus-class AOS-S has no equivalent
      surface.
    references: [firewall-out-of-scope]

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec does not
      consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: >
      Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: >
      OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``apply-groups`` statement
      preservation per GAP 9b).  OPNsense source never populates
      this list; field is always empty on this cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Companion to apply_groups; same not_applicable status for
      OPNsense source.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The reverse direction is asymmetric versus aruba_aoss__opnsense.
#     OPNsense source carries DHCP server pools (lossy here, was
#     not_applicable on forward) but never carries switching state
#     (not_applicable here, was unsupported on forward).
#
#   * The keyword-stable surface (hostname / SNMP v1+v2c /
#     RADIUS / interface IP / VLAN id) is high-confidence and has
#     established round-trip tests on real captures.
#
#   * The wire-up gaps on the OPNsense side (no DNS / NTP / syslog
#     / timezone parser branch wired into canonical; no
#     <staticroutes> parse) push several Tier-1 fields into 'lossy'
#     rather than 'good'.  Codec-implementation gaps, not vendor-
#     modelling gaps.
#
#   * The role mismatch (firewall versus campus switch) drives most
#     unsupported / N/A categories.  Confident.
#
#   * Hash-format compatibility (OPNsense bcrypt versus Aruba SHA-1
#     on older firmware, bcrypt on 16.11+) is firmware-dependent
#     and confidently lossy.
#
# Deferred items (none — all fields walked and dispositioned):
#
#   * (none — every CanonicalIntent top-level field carries an
#     explicit per_field_expectation entry; sub-fields enumerated
#     where the disposition varies by sub-field).

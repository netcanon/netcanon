# Cross-vendor fidelity expectations: opnsense -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_aruba_aoss/
#
# Phase 3 follow-up pair.  REVERSE direction of aruba_aoss -> opnsense.
# OPNsense source carries firewall-shape state (zones, gateways, dhcpd
# interface-keyed pools) that has no first-class destination on an
# Aruba campus switch.  Aruba's switching state (per-VLAN tagged /
# untagged port lists, voice-VLAN, spanning-tree) is structurally
# absent on OPNsense parse.  The two role-mismatch surfaces invert:
#
#   * Switching state: not_applicable here (OPNsense source never
#     populates it); was unsupported on the forward direction
#     (Aruba carried it, OPNsense couldn't render).
#   * DHCP server pools: lossy here (OPNsense has them, Aruba can't
#     accept); was not_applicable on the forward direction.
#   * Hash formats: still lossy in both directions.

meta:
  source_vendor: opnsense
  target_vendor: aruba_aoss
  primary_use_case: >
    Hybrid migration: OPNsense firewall/router -> Aruba AOS-S campus
    switch (2930F / 2930M / 3810 / 5400R).  Source side carries
    firewall-shape state that the Aruba target cannot accept;
    OPNsense's small router/firewall canonical surface (hostname /
    domain / DNS / NTP / syslog / interface IPs / VLAN tags / SNMP
    v1/v2c / RADIUS / local users / DHCP server pools / LAGs)
    lands partially.  Aruba switching state (per-VLAN port lists,
    voice-VLAN) is structurally absent on OPNsense parse.
  certainty: medium
  references:

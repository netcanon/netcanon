# Cross-vendor expectations: mikrotik_routeros -> arista_eos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/mikrotik_routeros_to_arista_eos/
#
# Phase 3 follow-up pair.  Inverse of arista_eos__mikrotik_routeros.
# RouterOS source -> Arista EOS target is the SMB/WISP-to-DC-class
# direction: typical use case is operators consolidating onto an
# Arista-standard estate, or moving lab / edge sites onto Arista
# hardware to align with an existing DC fabric.
#
# Asymmetry on this direction concentrates on:
#
#   * RouterOS-rich Tier-3 plumbing (firewall / NAT / mangle /
#     queues / wireless / scripts / scheduler / IPsec / PPP /
#     hotspot) is structurally absent on the Arista canonical-
#     scoped target — these surfaces lift to ``raw_sections`` on
#     RouterOS parse and silently drop on Arista render.  This is
#     the largest source of cross-vendor information loss in this
#     direction.
#   * Local users — RouterOS does not surface hashed passwords in
#     /export.  The canonical ``hashed_password`` arrives empty and
#     the Arista render emits ``username X privilege Y role Z``
#     with NO ``secret`` clause.  Operator MUST set passwords
#     manually on the Arista target after migration.
#   * VLAN naming convention — RouterOS's ``/interface vlan
#     name=vlan10`` (no separate name field) collides with the
#     MikroTik codec's documented LossyPath on /vlans/vlan/name.
#   * Switching-plane surface — RouterOS Plane 2 (bridge VLAN
#     filtering) parsing is partial in v1; cross-pair render to
#     Arista's interface-centric switchport model may
#     under-populate the access/trunk membership lists.

meta:
  source_vendor: mikrotik_routeros
  target_vendor: arista_eos
  primary_use_case: >
    MikroTik RouterOS replaced by an Arista EOS deployment
    (typical: SMB / WISP / lab / branch operator scaling up to
    enterprise / DC-class Arista hardware, or consolidating from a
    RouterOS-edge estate onto an Arista-standard DC fabric).  The
    basic-services surface (hostname / DNS / NTP / IPv4-IPv6
    addresses / static routes) round-trips with documented losses;
    deeper RouterOS-rich plumbing (firewall, queues, wireless,
    scripts) drops to raw_sections, password material drops on
    structural absence, and the DC-fabric surface is empty
    regardless because RouterOS does not carry it.
  certainty: medium

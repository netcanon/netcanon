# ---------------------------------------------------------------------------
# Per-field expectations.  Walks every top-level CanonicalIntent field
# (and meaningful sub-fields) defined in
# netcanon/migration/canonical/intent.py.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: unsupported
    reason: >
      Arista parser populates intent.hostname from `hostname <name>`.
      The cisco_iosxe NETCONF render does NOT walk intent.hostname —
      _render_canonical() emits only the openconfig-interfaces subtree.
      The CapabilityMatrix declares /system/hostname `supported` but
      the declaration is aspirational (cross-codec mesh friendliness);
      no `<system>` element appears in the output XML regardless of
      source content.  Flips to good once render-side wire-up lands.
    references: [oc-system, cisco-yang-blog]

  domain:
    disposition: unsupported
    reason: >
      Arista parser populates intent.domain from `dns domain <name>` /
      `ip domain-name <name>`.  cisco_iosxe render emits no
      `<system><config><domain-name>` element (render-side wire-up
      gap).  Flips to good once wired.
    references: [oc-system]

  dns_servers:
    disposition: unsupported
    reason: >
      Arista parser populates intent.dns_servers from `ip name-server
      vrf default <addr>`.  cisco_iosxe render emits no
      `<system><dns>` element.  Flips to good once wired.
    references: [oc-system]

  ntp_servers:
    disposition: unsupported
    reason: >
      Arista parser populates intent.ntp_servers from `ntp server
      <addr>`.  cisco_iosxe render emits no `<system><ntp>` element.
      Flips to good once wired.
    references: [oc-system]

  timezone:
    disposition: unsupported
    reason: >
      Arista parser populates intent.timezone from `clock timezone
      <name>`.  cisco_iosxe render emits no `<system><clock>` element.
      Flips to lossy once wired (Arista accepts both abbreviations
      and Olson IDs while OpenConfig prefers IANA tz database
      identifiers; canonical preserves source string verbatim).
    references: [oc-system]

  syslog_servers:
    disposition: unsupported
    reason: >
      Arista parser populates intent.syslog_servers from `logging
      host <addr>`.  cisco_iosxe render emits no `<system><logging>`
      element.  Flips to good once wired (host-list surface).
    references: [oc-system]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips: the Arista parser
      produces CanonicalInterface records and the cisco_iosxe render
      walks them.  Per-field drift is itemised below — name (after
      rename mesh), description, enabled, ipv4_addresses are good;
      name (cross-vendor speed token), interface_type, mtu, and
      ipv6_addresses (link-local scope) are lossy; switchport / VLAN
      / LAG / VRF / DHCP-client fields are unsupported because the
      cisco_iosxe render path doesn't emit the corresponding
      OpenConfig subtrees.
    references: [oc-interfaces, arista-iface-cg]

  "interfaces[].name":
    disposition: lossy
    reason: >
      Arista flat-numeric `Ethernet1` / `Ethernet48` -> Cisco
      `GigabitEthernet1/0/1` / etc via the rename mesh.  The
      cross-vendor name shape change is the dominant transformation.
      Speed-hint loss runs the wrong way on this direction: Arista
      sources don't carry a speed token in interface names so the
      Cisco render path defaults the prefix to `GigabitEthernet`
      regardless of actual link speed; an operator running 25/100G
      fabrics on Arista will see less-specific names on the OpenConfig
      output.  Port-Channel capitalisation flips (`Port-Channel<N>`
      -> `Port-channel<N>`).
    references: [oc-interfaces, arista-ethernet-ports]

  "interfaces[].description":
    disposition: good
    note: >
      Free-text round-trip.  Arista parses `description "<text>"` from
      the interface stanza; cisco_iosxe render emits as
      `<config><description>` verbatim.
    references: [oc-interfaces]

  "interfaces[].enabled":
    disposition: good
    note: >
      Arista `shutdown` / `no shutdown` (default enabled) maps to
      YANG boolean `<enabled>true/false</enabled>`.  Strict YANG-bool
      parsing on the cisco_iosxe side accepts only `"true"` / `"false"`
      (case-insensitive); the Arista codec emits the canonical bool
      which serialises correctly.
    references: [oc-interfaces]

  "interfaces[].interface_type":
    disposition: lossy
    reason: >
      Arista has no IANA ifType concept — the arista_eos codec INFERS
      interface_type from the name prefix (`Ethernet*` ->
      ethernetCsmacd, `Loopback*` -> softwareLoopback,
      `Port-Channel*` -> ieee8023adLag, `Vlan*` -> l2vlan).  The
      cisco_iosxe render emits the inferred IANA ident as
      `<config><type>`, but the canonical record carries no speed
      hint distinguishing 1G / 10G / 25G / 100G — the matrix declares
      `/interfaces/interface/config/type` as `lossy` on the Arista
      side specifically for this reason ("EOS interface names don't
      encode speed; the parser defaults to 'gig' speed-hint for all
      Ethernet<N> ports").
    references: [oc-interfaces, arista-ethernet-ports]

  "interfaces[].mtu":
    disposition: lossy
    reason: >
      Arista parses `mtu N` from interface stanzas into
      CanonicalInterface.mtu.  The cisco_iosxe codec's
      _render_canonical() body does not emit `<config><mtu>` — the
      render path skips the leaf entirely.  Doubly-deferred: even
      with the render wired, the cisco_iosxe matrix declares
      /interfaces/interface/config/mtu `lossy` because OpenConfig's
      single mtu leaf doesn't distinguish link-MTU from ip-MTU /
      ipv6-MTU / mpls-MTU.
    references: [oc-interfaces]

  "interfaces[].ipv4_addresses":
    disposition: good
    note: >
      Arista parses `ip address X/N` (CIDR form on bare interfaces
      and SVIs) into CanonicalInterface.ipv4_addresses.  cisco_iosxe
      render emits as `<subinterface index=0>/<ipv4>/<addresses>/
      <address>` with prefix-length.  Round-trip lossless for the
      (ip, prefix) tuple.  Multiple addresses per interface (Arista
      secondary addresses) emit as multiple `<address>` records.
    references: [oc-if-ip]

  "interfaces[].ipv6_addresses":
    disposition: lossy
    reason: >
      Arista distinguishes link-local explicitly via the
      `link-local` keyword.  The arista_eos codec parses both forms
      and populates CanonicalIPv6Address.scope = "link-local" for
      the keyword case.  The cisco_iosxe render emits the address
      verbatim regardless of scope but provides no link-local
      discriminator on the OpenConfig wire format (the base
      openconfig-if-ip module has no scope leaf; draft augment
      modules add `address-type` but aren't universally deployed).
      A `fe80::/10` address declared by Arista as `link-local`
      emits in OpenConfig output indistinguishable from a global
      address.  Doubly upstream of the codec: the canonical layer
      preserves the discriminator, the render path can't carry it
      through.
    references: [oc-if-ip]

  "interfaces[].switchport_mode":
    disposition: unsupported
    reason: >
      Arista parser populates switchport_mode from `switchport mode
      access` / `switchport mode trunk` / `no switchport`.  The
      cisco_iosxe render does NOT walk the
      `openconfig-vlan:switched-vlan` augment under `<ethernet>`;
      no switchport state appears in the output XML.  Render-side
      wire-up gap.  Flips to good once wired.
    references: [oc-vlan]

  "interfaces[].access_vlan":
    disposition: unsupported
    reason: Same `switched-vlan` augment render gap as switchport_mode.
    references: [oc-vlan]

  "interfaces[].trunk_allowed_vlans":
    disposition: unsupported
    reason: Same render gap.  OpenConfig models this as `trunk-vlans` leaf-list.
    references: [oc-vlan]

  "interfaces[].trunk_native_vlan":
    disposition: unsupported
    reason: Same render gap.
    references: [oc-vlan]

  "interfaces[].voice_vlan":
    disposition: unsupported
    reason: >
      Arista parser doesn't populate voice_vlan from EOS today
      (codec gap), AND the cisco_iosxe render doesn't walk the
      OpenConfig voice-VLAN augment (which isn't universally
      supported in OpenConfig releases anyway).
    references: [oc-vlan]

  "interfaces[].lag_member_of":
    disposition: unsupported
    reason: >
      Arista parser populates lag_member_of from `channel-group N
      mode <m>` (yields `Port-Channel<N>` membership).  cisco_iosxe
      render does NOT emit the
      `openconfig-if-aggregate:aggregate-id` leaf — render-side gap.
      Flips to good once wired.
    references: [oc-interfaces]

  "interfaces[].dhcp_client":
    disposition: unsupported
    reason: >
      Arista parser doesn't populate dhcp_client today (parse-side
      codec gap; Arista has `ip address dhcp` but the parser doesn't
      extract it).  cisco_iosxe render also doesn't walk the
      OpenConfig DHCP-client augment.  Doubly unsupported.
    references: [oc-interfaces]

  "interfaces[].vrf":
    disposition: unsupported
    reason: >
      Arista parser populates intent.interfaces[].vrf from `vrf
      <name>` interface sub-command.  cisco_iosxe render does NOT
      walk `<network-instances>` (where VRF interface-membership
      lives in OpenConfig).  Render-side wire-up gap; flips to good
      once both `<network-instances>` walk and per-interface VRF
      back-reference are wired.
    references: [oc-network-instance]

  vlans:
    disposition: unsupported
    reason: >
      Arista parser populates intent.vlans with full VLAN-centric
      records (id, name, tagged_ports, untagged_ports, plus SVI
      addressing absorbed into intent.interfaces[name="VlanN"]).
      cisco_iosxe render does NOT walk intent.vlans —
      _render_canonical() emits only the interfaces subtree.
      Synthesised SVI interfaces (intent.interfaces[name="VlanN"])
      DO survive via the interfaces walk, but the top-level
      `<vlans>` declaration that should accompany them does not.
      A downstream OpenConfig consumer would see SVIs without
      VLAN-membership context.  Render-side wire-up gap; flips to
      good once wired.
    references: [oc-vlan, arista-vlan-cg]

  static_routes:
    disposition: unsupported
    reason: >
      Arista parser populates intent.static_routes from `ip route
      DEST/N GW` (CIDR form).  cisco_iosxe render does not walk
      `<network-instances>` / `<protocols><protocol identifier=STATIC>`
      on emit.  Render-side wire-up gap; the matrix declares
      /routing/static-route `supported` aspirationally.
    references: [oc-network-instance]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: not_applicable
    note: >
      Arista has DHCP-server support but the arista_eos codec doesn't
      currently parse `ip dhcp pool` blocks; intent.dhcp_servers is
      always empty on this direction — nothing to render.  cisco_iosxe
      also has no first-class OpenConfig DHCP-server model, so the
      field stays not_applicable bidirectionally.

  snmp:
    disposition: unsupported
    reason: >
      Arista parser populates intent.snmp (community, location,
      contact, trap_hosts, v3_users).  cisco_iosxe render does
      NOT walk intent.snmp.  Render-side wire-up gap on the v1/v2c
      surface; the v3 surface is doubly unsupported because the
      cisco_iosxe matrix lists /snmp/v3-user under `unsupported`
      explicitly ("Phase 0.5 stub — SNMPv3 USM wire-up requires
      Cisco-IOS-XE-snmp native YANG bridging").
    references: [arista-user-security, cisco-snmp-yang]

  "snmp.community":
    disposition: unsupported
    reason: Same render-side wire-up gap as snmp.
    references: [arista-user-security]

  "snmp.location":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [arista-user-security]

  "snmp.contact":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [arista-user-security]

  "snmp.trap_hosts":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [arista-user-security]

  "snmp.v3_users":
    disposition: unsupported
    reason: >
      Doubly unsupported — render-side wire-up gap PLUS the
      cisco_iosxe matrix declares /snmp/v3-user `unsupported`
      explicitly (Phase 0.5 stub; SNMPv3 USM requires the
      Cisco-IOS-XE-snmp native YANG module that isn't bridged in
      this codec).  Even if v1/v2c SNMP eventually wires up,
      v3 stays unsupported on the cisco_iosxe target until
      native-YANG bridging lands.  Hash compatibility across vendors
      is also broken upstream of the canonical layer (engineID-derived
      salt; cross-vendor migration requires re-keying on the target).
    references: [arista-user-security, cisco-snmp-yang]

  lags:
    disposition: unsupported
    reason: >
      Arista parser populates intent.lags from `channel-group N
      mode <m>` directives across member interfaces.  cisco_iosxe
      render does NOT walk intent.lags or emit the
      `openconfig-if-aggregate` augment.  Render-side wire-up gap.
    references: [oc-interfaces]

  local_users:
    disposition: unsupported
    reason: >
      Arista parser populates intent.local_users from `username X
      role <name> secret sha512 $6$...` and similar.  cisco_iosxe
      render does NOT walk `<system><aaa><authentication><users>`.
      Render-side gap.  Even if wired, hash-format incompatibility
      (Arista uses Linux crypt() family `$1$` MD5 / `$5$` SHA-256 /
      `$6$` SHA-512; Cisco IOS-XE uses type-5 `$1$`, type-8 PBKDF2,
      type-9 `$9$` scrypt) would force re-keying on the target —
      same lossy classification as the cisco_iosxe_cli direction.
    references: [arista-user-security, oc-system]

  radius_servers:
    disposition: unsupported
    reason: >
      Arista parser populates intent.radius_servers from
      `radius-server host X key K` and `aaa group server radius`
      forms.  cisco_iosxe render does NOT walk
      `<system><aaa><server-groups>`.  Render-side gap; flips to
      good once wired.
    references: [oc-system]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: unsupported
    reason: >
      Arista parser populates intent.vxlan_vnis with full VLAN-to-VNI
      mappings (vlan_id, vni, source_interface, udp_port, mcast_group,
      flood_list) from `interface Vxlan1` stanzas.  cisco_iosxe
      target codec declares /vxlan-vnis/vni, /vxlan-vnis/source-interface,
      /vxlan-vnis/udp-port under `unsupported` explicitly with reason
      "VXLAN not modelled in this NETCONF/OpenConfig stub codec.  CLI
      sibling defers VXLAN wire-up until Catalyst demand arrives;
      NETCONF stays in lockstep."  Render emits nothing.  This is
      mechanically `unsupported` rather than `not_applicable` because
      the source DOES carry rich data.
    references: [oc-evpn, arista-vxlan-cg]

  "vxlan_vnis[].vlan_id":
    disposition: unsupported
    reason: Same as vxlan_vnis — target matrix declares the parent path unsupported.
    references: [oc-evpn]

  "vxlan_vnis[].vni":
    disposition: unsupported
    reason: Same as vxlan_vnis.
    references: [oc-evpn]

  "vxlan_vnis[].source_interface":
    disposition: unsupported
    reason: Same as vxlan_vnis — target matrix declares /vxlan-vnis/source-interface unsupported.
    references: [oc-evpn, arista-vxlan-cg]

  "vxlan_vnis[].udp_port":
    disposition: unsupported
    reason: Same as vxlan_vnis — target matrix declares /vxlan-vnis/udp-port unsupported.
    references: [oc-evpn]

  "vxlan_vnis[].mcast_group":
    disposition: unsupported
    reason: Same as vxlan_vnis.
    references: [oc-evpn]

  "vxlan_vnis[].flood_list":
    disposition: unsupported
    reason: Same as vxlan_vnis.
    references: [oc-evpn]

  evpn_type5_routes:
    disposition: unsupported
    reason: >
      Arista parses per-VRF EVPN BGP signalling (router bgp / vrf X
      / route-target import|export evpn) and populates
      CanonicalRoutingInstance.l3_vni from `vxlan vrf X vni N`.  Per-
      prefix CanonicalEvpnType5Route records are not populated by
      either codec today (matrix-level lossy on the source).
      cisco_iosxe target matrix lists `/vxlan-vnis/*` unsupported —
      no EVPN render path of any kind.  Bidirectionally unsupported.
    references: [oc-evpn, arista-evpn-cg]

  # ── Tier 2 (ship-before-wire) — VRF / routing-instance ──

  routing_instances:
    disposition: unsupported
    reason: >
      Arista parser populates intent.routing_instances from `vrf
      instance <name>` and the per-VRF `router bgp / vrf X` blocks
      (RD + RTs).  Also populates instance_type="mac-vrf" from
      `router bgp / vlan N / rd / route-target` per-VLAN MAC-VRF
      bindings.  cisco_iosxe render does NOT walk intent.routing_instances
      or emit `<network-instances>`.  Render-side wire-up gap.
    references: [oc-network-instance, arista-evpn-cg]

  "routing_instances[].name":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].instance_type":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].route_distinguisher":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].rt_imports":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].rt_exports":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].description":
    disposition: unsupported
    reason: Same render-side wire-up gap.
    references: [oc-network-instance]

  "routing_instances[].l3_vni":
    disposition: unsupported
    reason: >
      Doubly unsupported — VRF render gap PLUS cisco_iosxe matrix
      declares /vxlan-vnis/* unsupported (l3_vni requires VXLAN
      EVPN Type-5 emission as `set routing-instances X protocols
      evpn ip-prefix-routes vni N` equivalent in OpenConfig).
    references: [oc-network-instance, oc-evpn]

  # ── Tier 3 — informational only (never auto-rendered) ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier 3 by design — never auto-rendered.  Each codec's
      raw_sections content is vendor-private; cross-vendor migration
      drops it with a banner.

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec doesn't
      consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific (`apply-groups` statement preservation per GAP
      9b).  Arista EOS and Cisco IOS-XE codecs do not emit
      apply_groups; field is always empty on this cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Junos-specific (group-scoped set-line tails).  Same as
      apply_groups — empty on this cross-pair.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The structural framing is high-confidence: the cisco_iosxe
#     codec's _render_canonical() is in-tree code that any reader
#     can verify, and the conclusion that it walks intent.interfaces
#     only is verifiable by code inspection.
#
#   * The interface canonical-core dispositions (good for
#     description / enabled / ipv4; lossy for name / type / mtu /
#     v6 link-local) are confidence-high — the cisco_iosxe matrix
#     and the arista_eos matrix both agree on the same surface.
#
#   * The non-interface unsupported dispositions are confidence-
#     medium: it's mechanically true that the render doesn't emit
#     today, but the matrix declarations as `supported` (rather
#     than `unsupported`) make the codec's INTENT clear — these
#     should round-trip eventually.  An operator running this
#     today must understand this is a Phase-0.5 codec.
#
#   * The IPv6 link-local lossy classification is medium-confidence:
#     the Arista codec parses scope explicitly and populates the
#     canonical record; the cisco_iosxe render path drops the
#     discriminator on the wire.  This is a real loss for any
#     Arista source declaring `ipv6 address fe80::1 link-local`.
#
# Deferred items: none — every CanonicalIntent top-level field is
# enumerated above with a concrete disposition.
#
# Surprises uncovered authoring this pair:
#
#   * The pattern matches the aruba_aoss__cisco_iosxe pair almost
#     exactly: same `unsupported`-dominated disposition matrix
#     because the cisco_iosxe target codec is the limiting factor
#     on every cross-pair where it appears as target.  Wiring its
#     render to walk intent.{hostname,dns_servers,ntp_servers,
#     syslog_servers,vlans,static_routes,snmp,lags,local_users,
#     radius_servers,routing_instances,vxlan_vnis} would convert
#     ~30 unsupported dispositions in this YAML to good (or lossy
#     where vendor mismatch dominates).
#
#   * The VXLAN/EVPN unsupported classification is more authoritative
#     here than on AOS-S source pairs: AOS-S has no VXLAN concept so
#     the source-side empty-tree dominates (`not_applicable`); on
#     this Arista pair the source carries rich VXLAN/EVPN data
#     (Arista is the most VXLAN-mature codec) so the loss is
#     mechanically `unsupported` (target render declines).
#
#   * The arista_eos codec's IPv6 scope handling is more nuanced
#     than the AOS-S codec's — Arista actually distinguishes
#     link-local explicitly via the keyword.  This makes the
#     lossy classification on `ipv6_addresses` here less
#     symmetric: AOS-S source loss is "neither side carries
#     link-local awareness", Arista source loss is "source
#     carries it; target render drops it on the wire".

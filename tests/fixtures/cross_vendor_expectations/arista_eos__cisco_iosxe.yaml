# Cross-vendor fidelity expectations: arista_eos -> cisco_iosxe
#
# Source: arista_eos codec (EOS `show running-config` text).
# Target: cisco_iosxe codec — OpenConfig NETCONF YANG XML.  This is
# the NETCONF/OpenConfig sibling of cisco_iosxe_cli (operator-paste
# CLI).  Both target the same Cisco device family (Catalyst 9K / ISR /
# ASR); the asymmetry on this cross-pair is dominated by the
# cisco_iosxe target codec being a Phase-0.5 stub whose render emits
# ONLY the openconfig-interfaces subtree (interfaces, IPv4, IPv6,
# description, enable, IANA type).  Every other canonical category
# that the Arista parser populates (hostname, DNS, NTP, syslog,
# VLANs, SNMP, RADIUS, local users, LAGs, static routes, VRFs,
# VXLAN, EVPN MAC-VRF) lands on the canonical tree but is silently
# dropped by the cisco_iosxe target render.
#
# Direction-specific framing: for fields the cisco_iosxe codec's
# CapabilityMatrix declares `supported` but its render() never
# emits (system, vlans, snmp, static-routes), the disposition here
# is `unsupported` with reason citing the render-side wire-up gap.
# The matrix declarations are aspirational — they exist so cross-
# codec mesh translations don't classify these paths as
# `unsupported` on the target side, but the actual emit path is
# narrow.  Honest classification beats matrix-deference.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_cisco_iosxe/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit.

meta:
  source_vendor: arista_eos
  target_vendor: cisco_iosxe
  primary_use_case: >
    Arista EOS source consumed into a NETCONF/OpenConfig-driven
    orchestration pipeline that uses the cisco_iosxe codec.  The
    target render emits only the openconfig-interfaces subtree, so
    this pair is appropriate ONLY for the narrow case where the
    downstream consumer needs interface-level data and accepts that
    everything else (VLANs, SNMP, RADIUS, users, LAGs, static
    routes, VRFs, VXLAN/EVPN) must be applied separately.  For a
    real DC EVPN-VXLAN spine-leaf migration from Arista to Cisco,
    route through cisco_iosxe_cli instead — that pair is `certified`
    and emits the full canonical surface.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/arista_eos_to_cisco_iosxe/interface-fields.md
      title: "openconfig-interfaces YANG schema docs"

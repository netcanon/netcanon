# Cross-vendor fidelity expectations: cisco_iosxe -> opnsense
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML (Phase-0.5
# stub; parse() walks `<interfaces>` only).
# Target: opnsense codec — `certified` OPNsense `config.xml` render.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_opnsense/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit Batch 2
# (one of seven parallel pair agents).
#
# Direction-specific framing.  Two stacked gaps dominate this pair:
#
#   1. The cisco_iosxe SOURCE codec's parse() walks `<interfaces>`
#      only.  intent.hostname, intent.snmp, intent.vlans,
#      intent.local_users, intent.radius_servers, intent.lags,
#      intent.routing_instances, intent.static_routes are all empty
#      after parse, regardless of input content.  This is a parse-
#      side wire-up gap (the matrix declares many of these as
#      `supported` aspirationally).
#
#   2. The OPNsense TARGET codec is a router/firewall: no switching
#      fabric, no VLAN-centric port membership, no first-class SVI,
#      no VRF, no VXLAN.
#
# The composite effect: heavy `not_applicable` (parse-side gap) with
# a sprinkle of `unsupported` (target render-side decline for
# switchport / VRF / VXLAN).  Almost no `lossy` because `lossy`
# requires the canonical tree to actually carry data that gets
# degraded — and the canonical tree is structurally empty here for
# non-interface fields.

meta:
  source_vendor: cisco_iosxe
  target_vendor: opnsense
  primary_use_case: >
    NETCONF-source orchestration pipeline emitting OPNsense
    config.xml — narrow case where the orchestrator can read
    OpenConfig from the upstream Cisco fabric but the perimeter
    target is an OPNsense firewall.  The cisco_iosxe codec is a
    Phase-0.5 stub so this pair carries only interface-level
    data; for any real perimeter migration use cisco_iosxe_cli
    instead.  This pair primarily exists to demonstrate that the
    parse-side wire-up gap dominates classification on every
    cross-pair where cisco_iosxe is the source.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/cisco_iosxe_to_opnsense/openconfig_yang_scope.md
      title: "openconfig-interfaces YANG schema docs"

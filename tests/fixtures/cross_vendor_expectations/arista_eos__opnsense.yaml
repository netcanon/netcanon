# ---------------------------------------------------------------------------
# Per-field expectations.  One entry per top-level CanonicalIntent field
# (intent.py walked top-down).
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      Arista ``hostname <name>`` ↔ OPNsense
      ``<system>/<hostname>``.  Both vendors model the bare short
      name.  Round-trip is lossless.
    references: [opnsense-system, arista-system-cg]

  domain:
    disposition: good
    note: >
      Arista ``dns domain <fqdn>`` (the older ``ip domain-name``
      form parses too) ↔ OPNsense ``<system>/<domain>``.  Both
      vendors model the DNS suffix as a separate scalar from the
      hostname.
    references: [opnsense-system, arista-system-cg]

  dns_servers:
    disposition: lossy
    reason: >
      Arista ``ip name-server vrf default <addr>`` lines (one per
      resolver) map to OPNsense repeated ``<system>/<dnsserver>``
      elements.  The OPNsense codec does not currently emit
      ``<dnsserver>`` on cross-vendor render (capability matrix
      declares ``/system/dns-server`` supported but render
      wire-up is incomplete).  Cross-pair drops the resolver list
      pending wire-up.  Arista's per-resolver VRF qualifier
      collapses to global on canonical anyway.
    references: [opnsense-system, arista-system-cg]

  ntp_servers:
    disposition: lossy
    reason: >
      Arista ``ntp server <addr>`` lines map to OPNsense's
      space-separated ``<system>/<timeservers>`` element (one
      element with space-delimited host list).  OPNsense codec
      does not currently wire ``<timeservers>`` into
      ``CanonicalIntent.ntp_servers``.  Per-server NTP options
      (prefer / iburst / key / source) are not modelled on either
      side.
    references: [opnsense-system, arista-system-cg]

  timezone:
    disposition: lossy
    reason: >
      Arista ``clock timezone PST -8 0`` (offset+DST tokens)
      versus OPNsense
      ``<system>/<timezone>America/Los_Angeles</timezone>`` (Olson
      zoneinfo) carry different semantics.  Operator-curated
      mapping required for byte-for-byte fidelity.  Codec wire-up
      gap on both ends.
    references: [opnsense-system, arista-system-cg]

  syslog_servers:
    disposition: lossy
    reason: >
      Arista ``logging host <addr>`` lines map to OPNsense
      ``<system>/<syslog>/<remoteserver>``.  OPNsense codec does
      not currently wire syslog config into the canonical
      ``syslog_servers`` list.  Severity / facility tokens are
      not modelled (canonical surface is host list only on both
      sides).
    references: [opnsense-system, arista-system-cg]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips, but several per-
      interface sub-fields are lossy or unsupported.  See the
      ``interfaces[].*`` entries below for the per-sub-field
      breakdown.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].name:
    disposition: lossy
    reason: >
      Arista ``Ethernet1`` / ``Loopback0`` / ``Port-Channel10`` /
      ``Vlan100`` / ``Vxlan1`` does not survive on OPNsense.  The
      operator-facing label on OPNsense is the zone tag
      (``<wan>`` / ``<lan>`` / ``<optN>``); the BSD device name
      lives in ``<if>``.  Port-rename mesh handles the conversion
      via the codec's ``classify_port_name`` /
      ``format_port_identity`` delegates.  Canonical preserves
      the source string verbatim.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].description:
    disposition: good
    note: >
      Arista ``description "<text>"`` (240-char CLI limit) ↔
      OPNsense ``<descr>`` (no length limit).  Round-trip
      preserves text content.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].enabled:
    disposition: good
    note: >
      Arista ``no shutdown`` / ``shutdown`` ↔ OPNsense
      ``<enable>`` element presence (present = enabled, absent =
      disabled).
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      Arista codec capability matrix declares
      ``/interfaces/interface/config/type`` lossy with rationale
      "EOS interface names don't encode speed; the parser
      defaults to 'gig' speed-hint for all Ethernet<N> ports."
      OPNsense doesn't surface a type field; cross-pair drops the
      type hint.
    references: [arista-iface-cg, opnsense-interfaces]

  interfaces[].mtu:
    disposition: good
    note: >
      Arista ``mtu <N>`` ↔ OPNsense ``<mtu>N</mtu>`` — both
      render explicitly when set.  OPNsense allows 576-9000;
      Arista DC-class platforms accept up to 9214 (jumbo).
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].ipv4_addresses:
    disposition: good
    note: >
      Arista ``ip address X/N`` (CIDR) converts mechanically to
      OPNsense ``<ipaddr>`` + ``<subnet>`` (CIDR length).
      Multiple Arista IPv4 addresses per interface (primary +
      secondary) collapse to the primary only — canonical takes
      one address.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].ipv6_addresses:
    disposition: lossy
    reason: >
      Arista ``ipv6 address X/N`` (with optional ``link-local``
      keyword on a second address) ↔ OPNsense ``<ipaddrv6>`` +
      ``<subnetv6>``.  OPNsense's ``<ipaddrv6>`` slot holds ONE
      IPv6 — the codec renders only the first non-link-local
      IPv6 address.  Real captures rarely emit explicit link-
      local entries (the kernel auto-derives them) but Arista
      sources with both an explicit ``fe80::1/64`` link-local AND
      a global ``2001:db8:0:1::1/64`` will lose the link-local
      entry on round-trip — only the global survives.  This is
      the same single-address constraint documented on the
      FortiGate twin pair.  OPNsense's non-static IPv6 keywords
      (``dhcp6``, ``track6``, ``slaac``, ``6rd``, ``6to4``) are
      not generated by Arista source.  See
      ``tests/fixtures/real/phase4_findings_arista_eos.md`` for
      the kitchen_sink cell evidence.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].switchport_mode:
    disposition: unsupported
    reason: >
      OPNsense has no switching fabric.  No ``switchport``
      directive, no access / trunk modes on physical interfaces.
      Cross-pair drops the field; Arista-source ``switchport
      mode`` state is preserved in the canonical tree but the
      OPNsense render emits no switchport XML.
    references: [switchport-unsupported]

  interfaces[].access_vlan:
    disposition: unsupported
    reason: >
      Same rationale as switchport_mode — OPNsense has no
      access-VLAN concept on physical interfaces.
    references: [switchport-unsupported]

  interfaces[].trunk_allowed_vlans:
    disposition: unsupported
    reason: >
      OPNsense has no per-port allowed-VLAN list.  Trunking is
      implicit: every ``<vlans>/<vlan>`` whose ``<if>`` matches
      a physical NIC rides that NIC.
    references: [switchport-unsupported, opnsense-vlans]

  interfaces[].trunk_native_vlan:
    disposition: unsupported
    reason: >
      Same as trunk_allowed_vlans — OPNsense's "native VLAN" is
      the parent NIC's untagged frames; not a per-port toggle.
    references: [switchport-unsupported]

  interfaces[].voice_vlan:
    disposition: unsupported
    reason: >
      OPNsense has no LLDP-MED voice-VLAN signalling in the base
      OS.  Arista's ``switchport voice vlan N`` drops on the
      cross-pair.
    references: [switchport-unsupported]

  interfaces[].lag_member_of:
    disposition: lossy
    reason: >
      Arista ``channel-group N mode active`` on a member interface
      back-points to ``Port-Channel<N>`` (capital-C
      Port-Channel, Arista convention).  OPNsense's ``<laggs>``
      block carries member lists by NIC name in a comma-separated
      ``<members>`` element under ``<laggif>laggN</laggif>``.
      Both codecs round-trip the back-pointer but the LAG name
      itself differs (``Port-Channel10`` versus ``lagg0``);
      port-rename mesh canonicalises (one-based ↔ zero-based).
    references: [opnsense-laggs, arista-lacp-cg]

  interfaces[].dhcp_client:
    disposition: lossy
    reason: >
      Arista ``ip address dhcp`` ↔ OPNsense
      ``<ipaddr>dhcp</ipaddr>``.  Neither codec currently wires
      this into ``CanonicalInterface.dhcp_client``; cross-pair
      drops pending wire-up.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].vrf:
    disposition: unsupported
    reason: >
      OPNsense has no VRF model in ``config.xml``.  Arista's
      per-interface ``vrf <name>`` is captured on
      ``CanonicalInterface.vrf`` (capability matrix declares
      ``/interfaces/interface/config/vrf`` supported on Arista)
      but drops at the OPNsense render boundary.
    references: [vxlan-evpn-unsupported]

  vlans:
    disposition: lossy
    reason: >
      The list itself round-trips for the id field.  Per-VLAN
      sub-fields collapse or drop — see ``vlans[].*`` entries
      below.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].id:
    disposition: good
    note: >
      Arista ``vlan N`` ↔ OPNsense ``<vlan>/<tag>N</tag>``.  Both
      vendors share the 1-4094 range.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].name:
    disposition: lossy
    reason: >
      Arista per-VLAN ``name <x>`` (32-char truncation, no
      quoting required).  OPNsense's nearest equivalent is
      ``<descr>`` — which is also where the canonical
      ``description`` lands.  Two canonical fields collapse to
      one OPNsense XML field; one drops on render.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].description:
    disposition: lossy
    reason: >
      Same as ``vlans[].name`` — both canonical fields share the
      single OPNsense ``<descr>`` slot.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].tagged_ports:
    disposition: unsupported
    reason: >
      OPNsense has no VLAN-centric port-membership model.  A
      VLAN exists only as a tagged sub-interface on ONE parent
      NIC (the ``<if>`` element).  Arista's per-port
      ``switchport trunk allowed vlan`` lines (transposed onto
      ``CanonicalVlan.tagged_ports`` by the parser) drop on
      render; operators reconstruct trunk topology manually by
      assigning each ``<vlan>`` to a zone.
    references: [opnsense-vlans, switchport-unsupported]

  vlans[].untagged_ports:
    disposition: unsupported
    reason: >
      Same as tagged_ports — OPNsense's "untagged" traffic is
      the parent NIC's native frames; not a per-port toggle.
    references: [opnsense-vlans, switchport-unsupported]

  vlans[].ipv4_addresses:
    disposition: lossy
    reason: >
      Arista's first-class ``interface Vlan<N>`` SVI with an L3
      address has no first-class OPNsense equivalent.  The
      OPNsense pattern is to assign the VLAN sub-interface
      (``em1_vlan100``) to a zone and put the address on the
      zone (``<opt2>``).  The canonical model carries the SVI
      address but the OPNsense render path doesn't synthesise
      the corresponding zone — operator-curated.
    references: [opnsense-vlans, arista-vlan-cg]

  static_routes:
    disposition: lossy
    reason: >
      OPNsense splits static-route declaration into two blocks:
      ``<gateways>/<gateway_item>`` (named gateways) and
      ``<staticroutes>/<route>`` (routes referencing named
      gateways).  The OPNsense codec does not currently render
      either block on cross-vendor; canonical static_routes from
      an Arista source therefore drop pending wire-up.  Per-VRF
      static routes (Arista ``ip route vrf X ...``) are
      unsupported on the cross-pair (canonical lacks a VRF field
      on CanonicalStaticRoute, and OPNsense has no VRF model
      anyway).  Arista's ``0.0.0.0/0`` form would also need
      remapping to the OPNsense default-gateway idiom (set via
      the WAN zone interface).
    references: [opnsense-gateways, arista-routing-cg]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: lossy
    reason: >
      Arista's named ``ip dhcp pool USERS`` form maps to
      OPNsense's INTERFACE-KEYED ``<dhcpd>/<lan>``-style pools.
      Pool network / mask is INFERRED from the zone interface on
      OPNsense, not stored on the pool record.  Lease time units
      differ (Arista d/h/m triple ↔ OPNsense seconds).  The
      ``CanonicalDHCPPool.interface`` field carries the operator-
      chosen pool name on Arista but the zone label on OPNsense,
      so cross-pair render needs operator-driven mapping.
      OPNsense codec does not currently advertise ``/dhcp/pool``
      in its capability matrix; cross-pair render is partial
      pending wire-up.
    references: [opnsense-dhcp, arista-dhcp-cg]

  snmp:
    disposition: lossy
    reason: >
      v1/v2c surface (community / location / contact / trap_hosts)
      round-trips cleanly — Arista ``snmp-server community /
      location / contact / host`` ↔ OPNsense
      ``<snmpd>/<rocommunity>/<syslocation>/<syscontact>/
      <traphost>``.  Arista's ``rw`` keyword degrades to RO on
      canonical (only the first community survives).  v3 USM is
      unsupported on OPNsense (lives in plugin's snmpd.conf, not
      config.xml — see codec's ``/snmp/v3-user`` unsupported
      entry); ``v3_users`` records drop on the cross-pair and
      the rename-pane shows the ``snmpv3`` unsupported-category
      banner declared on the OPNsense codec's
      ``unsupported_rename_categories`` frozenset.
    references: [opnsense-snmp, arista-snmp-cg]

  lags:
    disposition: lossy
    reason: >
      Arista ``Port-Channel<N>`` (capital-C, one-based) ↔
      OPNsense ``lagg<N>`` (FreeBSD lagg(4) driver naming, zero-
      based), so ``Port-Channel1`` ↔ ``lagg0`` via the port-
      rename mesh.  Member lists round-trip via the rename mesh.
      LACP modes collapse: Arista active / passive both render as
      OPNsense ``<proto>lacp</proto>`` (FreeBSD always advertises
      actively).  Arista static mode (``on``) maps to OPNsense
      ``<proto>none</proto>``.  PAgP-style modes don't apply
      (Arista has no PAgP).  OPNsense codec parses ``<laggs>``
      but its capability matrix doesn't currently advertise
      ``/lag/aggregate``; render is partial pending wire-up.
    references: [opnsense-laggs, arista-lacp-cg]

  local_users:
    disposition: lossy
    reason: >
      Arista ``$1$`` (MD5-crypt) and ``$6$`` (SHA-512-crypt)
      hashes are NOT bcrypt and OPNsense will reject them on
      apply via the FreeBSD ``crypt(3)`` allowed-prefix list
      (bcrypt-only).  Operators must reset passwords on the
      OPNsense target.  Privilege number (0-15) collapses to
      OPNsense's binary admin / non-admin via group membership:
      privilege >= 15 → ``<groupname>admins</groupname>``,
      otherwise ``<groupname>users</groupname>``.  Arista role
      tokens (``network-admin`` / ``network-operator`` / custom
      roles) collapse to OPNsense's binary group surface.  Both
      codecs pass hashes through verbatim per canonical doctrine;
      loss surfaces in the validation report.
    references: [opnsense-users, arista-user-security]

  radius_servers:
    disposition: good
    note: >
      Arista ``radius-server host <ip> key <secret>`` (with
      separate ``radius-server key <secret>`` global default and
      optional ``auth-port`` / ``acct-port`` overrides) ↔
      OPNsense ``<authserver>`` with ``<type>radius</type>``,
      ``<host>``, ``<radius_secret>``, ``<radius_auth_port>``,
      ``<radius_acct_port>``.  Round-trips host / port pair /
      shared key cleanly with default ports 1812 / 1813.
      Arista's optional ``timeout`` / ``retransmit`` per-server
      directives have no canonical model and drop on render.
    references: [opnsense-radius, arista-snmp-cg]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: unsupported
    reason: >
      OPNsense codec capability matrix lists ``/vxlan-vnis/vni``
      under unsupported with rationale "VXLAN not modelled —
      OPNsense is a firewall codec."  Arista codec capability
      matrix declares ``/vxlan-vnis/vni`` supported (Arista is a
      DC EVPN-VXLAN platform with a richly-documented
      ``interface Vxlan1`` grammar), so canonical
      ``vxlan_vnis`` may be populated on parse but drops
      entirely at the OPNsense render boundary.  Sub-fields
      (vlan_id, vni, mcast_group, flood_list, source_interface,
      udp_port) all share this disposition.
    references: [vxlan-evpn-unsupported, arista-vxlan-cg]

  evpn_type5_routes:
    disposition: unsupported
    reason: >
      EVPN Type-5 is a VRF-property model
      (CanonicalRoutingInstance.l3_vni) rather than per-prefix
      records.  No codec populates the per-prefix list today;
      OPNsense doesn't model EVPN at all (no MP-BGP,
      no address-family evpn, no VXLAN data-plane).  Cross-pair
      drops the entire concept.
    references: [vxlan-evpn-unsupported, arista-evpn-cg]

  routing_instances:
    disposition: unsupported
    reason: >
      OPNsense has no VRF / routing-instance model in
      ``config.xml``.  Arista codec capability matrix declares
      ``/routing-instances/instance`` supported (parses
      ``vrf instance <name>`` plus per-VRF RD / RT under
      ``router bgp``).  Cross-pair drops the entire VRF list
      including L3-VNI bindings, route-targets, route-
      distinguishers.
    references: [vxlan-evpn-unsupported, arista-evpn-cg]

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 dict by design — never auto-rendered.  Arista-source
      ACL / spanning-tree / BGP stanzas may land here but
      OPNsense target couldn't render them as XML rules anyway
      (firewall rules are unsupported per OPNsense codec
      capability matrix; the semantic mismatch between Arista
      stateless ACLs and OPNsense stateful pf rules makes
      auto-translation unsound regardless).
    references: [firewall-out-of-scope, arista-acls-cg]

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec does
      not consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: >
      Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: >
      OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``apply-groups`` statement
      preservation per GAP 9b).  Arista EOS source never
      populates this list; field is always empty on this
      cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Companion to apply_groups; same not_applicable status for
      Arista source.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The fundamental shape — what OPNsense models in config.xml
#     versus what Arista EOS models in running-config — is well
#     documented and unambiguous.  hostname / domain / interface
#     IPs / VLAN tags / SNMP v1/v2c / RADIUS round-trip cleanly.
#
#   * The wire-up gaps on the OPNsense side (no DNS / NTP /
#     syslog / timezone render path; no /dhcp/pool advertised;
#     no /lag/aggregate advertised; no /staticroutes render)
#     push several Tier-1 fields into 'lossy' rather than 'good'.
#     These are codec-implementation gaps, not vendor-modelling
#     gaps, and would close as wire-up lands.
#
#   * The DC-switch versus firewall role mismatch is unambiguously
#     'unsupported': switching state, VRF, VXLAN, EVPN are firmly
#     outside OPNsense's wheelhouse.  Confident.
#
#   * The hash-format incompatibility (Arista $1$ / $6$ versus
#     OPNsense bcrypt-only) is documented and confidently lossy.
#
# Deferred items (none — all fields walked and dispositioned):
#
#   * (none — every CanonicalIntent top-level field carries an
#     explicit per_field_expectation entry; sub-fields enumerated
#     where the disposition varies by sub-field).

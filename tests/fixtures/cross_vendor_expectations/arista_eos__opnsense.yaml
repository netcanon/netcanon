# Cross-vendor fidelity expectations: arista_eos -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_opnsense/
#
# Phase 3 follow-up pair.  Arista EOS is a DC-class L2/L3 switch
# widely deployed as the leaf in EVPN-VXLAN spine-leaf fabrics;
# OPNsense is a FreeBSD-based router/firewall (pfSense fork).  The
# wire-format mismatch is severe (Arista stanza CLI vs OPNsense
# `config.xml`) and the role mismatch is even sharper.  Shared
# canonical surface:
#
#   * hostname / domain — good
#   * DNS / NTP / syslog / timezone — lossy until OPNsense parse +
#     render wires up the corresponding `<system>` children
#   * interfaces (IP, MTU, enable, descr) — good
#   * VLANs — id good; name/description collapse; port-membership
#     and SVI sub-fields unsupported
#   * Static routes — lossy (OPNsense `<gateways>` + `<staticroutes>`
#     model is two-stage, codec doesn't currently render either)
#   * DHCP server scopes — lossy (interface-keyed pool model on
#     OPNsense, lease-time unit conversion)
#   * SNMP v1/v2c — good; SNMPv3 USM unsupported (lives in plugin's
#     snmpd.conf, not config.xml)
#   * Local users — lossy (Arista $1$ / $6$ crypt forms vs OPNsense
#     bcrypt; privilege number ↔ groupname collapse)
#   * RADIUS — good
#   * LAGs — lossy (Port-Channel<N> ↔ lagg<N> rename, LACP mode
#     collapse on OPNsense's single 'lacp' proto)
#
# What's firmly out of scope on OPNsense (target unsupported):
#
#   * Arista EVPN-VXLAN fabric: vxlan_vnis, evpn_type5_routes,
#     routing_instances, per-interface VRF — OPNsense has no VXLAN
#     data-plane, no EVPN BGP control-plane, no VRF schema in
#     `config.xml`.
#   * Arista switchport state, voice-VLAN, spanning-tree —
#     OPNsense has no switching fabric.
#   * OPNsense firewall / NAT / VPN — out of scope on Arista source
#     side (not in canonical anyway).

meta:
  source_vendor: arista_eos
  target_vendor: opnsense
  primary_use_case: >
    Edge migration: Arista EOS DC leaf -> OPNsense firewall/router
    (e.g. converting a small leaf switch into a routed firewall
    edge as a topology simplification).  Shared surface is hostname
    / domain / DNS / NTP / syslog / interface IPs / VLAN tags /
    SNMP v1/v2c / RADIUS / local users / DHCP server pools / LAGs.
    Arista EVPN-VXLAN fabric (vxlan_vnis, evpn_type5_routes, VRFs,
    BGP RD/RT) and switching state (switchport modes, spanning-
    tree, voice-VLAN) are firmly out of scope on the OPNsense side.
    OPNsense's firewall / NAT / VPN feature set is firmly out of
    scope on the Arista source side.
  certainty: medium
  references:
    - id: opnsense-interfaces
      path: docs/vendor-references/arista_eos_to_opnsense/interfaces.md
      title: "OPNsense Interfaces manual"
      source_url: "https://docs.opnsense.org/manual/interfaces.html"
      retrieved: "2026-04-30"

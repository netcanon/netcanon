# Cross-vendor fidelity expectations: opnsense -> mikrotik_routeros
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_mikrotik_routeros/
#
# Reverse direction of mikrotik_routeros__opnsense.yaml.  OPNsense is
# a FreeBSD-based router/firewall (pfSense fork); MikroTik RouterOS is
# an SMB / WISP router-first OS with optional bridge.  Both target
# small-network use cases.  The asymmetry from the forward direction
# is sharp:
#
#   * RouterOS-source-only fields (Plane-2 bridge VLAN filtering port
#     lists, switching state) are 'unsupported' on OPNsense target in
#     the forward direction.  In this REVERSE direction, those fields
#     are 'not_applicable' — the OPNsense parser never populates them,
#     so there's nothing to lose, and the RouterOS target codec can
#     render them when the canonical lists ARE populated (just not
#     from this source).
#
#   * OPNsense-source-only fields (firewall rules, NAT, VPN, captive
#     portal) never reach the canonical surface (parse-and-ignored
#     per OPNsense codec capability matrix 'unsupported' entries).
#     RouterOS target also lists firewall / NAT under unsupported
#     (Tier-3).  Cross-pair: both ends drop.
#
# Hash incompatibility runs in this direction too: OPNsense bcrypt
# (`$2y$`) is not a documented format for cross-vendor injection into
# RouterOS's vendor-private password store.  Operators must re-set
# passwords manually on the RouterOS target post-migration.

meta:
  source_vendor: opnsense
  target_vendor: mikrotik_routeros
  primary_use_case: >
    Small-network migration: OPNsense firewall/router -> MikroTik
    RouterOS SMB / WISP router (typical: operator consolidating from
    a FreeBSD-based firewall onto a RouterOS device, or scaling DOWN
    a multi-purpose OPNsense deployment to dedicated RouterOS
    hardware for routing-heavy use cases).  Shared canonical surface
    is hostname / domain / interface IPs / VLAN tags / DHCP scopes /
    SNMP v1/v2c / RADIUS / LAGs.  OPNsense source's switching state
    and VRF surface are empty (no model on OPNsense), so the cross-
    pair has nothing to lose on those fields.  OPNsense's firewall
    / NAT / VPN feature set is out of canonical scope and parse-and-
    ignored on the source side.
  certainty: medium
  references:
    - id: opnsense-system
      path: docs/vendor-references/opnsense_to_mikrotik_routeros/system_services.md
      title: "OPNsense General Settings manual"
      source_url: "https://docs.opnsense.org/manual/settingsmenu.html"
      retrieved: "2026-04-30"

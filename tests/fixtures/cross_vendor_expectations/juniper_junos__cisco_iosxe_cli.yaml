# Cross-vendor fidelity expectations: juniper_junos -> cisco_iosxe_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_cisco_iosxe_cli/
#
# DC / carrier-grade pair, reverse direction.  Junos models richer
# per-instance detail (instance-type discriminator, apply-groups
# inheritance, per-VRF policy-statement plumbing) that Cisco's stanza
# model doesn't express; the asymmetry with the cisco_iosxe_cli ->
# juniper_junos pair is documented per-field.

meta:
  source_vendor: juniper_junos
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    Juniper Junos -> Cisco IOS-XE migration (QFX / EX / MX ->
    Catalyst / ASR).  Set-form to stanza-form structural
    transformation; canonical-portable feature surface remains
    wide.  Junos source can express constructs (apply-groups,
    instance-type variants, vrf-target policy) that flatten on
    Cisco render.
  certainty: medium
  references:

# Cross-vendor fidelity expectations: opnsense -> cisco_iosxe_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_cisco_iosxe_cli/
#
# Reverse direction of cisco_iosxe_cli__opnsense.yaml.  OPNsense is
# a FreeBSD-based router/firewall; Cisco IOS-XE is a switching/
# routing platform.  The asymmetry from the forward direction is
# sharp:
#
#   * Cisco-source-only fields (switchport state, VRF membership,
#     VXLAN/EVPN) are 'unsupported' on OPNsense target in the
#     forward direction.  In this REVERSE direction, those fields
#     are 'not_applicable' — the OPNsense parser never populates
#     them, so there's nothing to lose, and the Cisco target codec
#     can render them when the canonical list IS populated (just
#     not from this source).
#
#   * OPNsense-source-only fields (firewall rules, NAT, VPN,
#     captive portal) never reach the canonical surface (parsed
#     and dropped per the OPNsense codec's capability matrix
#     'unsupported' entries).  On the Cisco target side the same
#     ACL / NAT / crypto surface is also out of canonical scope.
#     Cross-pair: 'unsupported' — both ends drop.
#
# Hash incompatibility runs the same direction as the forward
# pair: bcrypt (`$2y$`) on OPNsense isn't a valid Cisco hash type.

meta:
  source_vendor: opnsense
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    Small-network migration: OPNsense firewall/router -> Cisco IOS-XE
    router/L3-switch.  Shared canonical surface is hostname / domain /
    interface IPs / VLAN tags / SNMP v1/v2c / local users / RADIUS.
    OPNsense source's switching state and VRF surface are empty
    (no model on OPNsense), so the cross-pair has nothing to lose
    on those fields.  OPNsense's firewall / NAT / VPN feature set is
    out of canonical scope and parse-and-ignored on the source side.
  certainty: medium
  references:
    - id: opnsense-interfaces
      path: docs/vendor-references/opnsense_to_cisco_iosxe_cli/interfaces.md
      title: "OPNsense Interfaces manual"
      source_url: "https://docs.opnsense.org/manual/interfaces.html"
      retrieved: "2026-04-30"
    - id: opnsense-vlans

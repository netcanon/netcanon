# ---------------------------------------------------------------------------
# Per-field expectations — walks every CanonicalIntent top-level field.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      OPNsense ``<system>/<hostname>`` ↔ Cisco ``hostname <name>``.
      Lossless round-trip for the bare short name.
    references: [opnsense-system]

  domain:
    disposition: good
    note: >
      OPNsense ``<system>/<domain>`` ↔ Cisco ``ip domain name <fqdn>``.
      Both vendors model the DNS suffix as a separate scalar.
    references: [opnsense-system]

  dns_servers:
    disposition: good
    note: >
      OPNsense's repeated ``<system>/<dnsserver>`` elements map
      to Cisco's ``ip name-server`` lines via the canonical
      ``list[str]``.  Wave 10β re-flip after the OPNsense parser
      landed ``<dnsserver>`` -> ``CanonicalIntent.dns_servers``
      wire-up.
    references: [opnsense-system]

  ntp_servers:
    disposition: lossy
    reason: >
      OPNsense's space-separated ``<system>/<timeservers>`` element
      would map to Cisco's per-line ``ntp server`` directives.  The
      OPNsense codec does not currently parse ``<timeservers>`` into
      the canonical ``ntp_servers`` list.  Per-server NTP options
      (prefer / iburst) are not modelled on either side.
    references: [opnsense-system]

  timezone:
    disposition: lossy
    reason: >
      OPNsense's Olson zoneinfo ID (``<timezone>America/Los_Angeles``)
      versus Cisco's offset+DST tokens (``clock timezone PST -8 0``)
      carry different semantics.  OPNsense codec also doesn't wire
      timezone into canonical today.  Operator-curated mapping
      required.
    references: [opnsense-system]

  syslog_servers:
    disposition: lossy
    reason: >
      OPNsense ``<system>/<syslog>/<remoteserver>`` would map to
      Cisco ``logging host`` lines.  OPNsense codec does not
      currently wire syslog into the canonical list.  Severity /
      facility tokens are not modelled.
    references: [opnsense-system]

  interfaces:
    disposition: lossy
    reason: >
      The list itself round-trips; per-interface sub-fields vary
      from good to not_applicable.  See ``interfaces[].*`` entries.
    references: [opnsense-interfaces, cisco-iface-cmd-ref]

  interfaces[].name:
    disposition: lossy
    reason: >
      OPNsense's zone label (``wan`` / ``lan`` / ``opt1``) doesn't
      match any Cisco interface form.  The BSD device name (``em0``)
      doesn't either.  Port-rename mesh handles the conversion via
      the codec's ``classify_port_name`` / ``format_port_identity``
      delegates.  Canonical preserves the source string verbatim.
    references: [opnsense-interfaces, cisco-iface-cmd-ref]

  interfaces[].description:
    disposition: good
    note: >
      OPNsense ``<descr>`` (no length limit) ↔ Cisco ``description``
      (240-char truncation).  Long OPNsense descriptions truncate
      on Cisco render.
    references: [opnsense-interfaces]

  interfaces[].enabled:
    disposition: good
    note: >
      OPNsense empty ``<enable/>`` element ↔ Cisco ``no shutdown``.
    references: [opnsense-interfaces]

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      OPNsense doesn't surface a type field; the canonical type
      hint is empty from an OPNsense source.  Cisco renderer infers
      from the synthesised port name.

  interfaces[].mtu:
    disposition: good
    note: >
      OPNsense ``<mtu>N</mtu>`` ↔ Cisco ``mtu <N>``.  Both render
      explicitly when set.
    references: [opnsense-interfaces]

  interfaces[].ipv4_addresses:
    disposition: good
    note: >
      OPNsense ``<ipaddr>`` + ``<subnet>`` (CIDR prefix) ↔ Cisco
      ``ip address X Y`` (dotted-mask).  Conversion is mechanical.
      OPNsense models one IPv4 per zone interface natively, matching
      the canonical primary-only convention.
    references: [opnsense-interfaces]

  interfaces[].ipv6_addresses:
    disposition: good
    note: >
      OPNsense ``<ipaddrv6>`` + ``<subnetv6>`` ↔ Cisco
      ``ipv6 address X/N``.  ``scope`` discriminator preserved.
      OPNsense's non-static IPv6 keywords (``dhcp6``, ``track6``,
      ``slaac``, ``6rd``, ``6to4``) are parse-and-ignored on the
      OPNsense side (no canonical record).
    references: [opnsense-interfaces]

  interfaces[].switchport_mode:
    disposition: not_applicable
    note: >
      OPNsense never populates this field on parse — no switching
      fabric, no switchport concept.  The Cisco target codec CAN
      render switchport stanzas when the canonical list is
      populated; just not from this source.  Cisco render emits
      routed-port stanzas (no ``switchport`` lines).
    references: [switching-not-modeled]

  interfaces[].access_vlan:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — OPNsense never populates.
    references: [switching-not-modeled]

  interfaces[].trunk_allowed_vlans:
    disposition: not_applicable
    note: >
      Same as switchport_mode — OPNsense never populates.
    references: [switching-not-modeled]

  interfaces[].trunk_native_vlan:
    disposition: not_applicable
    note: >
      Same as switchport_mode — OPNsense never populates.
    references: [switching-not-modeled]

  interfaces[].voice_vlan:
    disposition: not_applicable
    note: >
      OPNsense has no LLDP-MED voice-VLAN signalling in the base
      OS; never populates this field.
    references: [switching-not-modeled]

  interfaces[].lag_member_of:
    disposition: lossy
    reason: >
      OPNsense ``<laggs>/<lagg>/<members>`` parsing back-links each
      member to its parent ``<laggif>`` name.  Cisco render emits
      ``channel-group N mode active`` on the member side; the LAG
      name itself differs (``lagg0`` ↔ ``Port-channel0``).
      Port-rename mesh canonicalises.
    references: [opnsense-laggs]

  interfaces[].dhcp_client:
    disposition: lossy
    reason: >
      OPNsense ``<ipaddr>dhcp</ipaddr>`` ↔ Cisco ``ip address dhcp``.
      Neither codec currently wires this into
      ``CanonicalInterface.dhcp_client``; cross-pair drops pending
      wire-up.
    references: [opnsense-interfaces]

  interfaces[].vrf:
    disposition: not_applicable
    note: >
      OPNsense interfaces have no VRF-membership concept; the field
      is always empty on OPNsense-source intent.  Cisco target
      could render ``vrf forwarding <name>`` when the field is
      populated; just not from this source.
    references: [vrf-not-modeled]

  vlans:
    disposition: good
    note: >
      The canonical VLAN list round-trips across the pair (Wave
      10β re-flip from lossy to good — per-VLAN sub-field
      semantics are documented separately on the ``vlans[].*``
      entries below).
    references: [opnsense-vlans, cisco-vlan-cg]

  vlans[].id:
    disposition: good
    note: >
      OPNsense ``<vlan>/<tag>N</tag>`` ↔ Cisco ``vlan N``.
    references: [opnsense-vlans, cisco-vlan-cg]

  vlans[].name:
    disposition: lossy
    reason: >
      OPNsense's ``<descr>`` lands in canonical ``name`` (per
      ``parse.py``).  Cisco's distinct ``name`` and ``description``
      fields are collapsed; the round-trip emits the OPNsense
      description into the Cisco ``name`` line.  No data loss but
      semantic conflation.
    references: [opnsense-vlans, cisco-vlan-cg]

  vlans[].description:
    disposition: lossy
    reason: >
      OPNsense doesn't model a separate description field; the
      ``<descr>`` lands in canonical ``name`` instead, leaving
      ``description`` empty.  Cisco render emits no separate
      description line.
    references: [opnsense-vlans]

  vlans[].tagged_ports:
    disposition: not_applicable
    note: >
      OPNsense never populates VLAN-centric port-membership lists
      (no such concept — every ``<vlans>/<vlan>`` rides its parent
      NIC).  Cisco target codec CAN emit
      ``switchport trunk allowed vlan`` stanzas when the canonical
      list is populated; just not from this source.
    references: [switching-not-modeled, opnsense-vlans]

  vlans[].untagged_ports:
    disposition: not_applicable
    note: >
      Same as tagged_ports — OPNsense never populates this list.
    references: [switching-not-modeled]

  vlans[].ipv4_addresses:
    disposition: lossy
    reason: >
      OPNsense's L3 face of a VLAN tag is the zone owning the
      ``<vlanif>`` device, not a first-class SVI on the VLAN
      itself.  The OPNsense parser does not currently populate
      ``CanonicalVlan.ipv4_addresses``; the Cisco target therefore
      emits no ``interface Vlan<N>`` stanza on the cross-pair.
      Lands when OPNsense parse wire-up surfaces the zone-side
      L3 address into the canonical SVI list.
    references: [opnsense-vlans]

  static_routes:
    disposition: lossy
    reason: >
      OPNsense splits static-route declaration into ``<gateways>``
      (named gateways with bound interface) and ``<staticroutes>``
      (routes referencing named gateways).  The OPNsense codec does
      not currently parse either block into the canonical
      ``static_routes`` list; Cisco target therefore emits no
      ``ip route`` lines from an OPNsense source.  Lands when
      OPNsense parse wire-up completes and the gateway-name
      indirection is resolved to bare next-hop IPs.
    references: [opnsense-gateways]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: lossy
    reason: >
      OPNsense interface-keyed ``<dhcpd>/<lan>``-style pools (with
      network inferred from zone interface) ↔ Cisco named
      ``ip dhcp pool USERS / network X Y / default-router /
      dns-server / lease`` form.  Lease time conversion (seconds
      ↔ d/h/m).  Cisco's ``ip dhcp excluded-address`` form is not
      modelled on either side.  OPNsense parses ``<dhcpd>`` into
      the canonical list; Cisco codec doesn't advertise
      ``/dhcp/pool`` in its capability matrix, so cross-pair
      render is partial.
    references: [opnsense-dhcp]

  snmp:
    disposition: good
    note: >
      v1/v2c surface (community / location / contact / trap_hosts)
      round-trips cleanly — OPNsense ``<snmpd>/<rocommunity>/
      <syslocation>/<syscontact>/<traphost>`` ↔ Cisco
      ``snmp-server community/location/contact/host``.  v3 USM is
      not_applicable from OPNsense source: the data lives in the
      Net-SNMP plugin's ``snmpd.conf``, not config.xml (per
      OPNsense codec's ``/snmp/v3-user`` unsupported entry).  No
      v3 records to migrate.  Cisco target codec CAN render
      ``snmp-server user`` when the canonical v3_users list is
      populated; just not from this source.  Wave 10β re-flip
      from lossy to good — the canonical ``snmp`` dict round-trips
      with v3 absence captured as not_applicable on the source
      side rather than an active drop.
    references: [opnsense-snmp]

  lags:
    disposition: lossy
    reason: >
      OPNsense ``<laggs>/<lagg>`` (FreeBSD lagg(4) driver) ↔ Cisco
      ``Port-channel<N>``.  Member lists round-trip via port-rename
      mesh.  ``<proto>lacp</proto>`` ↔ Cisco ``mode active``.
      OPNsense's ``failover`` / ``loadbalance`` / ``roundrobin``
      modes have no LACP equivalent on Cisco; cross-pair render
      degrades to ``mode on`` (static, no LACP exchange).
      OPNsense parses ``<laggs>`` but Cisco codec doesn't advertise
      ``/lag/aggregate`` in its capability matrix.
    references: [opnsense-laggs]

  local_users:
    disposition: lossy
    reason: >
      OPNsense bcrypt (``$2y$``) hashes are NOT a valid Cisco hash
      type (Cisco type-5 ``$1$``, type-8 ``$4$``, type-9 ``$9$``).
      The Cisco renderer passes the bcrypt hash through verbatim
      into the ``secret`` line but the device rejects it on apply;
      operators must reset passwords on the Cisco target.
      Privilege number maps cleanly: OPNsense parser sets
      privilege_level=15 for ``<groupname>admins</groupname>`` and
      1 otherwise; Cisco render uses the same scale.  ``role`` is
      lossy: OPNsense's free-form group name doesn't fit Cisco's
      privilege-only model.
    references: [opnsense-users, cisco-user-security]

  radius_servers:
    disposition: good
    note: >
      OPNsense ``<authserver>`` records with ``<type>radius</type>``,
      ``<host>``, ``<radius_secret>``, ``<radius_auth_port>``,
      ``<radius_acct_port>`` ↔ Cisco modern named-server form
      ``radius server NAME / address ipv4 X auth-port acct-port /
      key <secret>``.  Round-trips host / key / port pair cleanly.
      OPNsense's ``<radius_protocol>MSCHAPv2`` and
      ``<radius_timeout>`` are not modelled in the canonical
      schema; Cisco defaults apply.

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      OPNsense has no VXLAN model in config.xml; the codec
      capability matrix lists ``/vxlan-vnis/vni`` as unsupported
      with rationale "VXLAN not modelled — OPNsense is a firewall
      codec."  Canonical list is always empty from this source.
      Cisco target codec also lists ``/vxlan-vnis/vni`` as
      unsupported pending Catalyst VXLAN demand.

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      EVPN Type-5 has no OPNsense surface; the canonical list is
      always empty from this source.

  routing_instances:
    disposition: not_applicable
    note: >
      OPNsense has no VRF / routing-instance model; the canonical
      list is always empty from this source.  Cisco target codec
      could render ``vrf definition <name>`` blocks when the
      canonical list is populated; just not from this source.
    references: [vrf-not-modeled]

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 dict by design — never auto-rendered.  OPNsense
      firewall / NAT / VPN / captive portal blocks could in
      principle land here as Tier-3 raw text, but the OPNsense
      parser does not currently route them; cross-pair drops
      these vendor-private surfaces silently.
    references: [firewall-drops]

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; informational metadata.

  source_format:
    disposition: not_applicable
    note: >
      Same as source_vendor — informational metadata.

  source_version:
    disposition: not_applicable
    note: >
      OS version hint from the parser; informational metadata.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``apply-groups``).  OPNsense source
      never populates this list.

  group_content:
    disposition: not_applicable
    note: >
      Companion to apply_groups; same not_applicable status.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * Symmetry with the forward direction: the documented modelling
#     boundaries are the same (OPNsense lacks switchport / VRF / VXLAN;
#     OPNsense firewall / NAT / VPN are out of canonical scope).
#     The only difference is which side of the cross-pair holds the
#     ``not_applicable`` versus ``unsupported`` label.  Confident.
#
#   * Several Tier-1 fields (DNS / NTP / syslog / timezone / static
#     routes) are 'lossy' rather than 'not_applicable' because
#     OPNsense DOES carry the data in config.xml — the OPNsense
#     parser just doesn't currently surface it into the canonical
#     tree.  Codec-implementation gap, not vendor-modelling gap.
#
#   * Hash incompatibility is symmetric: bcrypt (`$2y$`) on OPNsense
#     versus Cisco's recognised hash types means cross-pair always
#     degrades.  Both codecs pass hashes through verbatim; the loss
#     surfaces in the validation report.
#
#   * The router/firewall versus router/switch role mismatch
#     manifests as ``not_applicable`` here (source has no data to
#     translate) versus ``unsupported`` in the forward pair (target
#     can't accept the data).
#
# Deferred items:
#
#   * (none — every CanonicalIntent top-level field carries an
#     explicit per_field_expectation entry; sub-fields enumerated
#     where the disposition varies by sub-field).

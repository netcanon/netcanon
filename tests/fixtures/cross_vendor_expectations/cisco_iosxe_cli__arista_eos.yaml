# Cross-vendor fidelity expectations: cisco_iosxe_cli -> arista_eos
#
# This file enumerates the per-field translation disposition for every
# top-level field on CanonicalIntent (see netconfig/migration/canonical/
# intent.py).  Each disposition is grounded in vendor documentation
# excerpts under docs/vendor-references/cisco_iosxe_cli_to_arista_eos/.
#
# Schema authored by Agent A in tests/fixtures/cross_vendor_expectations/
# README.md (sibling file).  Disposition vocabulary:
#   good            - field round-trips without semantic loss
#   lossy           - field round-trips with documented degradation
#   unsupported     - field is parse-and-ignore on one or both codecs
#   not_applicable  - field has no concept on the target vendor
#
# Phase 3b deliverable.  Cisco IOS-XE -> Arista EOS is the second
# worked-example pair after the arista_eos -> juniper_junos pair (Agent
# A).  This pair is high-feature-overlap (DC-to-DC migration; Arista
# EOS deliberately mirrors Cisco IOS for low onboarding friction).

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: arista_eos
  primary_use_case: >
    Cisco IOS-XE -> Arista EOS DC migration; high feature overlap
    (Arista EOS deliberately mirrors Cisco IOS CLI grammar for
    low operator onboarding cost).  The keyword-stable surface
    (vlans / switchport / static routes / SNMP v1/v2c / hostname /
    NTP / DNS / logging) round-trips cleanly; semantic-divergent
    surfaces (interface naming, VRF, local user hashes, routing
    protocols) are flagged lossy or unsupported.
  certainty: medium
  references:
    - id: vlans
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/vlans.md
      title: "VLAN configuration: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-virtual-lans-vlans"
      retrieved: "2026-04-30"
    - id: switchport
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/switchport.md
      title: "Switchport mode: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-virtual-lans-vlans"
      retrieved: "2026-04-30"
    - id: interface_naming
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/interface_naming.md
      title: "Interface naming: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/interface/command/ir-cr-book/ir-s7.html"
      retrieved: "2026-04-30"
    - id: ip_addressing
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/ip_addressing.md
      title: "IPv4 / IPv6 addressing: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-ipv4"
      retrieved: "2026-04-30"
    - id: static_routes
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/static_routes.md
      title: "Static routes: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-ipv4"
      retrieved: "2026-04-30"
    - id: vrf
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/vrf.md
      title: "VRF / routing-instance: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-static-inter-vrf-route"
      retrieved: "2026-04-30"
    - id: snmp
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/snmp.md
      title: "SNMP: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-snmp"
      retrieved: "2026-04-30"
    - id: local_users
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/local_users.md
      title: "Local users + hash formats: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-user-security"
      retrieved: "2026-04-30"
    - id: aaa
      path: docs/vendor-references/cisco_iosxe_cli_to_arista_eos/aaa.md
      title: "AAA / TACACS+ / RADIUS: Cisco IOS-XE versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-user-security"

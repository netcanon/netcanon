# Cross-vendor expectations: aruba_aoss -> mikrotik_routeros
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_mikrotik_routeros/
#
# Phase 3 follow-up pair: enterprise switch (Aruba ProCurve heritage,
# 2930F / 2930M / 3810 / 5400R) to SMB/WISP router (MikroTik RouterOS).
# Wire formats differ greatly (Aruba Cisco-style stanza grammar vs
# RouterOS /export section-and-set form), and the underlying
# switching philosophy differs even more (Aruba L2-by-default vs
# RouterOS L3-by-default with optional bridge for switching).
#
# Asymmetry on this direction concentrates on:
#
#   * VLAN port-membership model: Aruba's native VLAN-centric form
#     populates the canonical lists directly, but RouterOS Plane-2
#     (bridge VLAN filtering) parsing is partial in v1 — render
#     emits a partially populated bridge-VLAN table.
#   * Loopback emulation: Aruba has no loopback at all; cross-pair
#     loopback handling is poor in either direction.
#   * Tier-3 RouterOS-rich plumbing (firewall / NAT / queues /
#     wireless / scripts) is structurally absent on the source side
#     for this direction (Aruba does not model any of these as
#     first-class config), so nothing is lost on Aruba -> RouterOS
#     migration of canonical scope.
#   * VRF / VXLAN / EVPN / dynamic routing protocols are
#     not_applicable on the Aruba source side (no platform support)
#     and unsupported on the RouterOS target side (codec parser
#     gap).

meta:
  source_vendor: aruba_aoss
  target_vendor: mikrotik_routeros
  primary_use_case: >
    Enterprise Aruba ProCurve / AOS-S (2930F / 2930M / 3810 /
    5400R) switch retired in favour of a MikroTik RouterOS deployment
    (typical: SMB consolidating from a campus-switch estate to a
    smaller router-first footprint, or operators repurposing
    edge-switch hardware behind a RouterOS L3 boundary).  The basic
    surface (hostname / DNS / SNTP-NTP / IPv4-IPv6 addresses /
    static routes / SNMP v1/v2c) round-trips with documented losses;
    deeper switching-plane state (VLAN port lists, switchport mode)
    suffers from the model mismatch and from RouterOS Plane-2
    parser partiality.
  certainty: medium
  references:

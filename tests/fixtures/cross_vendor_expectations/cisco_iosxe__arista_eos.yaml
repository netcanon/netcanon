# Cross-vendor fidelity expectations: cisco_iosxe -> arista_eos
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML.  Distinct
# from cisco_iosxe_cli (operator-paste running-config text); both
# target the same Cisco device family but parse different wire formats.
# Target: arista_eos codec (EOS `show running-config` text), `certified`-
# grade.
#
# Direction-specific framing: the dominant asymmetry on this direction
# is OPPOSITE to the forward (`arista_eos -> cisco_iosxe`) pair.
# Forward: rich Arista source produces a populated canonical tree, target
# NETCONF render silently drops most of it.  Reverse (this pair): the
# cisco_iosxe parse path walks `<interfaces>` only and never populates
# `hostname`, `domain`, `dns_servers`, `ntp_servers`, `vlans`,
# `static_routes`, `routing_instances`, `lags`, `local_users`,
# `radius_servers`, or `snmp` from the source XML.  These fields are
# empty on the canonical tree input to the Arista render — there is
# no data to drop.
#
# For these fields the disposition is `not_applicable` (parser never
# produces) rather than `unsupported` (target codec semantically
# declines to emit declared canonical data).  Same operational meaning
# — the operator gets nothing on the wire — but a structurally
# different schema label that distinguishes "data loss happened
# upstream of the codec" from "the target codec declined to emit
# declared data".
#
# The Arista EOS target codec is by contrast `certified` and emits
# the full canonical surface: a hypothetical fully-wired cisco_iosxe
# parser would round-trip through this pair cleanly.  The limitation
# is purely on the source-codec parse-side — once the cisco_iosxe
# parser walks `<system>`, `<vlans>`, `<network-instances>`, `<snmp>`,
# etc., this YAML's `not_applicable` rows flip to `good` or `lossy`
# per the underlying canonical-model fidelity.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_arista_eos/
#
# Authored 2026-05-01 alongside the forward direction.

meta:
  source_vendor: cisco_iosxe
  target_vendor: arista_eos
  primary_use_case: >
    Cross-format migration: snapshot a Cisco Catalyst 9K / ISR4K /
    ASR1K device through NETCONF/OpenConfig and re-emit Arista EOS
    `running-config` for human review or for pasting into a sibling
    Arista device.  Demonstrates that the OpenConfig surface (as
    parsed by this codec) is a `narrow projection` of the full
    device config — a faithful Arista render of a NETCONF snapshot
    is NOT a recovery of the original Cisco device's full state.
    Operators wanting full fidelity across vendors should route
    through cisco_iosxe_cli (certified) on the source side instead.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/cisco_iosxe_to_arista_eos/interface-fields.md
      title: "openconfig-interfaces YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"

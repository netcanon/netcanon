# Cross-vendor expectations: aruba_aoss -> arista_eos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_arista_eos/
#
# Phase 3 cross-mesh pair: aruba_aoss mesh sweep.  Aruba AOS-S
# (ProCurve heritage L2/basic-L3 campus) is a strict subset of
# Arista EOS's feature surface.  The asymmetry runs source-poor to
# target-rich, so most of the "Arista-only" surface (VRF, VXLAN,
# EVPN, BGP, OSPF dynamic protocols) is structurally absent on the
# Aruba source — the canonical fields are empty and the Arista
# render emits nothing.  Re-classified as not_applicable rather
# than unsupported (an active drop on render):
#
#   * VRF / EVPN-VXLAN / EVPN Type-5 — Aruba source never populates
#     these (no platform support).
#   * DHCP server pools — Aruba is relay-only, so no source data
#     to lose.
#   * Routing protocols — Aruba supports OSPF/RIP only; both are
#     Tier-3 informational and not modelled on either codec's
#     canonical surface.
#
# Hash formats are still incompatible (Aruba SHA-1 / bcrypt versus
# Arista MD5 / SHA-512) so local_users remains lossy on this
# direction.

meta:
  source_vendor: aruba_aoss
  target_vendor: arista_eos
  primary_use_case: >
    Edge-to-DC migration where an Aruba AOS-S 2930F / 2930M /
    3810 / 5400R access switch is repurposed as an Arista
    Ethernet leaf, OR a campus refresh from Aruba ProCurve to
    Arista CloudVision-managed campus deployments.  Aruba source
    is L2/basic-L3 only, so most Arista-only DC surface (VRF,
    VXLAN, EVPN, dynamic routing) is structurally absent on the
    source side and the cross-pair has fewer lossy categories
    than the reverse direction.
  certainty: medium
  references:
    - id: vlans
      path: docs/vendor-references/aruba_aoss_to_arista_eos/vlans.md
      title: "VLAN configuration: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-virtual-lans-vlans"
      retrieved: "2026-05-01"
    - id: port_naming
      path: docs/vendor-references/aruba_aoss_to_arista_eos/port_naming.md
      title: "Port naming: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-data-transfer"
      retrieved: "2026-05-01"
    - id: ip_addressing
      path: docs/vendor-references/aruba_aoss_to_arista_eos/ip_addressing.md
      title: "IPv4 / IPv6 addressing: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-ipv4"
      retrieved: "2026-05-01"
    - id: static_routes
      path: docs/vendor-references/aruba_aoss_to_arista_eos/static_routes.md
      title: "Static routes: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-ipv4"
      retrieved: "2026-05-01"
    - id: snmp
      path: docs/vendor-references/aruba_aoss_to_arista_eos/snmp.md
      title: "SNMP: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-snmp"
      retrieved: "2026-05-01"
    - id: local_users
      path: docs/vendor-references/aruba_aoss_to_arista_eos/local_users.md
      title: "Local users + hash formats: Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arista.com/en/um-eos/eos-user-security"
      retrieved: "2026-05-01"
    - id: lags
      path: docs/vendor-references/aruba_aoss_to_arista_eos/lags.md
      title: "LAGs (Trk / Port-Channel): Aruba AOS-S versus Arista EOS"
      source_url: "https://www.arubanetworks.com/techdocs/AOS-S/16.10/ATMG/2930F-3810-5400/index.htm"
      retrieved: "2026-05-01"
    - id: system_services

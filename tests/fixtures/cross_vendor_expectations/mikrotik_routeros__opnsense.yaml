# Cross-vendor fidelity expectations: mikrotik_routeros -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/mikrotik_routeros_to_opnsense/
#
# Phase 3 follow-up pair.  MikroTik RouterOS is an SMB / WISP router-
# first OS with optional bridge for switching; OPNsense is a FreeBSD-
# based router/firewall (pfSense fork).  Both target small-network
# deployments but with different feature focus — RouterOS leans on
# routing / wireless / queues, OPNsense leans on firewall / NAT / VPN.
#
# Shared canonical surface:
#
#   * hostname — good
#   * domain — N/A (RouterOS has no first-class FQDN identity)
#   * DNS / NTP / syslog / timezone — lossy until OPNsense parse +
#     render wires up the corresponding `<system>` children
#   * interfaces (IP, MTU, enable, descr) — good (with rename-mesh
#     handling for etherN <-> zone-tag conversion)
#   * VLANs — id good; name/description collapse; port-membership and
#     SVI sub-fields unsupported (OPNsense has no VLAN-centric port
#     lists, no first-class SVI)
#   * Static routes — lossy (OPNsense `<gateways>` + `<staticroutes>`
#     two-stage model; codec doesn't currently render either)
#   * DHCP server scopes — lossy (interface-keyed pool model on
#     OPNsense; pool network inferred from zone interface)
#   * SNMP v1/v2c — good; SNMPv3 USM unsupported (lives in plugin's
#     snmpd.conf, not config.xml)
#   * Local users — unsupported password material (RouterOS /export
#     does NOT surface hashed passwords); OPNsense bcrypt-only
#     expectation cannot be satisfied from a RouterOS source
#   * RADIUS — good
#   * LAGs — lossy (bond<N> ↔ lagg<N> rename, Linux bonding mode
#     names ↔ FreeBSD lagg(4) protocol names; RouterOS-rich modes
#     collapse)
#
# What's firmly out of scope on OPNsense (target unsupported):
#
#   * RouterOS firewall / NAT / mangle / queues / wireless / hotspot
#     / scripts / scheduler / OVPN / IPsec / PPP — all Tier-3 on
#     canonical (raw_sections only)
#   * VRF / routing-instance — RouterOS codec parser gap AND OPNsense
#     has no VRF model in config.xml; structurally absent on both
#   * VXLAN / EVPN Type-5 — neither vendor models them in canonical scope

meta:
  source_vendor: mikrotik_routeros
  target_vendor: opnsense
  primary_use_case: >
    Small-network migration: MikroTik RouterOS SMB / WISP router ->
    OPNsense firewall/router.  Shared surface is hostname / DNS /
    interface IPs / VLAN tags / SNMP v1/v2c / RADIUS / LAGs.  RouterOS-
    rich plumbing (firewall, NAT, queues, wireless, scripts, IPsec,
    OVPN, hotspot) is firmly Tier-3 (raw_sections only).  OPNsense's
    firewall / NAT / VPN feature set is firmly out of scope on the
    RouterOS source side.  Local-user password material is the
    structural blocker — RouterOS /export does not include hashed
    passwords, so OPNsense user records render without `<password>`
    elements and operators must set passwords manually.
  certainty: medium
  references:
    - id: mikrotik_identity
      path: docs/vendor-references/mikrotik_routeros_to_opnsense/system_services.md
      title: "Identity — RouterOS"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/40992856/Identity"
      retrieved: "2026-04-30"

# Cross-vendor fidelity expectations: juniper_junos -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_opnsense/
#
# DC-class router → FreeBSD-firewall pair.  Junos models a much
# larger feature surface than OPNsense's `config.xml` expresses; this
# is the direction where Junos source actively populates rich
# canonical content (routing-instances, vxlan_vnis, apply-groups,
# v3 USM users, named user classes, multi-address interfaces) that
# the OPNsense render path either has no construct for (VRF, VXLAN,
# EVPN), expresses with structural collapse (VLAN port-membership,
# SVI absorption, multi-address per interface), or doesn't currently
# wire up (DNS / NTP / syslog / timezone / static routes / DHCP
# pools).
#
# What translates well:
#   * hostname / domain — direct mapping
#   * interface description / enable / MTU / IPv4 / IPv6 — close
#     structural match (modulo the per-unit family hierarchy
#     versus flat XML element)
#   * VLAN id (tag) — both share 1-4094 range
#   * SNMP v1/v2c — community / location / contact / trap_hosts
#   * RADIUS — host / port pair (shared secret format mismatch)
#
# What translates poorly:
#   * Junos apply_groups / group_content — `not_applicable` from the
#     OPNsense render perspective; the canonical content is flattened
#     pre-render and the group structure itself drops
#   * Junos `instance-type vrf` / `mac-vrf` / `virtual-router` —
#     `unsupported` on OPNsense (no VRF model)
#   * Junos VXLAN VNI mappings (per-VLAN + switch-options globals)
#     — `unsupported` on OPNsense
#   * Junos firewall filters / policy-statements — `unsupported` on
#     OPNsense (different firewall model entirely)
#   * Junos SNMPv3 USM users — `unsupported` on OPNsense (lives in
#     plugin's snmpd.conf, not config.xml)
#   * Junos named user classes — `lossy` (collapses to OPNsense
#     group binary)
#   * Junos `$6$` SHA-512 hashes — `lossy` (OPNsense expects bcrypt)
#   * Junos VLAN-centric port lists (transposed from per-interface
#     `family ethernet-switching vlan members`) — `unsupported` on
#     OPNsense (no VLAN-centric port-membership model)
#   * SVI L3 (irb.<N>) — `lossy` (OPNsense puts L3 on the zone, not
#     the VLAN)
#
# What's firmly out of scope on OPNsense (target unsupported):
#   * switchport modes / access_vlan / trunk_allowed_vlans /
#     trunk_native_vlan / voice_vlan — OPNsense has no switching
#     fabric.  Junos source COULD populate these on parse from a
#     QFX / EX switch config, so they're `unsupported` rather than
#     `not_applicable`.
#   * VRF / routing-instance — OPNsense has no VRF model
#   * VXLAN / EVPN Type-5 — OPNsense is a firewall codec
#
# OPNsense side: firewall rules / NAT / VPN are out of canonical
# scope on the source codec (out of scope here means they never reach
# the canonical surface, so they have no impact on the cross-pair).

meta:
  source_vendor: juniper_junos
  target_vendor: opnsense
  primary_use_case: >
    Junos DC-router / EX-switch -> OPNsense firewall/router
    migration.  Less common as a complete migration (DC-router and
    SOHO firewall are different roles), more common as a partial
    consolidation: a small office decommissioning a Junos branch
    router for an OPNsense appliance.  Shared canonical surface is
    hostname / domain / interface IPs / basic SNMP / RADIUS / static
    routes (when wire-up lands).  The Junos source's DC features
    (VRF, EVPN-VXLAN, apply-groups, named user classes) are firmly
    out of OPNsense scope.
  certainty: medium
  references:

# Cross-vendor fidelity expectations: aruba_aoss -> fortigate_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_fortigate_cli/
#
# This is a switch -> firewall pair.  Aruba AOS-S is a campus
# L2/L3 enterprise switch (ProCurve heritage 2930F / 2930M / 3810
# / 5400R) and FortiGate is a session-based stateful firewall with
# limited L2 hardware-switch surface.  The pair shares less feature
# surface than either to-Cisco direction:
#
#   * Aruba's switching-centric features (VLAN-as-stanza port lists,
#     spanning-tree, dhcp-snooping, IGMP) lose their target on
#     FortiGate (L3-only product surface).
#   * FortiGate's firewall / NAT / VPN / UTM product surface is
#     absent from the Aruba source (Tier 3 / not modelled in
#     canonical) so there is nothing to migrate.
#   * Foundations (hostname / DNS / NTP / SNMP / static-routes /
#     RADIUS / local-users / LAGs / DHCP scope) translate via the
#     canonical tree; per-field divergence is documented below.
#
# certainty=medium because:
#   * Shared scalar surface (hostname / DNS / NTP / SNMP v1+v2c /
#     RADIUS / static-routes / DHCP / local-users) is high-confidence
#     — both vendor docs are unambiguous and both codecs already
#     round-trip the canonical fields on real-capture fixtures.
#   * Switching features (Aruba's VLAN-centric tagged/untagged
#     port lists, spanning-tree, dhcp-snooping) are confidently
#     unsupported on FortiGate — no L2 product surface beyond the
#     hardware-switch sub-feature on a few low-end models.
#   * Firewall / NAT / VPN / UTM and VDOM are confidently
#     unsupported in the source -> target direction (Aruba never
#     populates these canonical fields, but FortiGate-side they are
#     vendor-private and out of v1 scope).
#   * VRF / VXLAN / EVPN are confidently not_applicable on this
#     direction (Aruba source carries no VRF / VXLAN intent).
#   * DHCP is medium-confidence lossy (model divergence: Aruba
#     codec does not advertise /dhcp/pool but emits the pool config
#     verbatim into a relay-comment block; the FortiGate target
#     parses interface-bound pools).

meta:
  source_vendor: aruba_aoss
  target_vendor: fortigate_cli
  primary_use_case: >
    Aruba ProCurve / AOS-S campus switch -> FortiGate firewall edge
    consolidation.  Common scenario: collapsing a Cisco-IOS-flavoured
    AOS-S edge switch into a FortiGate as a converged
    routing-and-security appliance, retiring the dedicated L2 access
    box.  System services + IPv4/IPv6 + LAG + RADIUS surfaces
    translate; AOS-S's dense L2 surface (VLAN-centric port lists,
    spanning-tree, voice-via-LLDP-MED) loses its target because
    FortiGate is L3-only.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/aruba_aoss_to_fortigate_cli/system_services.md

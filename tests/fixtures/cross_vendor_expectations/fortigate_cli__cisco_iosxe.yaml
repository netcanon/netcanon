      title: "Interface canonical-core fields: fortigate_cli to cisco_iosxe"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/954635/interface-settings"
      retrieved: "2026-05-01"
    - id: ipv6_addresses
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe/ipv6_addresses.md
      title: "IPv6 addresses: fortigate_cli source to cisco_iosxe target"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-if-ip.html"
      retrieved: "2026-05-01"
    - id: vlan_render_gap
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe/vlan_render_gap.md
      title: "VLAN render gap: fortigate_cli source to cisco_iosxe target"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-vlan.html"
      retrieved: "2026-05-01"
    - id: snmp_render_gap
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe/snmp_render_gap.md
      title: "SNMP render gap: fortigate_cli source to cisco_iosxe target"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-05-01"
    - id: vxlan_evpn_gap
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe/vxlan_evpn_gap.md

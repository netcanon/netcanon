# Cross-vendor fidelity expectations: fortigate_cli -> cisco_iosxe
#
# Source: fortigate_cli codec — FortiOS CLI text.
# Target: cisco_iosxe codec — OpenConfig NETCONF YANG XML.
#
# Reverse-direction sibling of cisco_iosxe__fortigate_cli.yaml with the
# OPPOSITE asymmetry framing.  The forward direction is bottlenecked
# on the source PARSER (cisco_iosxe walks <interfaces> only; everything
# else is `not_applicable`).  This direction is bottlenecked on the
# target RENDERER: the FortiGate parser populates the full canonical
# surface (hostname, DNS, NTP, VLANs, static_routes, SNMP v1/v2c/v3,
# RADIUS, local users, LAGs, DHCP server pools), but the cisco_iosxe
# NETCONF render only walks `intent.interfaces` and emits the
# openconfig-interfaces subtree.  Everything else is silently dropped
# on render — `unsupported` (with reason citing render-side wire-up
# gap) rather than `not_applicable`.
#
# Direction-specific framing: per the schema README's "Reverse pairs
# are independent files" rule, this YAML is authored independently
# rather than mirroring the forward direction.  Several fields are
# direction-asymmetric:
#
#   * hostname / dns / ntp / vlans / static_routes / snmp / lags /
#     local_users / radius_servers: forward = `not_applicable` (cisco
#     parser-side gap); reverse = `unsupported` (cisco render-side gap,
#     FortiGate-side data exists).
#
#   * Firewall / NAT / VIP / UTM: canonical schema gap (no
#     CanonicalFirewallPolicy in v1).  On forward, the cisco_iosxe
#     parser also doesn't read OpenConfig <acl>, so the question is
#     moot.  On reverse, FortiGate parser populates raw_sections with
#     firewall data but the canonical layer carries nothing — the
#     `not_applicable` framing applies to the canonical schema gap,
#     not a parse-or-render decision.
#
# The cisco_iosxe codec's `_CAPS.supported` declarations for
# `/system/hostname`, `/system/dns-server`, `/snmp/community`, etc.
# are aspirational (cross-codec mesh friendliness) but the actual
# `_render_canonical()` body is interface-only.  Honest classification
# beats matrix-deference.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_cisco_iosxe/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit.

meta:
  source_vendor: fortigate_cli
  target_vendor: cisco_iosxe
  primary_use_case: >
    FortiGate FortiOS source consumed into a NETCONF/OpenConfig-
    driven orchestration pipeline that uses the cisco_iosxe target
    codec.  The target render emits only the openconfig-interfaces
    subtree, so this pair is appropriate ONLY for the narrow case
    where the downstream consumer needs interface-level data and
    accepts that everything else (system services, VLANs, SNMP,
    RADIUS, local users, LAGs, static-routes, DHCP server pools)
    must be applied separately.  For a real FortiGate edge -> Cisco
    IOS-XE migration, route through `fortigate_cli -> cisco_iosxe_cli`
    instead — that pair is `certified` on the target side and emits
    the full canonical surface.
  certainty: medium
  references:
    - id: openconfig_yang_scope
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe/openconfig_yang_scope.md
      title: "OpenConfig YANG render scope: what cisco_iosxe actually emits"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"
    - id: interface_fields

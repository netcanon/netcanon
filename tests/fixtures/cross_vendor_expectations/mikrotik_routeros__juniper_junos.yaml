# Cross-vendor expectations: mikrotik_routeros -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/mikrotik_routeros_to_juniper_junos/
#
# SMB/WISP router to DC-class router pair.  RouterOS = SMB / WISP
# router-first OS with rich firewall / NAT / queue / wireless /
# hotspot plumbing but no fabric overlay.  Junos = full DC-class
# router with EVPN-VXLAN, apply-groups inheritance, two-pass parse,
# multi-instance routing.
#
# Asymmetry shape on this direction:
#
#   * RouterOS source carries Tier-3 plumbing (`/ip firewall`,
#     `/interface wireguard`, `/ip hotspot`, `/system script`,
#     `/queue`, `/interface wireless`) that has no canonical Junos
#     analogue — drops to raw_sections.
#   * Junos-only surface (apply-groups, mac-vrf, VXLAN-EVPN,
#     virtual-router) is structurally empty on RouterOS source
#     side (not_applicable rather than unsupported).
#   * RouterOS-side codec wire-up gaps (no `/ip vrf` parse, no
#     /interface vxlan parse, no firewall parse) further reduce
#     cross-pair surface from canonical perspective even when both
#     vendors have partial implementations on the wire.
#
# Wire formats differ fundamentally — RouterOS `/section` + `add/set`
# flat record list vs Junos `set ...` form with hierarchical
# inheritance and per-unit interface families.  The keyword-stable
# surface (hostname, DNS, NTP, IP addresses, static routes, SNMP,
# RADIUS) round-trips through the canonical model despite the
# syntactic gap.

meta:
  source_vendor: mikrotik_routeros
  target_vendor: juniper_junos
  primary_use_case: >
    MikroTik RouterOS site or branch promoted to a Juniper Junos
    deployment (typical: SMB / WISP outgrowing RouterOS hardware
    and migrating to a Junos QFX/EX/SRX, or operators consolidating
    branches onto a common Junos estate).  The basic surface
    (hostname / DNS / NTP / IPv4-IPv6 addresses / static routes /
    SNMP v1/v2c + v3 / RADIUS / LAGs / DHCP servers) round-trips
    with documented losses; RouterOS-rich Tier-3 plumbing
    (firewall, NAT, hotspot, scripts, queues, wireless, WireGuard,
    OVPN-server) drops to raw_sections.  Junos-only DC features
    (EVPN-VXLAN, mac-vrf, apply-groups) are structurally absent
    on RouterOS source.

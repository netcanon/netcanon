# Cross-vendor fidelity expectations: cisco_iosxe -> mikrotik_routeros
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML (Phase-0.5
# stub).  This is the NETCONF/OpenConfig sibling of cisco_iosxe_cli.
# Both target the same Cisco device family; the asymmetry on this
# cross-pair is dominated by the cisco_iosxe SOURCE codec being a
# stub whose parse() reads ONLY the openconfig-interfaces subtree
# (interfaces, IPv4, IPv6, description, enable, IANA type).
#
# Target: mikrotik_routeros codec — RouterOS /export verbose text.
# The MikroTik render itself is feature-complete on the canonical
# surface (hostname / DNS / NTP / VLANs / static_routes / SNMP /
# LAGs / local_users / DHCP / RADIUS), but receives an empty
# canonical tree for those fields because the cisco_iosxe NETCONF
# parser never populated them.
#
# Direction-specific framing: for fields the cisco_iosxe codec's
# CapabilityMatrix declares `supported` but its parse() never
# extracts (system/*, vlans, snmp, static-routes), the disposition
# here is `not_applicable` — the structural absence is on the SOURCE
# side, NOT a target render-side gap.  Compare with the inverse
# direction (mikrotik_routeros -> cisco_iosxe) where the target-side
# render gap dominates and the disposition is `unsupported`.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit (one of
# fifteen parallel pairs).

meta:
  source_vendor: cisco_iosxe
  target_vendor: mikrotik_routeros
  primary_use_case: >
    OpenConfig-driven NETCONF backup of a Cisco IOS-XE device
    consumed into a RouterOS-shaped target — typical when a
    NETCONF orchestration pipeline already exists and the
    operator wants RouterOS output for use elsewhere.  The
    cisco_iosxe parse path is interface-only, so the resulting
    RouterOS render carries interface-only content too.  For a
    real Cisco-to-MikroTik migration with hostname / DNS / NTP /
    VLAN / SNMP / static-route content, route through
    cisco_iosxe_cli first — that codec's parse coverage is full
    and the sibling pair (cisco_iosxe_cli__mikrotik_routeros)
    covers the wider canonical surface.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/openconfig_yang_scope.md
      title: "openconfig-interfaces YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"
    - id: oc-if-ip
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/ipv6_addresses.md
      title: "openconfig-if-ip YANG schema docs (IPv4 / IPv6 augment)"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-if-ip.html"
      retrieved: "2026-05-01"
    - id: oc-system
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/openconfig_yang_scope.md
      title: "openconfig-system YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-system.html"
      retrieved: "2026-05-01"
    - id: oc-vlan
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/vlan_render_gap.md
      title: "openconfig-vlan YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-vlan.html"
      retrieved: "2026-05-01"
    - id: oc-aggregate
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/lag_render_gap.md
      title: "openconfig-if-aggregate YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-if-aggregate.html"
      retrieved: "2026-05-01"
    - id: oc-network-instance
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/openconfig_yang_scope.md
      title: "OpenConfig network-instance use cases"
      source_url: "https://openconfig.net/docs/models/network_instance/"
      retrieved: "2026-05-01"
    - id: scope-summary
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/openconfig_yang_scope.md
      title: "What the cisco_iosxe NETCONF source actually carries"
      source_url: "https://openconfig.net/projects/models/"
      retrieved: "2026-05-01"
    - id: interface-fields
      path: docs/vendor-references/cisco_iosxe_to_mikrotik_routeros/interface_fields.md
      title: "Interface canonical-core fields (per-field disposition)"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"
    - id: vlan-render-gap

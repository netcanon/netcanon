# Cross-vendor fidelity expectations: opnsense -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_juniper_junos/
#
# FreeBSD-firewall → DC-class router pair.  This is the reverse of
# `juniper_junos__opnsense.yaml`; dispositions are NOT symmetric.
#
# OPNsense source has a much smaller feature footprint than Junos
# accepts, so most Junos-only L3 / DC surface (VRFs, VXLAN, EVPN,
# apply-groups, named user classes, SNMPv3 USM users) is structurally
# absent on OPNsense parse and the cross-pair hits `not_applicable`
# rather than `unsupported`.
#
# What's structurally absent on OPNsense source (not_applicable):
#   * routing_instances / VRF — OPNsense doesn't model VRFs
#   * vxlan_vnis / evpn_type5_routes — OPNsense doesn't model VXLAN
#   * apply_groups / group_content — Junos-only inheritance concept
#   * snmp.v3_users — OPNsense's v3 USM lives in plugin's snmpd.conf,
#     not config.xml; never reaches canonical from this source
#   * switchport_mode / access_vlan / trunk_allowed_vlans /
#     trunk_native_vlan / voice_vlan — OPNsense has no switching
#     fabric, source never populates these
#   * vlans[].tagged_ports / untagged_ports — same reason; OPNsense
#     doesn't model VLAN-centric port-membership
#
# What translates well:
#   * hostname / domain — direct mapping (both vendors model bare
#     short name + DNS suffix)
#   * interface description / enable / MTU / IPv4 / IPv6 — close
#     structural match
#   * VLAN id (tag) — both share 1-4094 range
#   * SNMP v1/v2c — community / location / contact / trap_hosts
#   * RADIUS — host / port pair (Junos auto-encrypts plaintext
#     secret on commit, so functional cross-pair works)
#
# What translates poorly (lossy):
#   * DNS / NTP / syslog / timezone — OPNsense codec parse path is
#     incomplete on these `<system>` children (declared supported
#     in the OPNsense capability matrix but wire-up incomplete)
#   * Static routes — OPNsense codec doesn't currently parse
#     `<staticroutes>` / `<gateways>` blocks
#   * Local users — OPNsense bcrypt hash format isn't a Junos
#     `encrypted-password` accepted format; group-binary versus
#     named class collapse
#   * LAGs — `lagg<N>` ↔ `ae<N>` rename, LACP-mode synthesis
#   * DHCP — Junos render path not yet wiring `/dhcp/pool`
#   * vlans[].name / description — collapse to OPNsense's single
#     `<descr>` slot, then re-expand on Junos render

meta:
  source_vendor: opnsense
  target_vendor: juniper_junos
  primary_use_case: >
    OPNsense firewall -> Junos DC-router migration (less common as
    a complete migration, more common as a lab-to-production
    promotion or as a step in a phased SDN-build-out where
    OPNsense was the prototype).  Shared canonical surface is
    hostname / domain / interface IPs / basic SNMP / RADIUS.
    OPNsense's firewall / NAT / VPN feature set is firmly out of
    scope on the Junos side; Junos's DC features (VRF, EVPN-VXLAN,
    apply-groups) are structurally absent on the OPNsense source.
  certainty: medium
  references:

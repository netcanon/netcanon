# Cross-vendor fidelity expectations: cisco_iosxe_cli -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_cli_to_opnsense/
#
# Phase 3 follow-up pair.  Cisco IOS-XE is a switching/routing platform;
# OPNsense is a FreeBSD-based router/firewall (pfSense fork).  The
# shared canonical surface is small but clean:
#
#   * hostname / domain — good
#   * DNS / NTP / syslog / timezone — lossy until OPNsense parse + render
#     wires up the corresponding `<system>` children
#   * interfaces (IP, MTU, enable, descr) — good
#   * VLANs — id good; name/description collapse; port-membership and
#     SVI sub-fields unsupported (OPNsense has no VLAN-centric port
#     lists, no first-class SVI)
#   * Static routes — lossy (OPNsense `<gateways>` + `<staticroutes>`
#     model is two-stage, codec doesn't currently render either)
#   * DHCP server scopes — lossy (interface-keyed pool model on
#     OPNsense, units conversion on lease time)
#   * SNMP v1/v2c — good; SNMPv3 USM unsupported (lives in plugin's
#     snmpd.conf, not config.xml)
#   * Local users — lossy (bcrypt hashes incompatible with Cisco
#     hash types; privilege number ↔ groupname collapse)
#   * RADIUS — good
#   * LAGs — lossy (Port-channel<N> ↔ lagg<N> rename, LACP mode
#     collapse on OPNsense's single 'lacp' proto)
#
# What's firmly out of scope on OPNsense (target unsupported):
#
#   * switchport modes / access_vlan / trunk_allowed_vlans /
#     trunk_native_vlan / voice_vlan — OPNsense has no switching
#     fabric
#   * VRF / routing-instance — OPNsense has no VRF model
#   * VXLAN / EVPN Type-5 — OPNsense is a firewall codec
#
# Cisco IOS-XE side: ACLs, NAT, crypto/VPN, route-maps, BGP/OSPF/EIGRP
# are out of canonical scope on the source codec — never reach the
# canonical surface.

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: opnsense
  primary_use_case: >
    Small-network migration: Cisco IOS-XE router/L3-switch -> OPNsense
    firewall/router.  Shared surface is hostname / domain / DNS / NTP /
    syslog / interface IPs / VLAN tags / basic SNMP / local users /
    RADIUS.  Switching constructs and Cisco multi-VRF/multi-protocol
    routing are firmly out of scope on the OPNsense side.  OPNsense's
    firewall / NAT / VPN feature set is firmly out of scope on the
    Cisco source side.
  certainty: medium
  references:
    - id: opnsense-interfaces
      path: docs/vendor-references/cisco_iosxe_cli_to_opnsense/interfaces.md
      title: "OPNsense Interfaces manual"
      source_url: "https://docs.opnsense.org/manual/interfaces.html"
      retrieved: "2026-04-30"
    - id: opnsense-vlans
      path: docs/vendor-references/cisco_iosxe_cli_to_opnsense/vlans.md
      title: "OPNsense Devices manual (VLAN tab)"
      source_url: "https://docs.opnsense.org/manual/other-interfaces.html"
      retrieved: "2026-04-30"
    - id: opnsense-dhcp
      path: docs/vendor-references/cisco_iosxe_cli_to_opnsense/dhcp.md
      title: "OPNsense ISC DHCPv4 manual"
      source_url: "https://docs.opnsense.org/manual/isc.html"
      retrieved: "2026-04-30"
    - id: opnsense-gateways
      path: docs/vendor-references/cisco_iosxe_cli_to_opnsense/static_routes.md
      title: "OPNsense Gateways manual"
      source_url: "https://docs.opnsense.org/manual/gateways.html"
      retrieved: "2026-04-30"
    - id: opnsense-users
      path: docs/vendor-references/cisco_iosxe_cli_to_opnsense/local_users.md
      title: "OPNsense Users manual"
      source_url: "https://docs.opnsense.org/manual/users.html"

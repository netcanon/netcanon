# Cross-vendor expectations: mikrotik_routeros -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/
#
# Phase 3 follow-up pair.  Inverse of aruba_aoss__mikrotik_routeros.
# Same wire-format and switching-philosophy gulf, but viewed from the
# RouterOS source side: lossy points cluster around RouterOS-richer
# surfaces (firewall / NAT / queues / wireless / scripting that fall
# outside canonical scope and land in raw_sections) and around the
# password-export gap (RouterOS does not surface its hashed
# passwords in /export, so the Aruba render emits empty SHA-1 hashes
# and the operator MUST set passwords manually post-migration).
#
# Aruba target also has structurally smaller feature footprint than
# Cisco IOS-XE — fields like dhcp_servers (Aruba is relay-only) are
# unsupported on the target side rather than lossy.  This is the
# dominant difference from the inverse cisco_iosxe_cli pair.

meta:
  source_vendor: mikrotik_routeros
  target_vendor: aruba_aoss
  primary_use_case: >
    MikroTik RouterOS to Aruba AOS-S migration (typical: SMB / WISP
    operator scaling up to enterprise campus hardware, or
    consolidating onto a Cisco-CLI-compatible ProCurve estate after
    growing past RouterOS scale limits).  Loses RouterOS-rich
    plumbing that does not have a canonical field (firewall, NAT,
    queues, wireless, scripting, hotspot, IPsec) and loses password
    material because RouterOS's /export does not include hashed
    passwords.  Aruba's smaller feature footprint also means
    several fields are unsupported on the target rather than lossy.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/system_services.md
      title: "System services (hostname / DNS / NTP / timezone / syslog): MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/40992856/Identity"
      retrieved: "2026-04-30"
    - id: interface_naming
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/interface_naming.md
      title: "Interface naming: MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/41746442/Ethernet"
      retrieved: "2026-04-30"
    - id: ip_addressing
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/ip_addressing.md
      title: "IPv4 / IPv6 addressing: MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/328084/IP+Routing"
      retrieved: "2026-04-30"
    - id: vlans
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/vlans.md
      title: "VLAN configuration: MikroTik RouterOS two-plane model versus Aruba VLAN-centric"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/88014957/VLAN"
      retrieved: "2026-04-30"
    - id: switching_model
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/switching_model.md
      title: "Switching philosophy: RouterOS router-first versus Aruba L2-by-default"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/47579231/Bridging+and+Switching"
      retrieved: "2026-04-30"
    - id: static_routes
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/static_routes.md
      title: "Static routes: MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/328084/IP+Routing"
      retrieved: "2026-04-30"
    - id: dhcp
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/dhcp.md
      title: "DHCP server pools (RouterOS three-section form) versus DHCP relay (Aruba)"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/24805500/DHCP"
      retrieved: "2026-04-30"
    - id: snmp
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/snmp.md
      title: "SNMP: MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/8978519/SNMP"
      retrieved: "2026-04-30"
    - id: local_users
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/local_users.md
      title: "Local users + hash formats: MikroTik RouterOS versus Aruba AOS-S"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/8978504/User"
      retrieved: "2026-04-30"
    - id: lags
      path: docs/vendor-references/mikrotik_routeros_to_aruba_aoss/lags.md

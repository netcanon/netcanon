# Cross-vendor fidelity expectations: juniper_junos -> fortigate_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_fortigate_cli/
#
# Reverse-direction sibling of fortigate_cli__juniper_junos.yaml.
# Per the schema README's "Reverse pairs are independent files" rule,
# this file authors the dispositions independently rather than
# mirroring.  Several fields are direction-asymmetric:
#
#   * dns_servers: Junos -> FortiGate is lossy (FortiGate caps at
#     2-3 servers; Junos source can have more).  FortiGate -> Junos
#     is good (no truncation in that direction).
#
#   * syslog_servers: Junos -> FortiGate is lossy (FortiGate caps at
#     three syslog backends).  FortiGate -> Junos is good.
#
#   * VLAN port-membership: Junos -> FortiGate is lossy because the
#     canonical-VLAN port list cannot be projected onto FortiGate's
#     child-interface model without synthesising multiple VLAN-child
#     interfaces (one per VLAN per parent).  FortiGate -> Junos is
#     also lossy but for the opposite reason (FortiGate parse
#     populates an empty list).
#
#   * apply_groups / group_content: Junos source populates these
#     (per GAP 9b).  FortiGate has no analogous inheritance
#     mechanism, so the group structure drops on FortiGate render
#     but the flattened content survives via the two-pass parse.
#     Lossy on this direction (group-shape drops; content survives).
#
#   * routing_instances: Junos source-side IS wired (GAP 6) so
#     canonical CanonicalRoutingInstance records DO get populated;
#     FortiGate render does not consume them, so they drop at the
#     render boundary.  Lossy on this direction.
#
#   * vxlan_vnis: Junos source-side IS wired (GAP-EVPN-2); FortiGate
#     has no fabric data plane, so cross-pair drops the VXLAN
#     intent.  Unsupported on this direction (FortiGate side).

meta:
  source_vendor: juniper_junos
  target_vendor: fortigate_cli
  primary_use_case: >
    Juniper Junos router/switch (MX / QFX / EX / SRX) -> FortiGate
    firewall edge migration.  Common scenario: replacing a Juniper
    SRX-as-router or QFX-as-edge with a FortiGate as a converged
    routing-and-security appliance, often when the Juniper EVPN-VXLAN
    fabric is being decommissioned in favour of a flatter L3-routed
    + firewall design.  L3 routing + system services + IP addressing
    + RADIUS + LAGs translate cleanly with documented per-field
    caveats.  Junos's EVPN-VXLAN fabric data plane (VNI mappings,
    Type-5 routes, MAC-VRF, L3 VNI for IRB, switch-options globals)
    has no FortiGate target — operators accept that tenant separation
    collapses to FortiGate's VDOM / per-interface-integer-VRF model
    manually.  Junos firewall filters / policy-statements / BGP /
    OSPF stanzas drop entirely (canonical schema gap).  apply-groups
    inheritance flattens via the two-pass parse — group-shape drops
    on FortiGate render but the inherited content survives.
  certainty: medium

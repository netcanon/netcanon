# Cross-vendor fidelity expectations: cisco_iosxe -> juniper_junos
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML (Phase-0.5
# stub; parse() walks `<interfaces>` only).
# Target: juniper_junos codec — Junos set-form CLI render with rich
# canonical surface (hostname, DNS, NTP, syslog, VLANs, VXLAN VNIs,
# MAC-VRF, L3-VRF, SNMPv1/v2c/v3, local users, static routes,
# apply-groups inheritance).
#
# Asymmetry on this cross-pair is dominated by the cisco_iosxe SOURCE
# parser being narrow: it walks `<interfaces>` and ignores `<system>`,
# `<vlans>`, `<network-instances>`, `<snmp>`, `<routing-policy>`,
# `<aaa>`.  Even when a real device's `<get-config>` reply carries
# all of those, the parser drops them silently.  The canonical tree
# the Junos target render consumes is therefore overwhelmingly empty
# for non-interface fields.
#
# Direction-specific framing: classification skews toward
# `not_applicable` rather than `unsupported`/`lossy`.  The schema
# README's not_applicable definition covers this case: "the field is
# structurally absent on the source vendor's wire format" — here the
# wire format CARRIES it but the codec doesn't extract, which is
# operationally the same thing from the perspective of the canonical
# tree the target render sees.  This is the same labelling pattern as
# cisco_iosxe__aruba_aoss and cisco_iosxe__cisco_iosxe_cli.
#
# For real Catalyst-to-Junos migration use cisco_iosxe_cli__juniper_junos
# instead — that pair is `certified` on the source side and emits the
# full canonical surface.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_juniper_junos/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit.

meta:
  source_vendor: cisco_iosxe
  target_vendor: juniper_junos
  primary_use_case: >
    NETCONF-source orchestration pipeline emitting Junos set-form for
    a downstream Junos device — narrow case where the orchestrator
    can reliably read OpenConfig from the upstream Cisco fabric but
    the target is a Juniper QFX/EX/MX.  The cisco_iosxe codec is a
    Phase-0.5 stub so this pair carries only interface-level data;
    for any real DC migration use cisco_iosxe_cli instead.  This
    pair primarily exists to demonstrate that the parse-side wire-up
    gap dominates classification on every cross-pair where
    cisco_iosxe is the source, regardless of how rich the target is.
  certainty: medium
  references:

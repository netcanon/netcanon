# Cross-vendor expectations: arista_eos -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_aruba_aoss/
#
# Phase 3 cross-mesh pair: aruba_aoss mesh sweep, REVERSE direction
# of aruba_aoss__arista_eos.yaml.  This is the asymmetrically harder
# direction because Arista EOS is a DC-class switch with rich VRF /
# EVPN / VXLAN / dynamic routing support, while Aruba AOS-S is a
# campus L2/basic-L3 platform that doesn't model any of those.  The
# "richer-source-than-target" loss concentrates on:
#
#   * VRF — Arista carries fully-modelled VRFs (vrf instance + RD +
#     RT + per-interface vrf membership + l3_vni for EVPN Type-5);
#     Aruba has no concept.  Render drops with banner.
#   * VXLAN/EVPN — Arista's VXLAN data and EVPN MAC-VRF / Type-5
#     surfaces have no Aruba target.
#   * Local users — Arista's secret sha512 (the modern default)
#     requires re-keying on Aruba's narrower SHA-1 / bcrypt set.
#   * Timezone — zoneinfo names cannot be auto-mapped to Aruba's
#     minute-offset format without a curated lookup.
#   * MTU — not parsed by the aruba_aoss codec, so jumbo-frame
#     settings (mtu 9214) drop on Aruba render.
#
# The keyword-stable surface (vlans / switchport / static routes /
# SNMP v1+v2c / hostname / DNS / radius-server / CIDR addressing)
# tracks closely because both vendors derive their CLI lineage from
# Cisco IOS.

meta:
  source_vendor: arista_eos
  target_vendor: aruba_aoss
  primary_use_case: >
    Edge consolidation where an Arista EOS DC-leaf or campus
    deployment is decommissioned to a smaller Aruba AOS-S
    2930F / 2930M / 3810 / 5400R footprint.  The Arista source
    typically carries DC-class VRF / EVPN / VXLAN / BGP data
    that has no Aruba target — those surfaces drop with banners.
    The L2 / basic-L3 surface (VLAN, switchport, SVI, static
    routes, SNMP, RADIUS, local users) round-trips well.
  certainty: medium
  references:
    - id: vlans
      path: docs/vendor-references/arista_eos_to_aruba_aoss/vlans.md
      title: "VLAN configuration: Arista EOS versus Aruba AOS-S"
      source_url: "https://www.arubanetworks.com/techdocs/AOS-S/16.10/ATMG/2930F-3810-5400/index.htm"
      retrieved: "2026-05-01"
    - id: port_naming
      path: docs/vendor-references/arista_eos_to_aruba_aoss/port_naming.md
      title: "Port naming: Arista EOS versus Aruba AOS-S"
      source_url: "https://www.arubanetworks.com/techdocs/AOS-S/16.10/BOG/2930F-3810-5400/index.htm"
      retrieved: "2026-05-01"
    - id: ip_addressing
      path: docs/vendor-references/arista_eos_to_aruba_aoss/ip_addressing.md
      title: "IPv4 / IPv6 addressing: Arista EOS versus Aruba AOS-S"
      source_url: "https://www.arubanetworks.com/techdocs/AOS-S/16.10/IPv6/2930F-3810-5400/index.htm"
      retrieved: "2026-05-01"
    - id: static_routes
      path: docs/vendor-references/arista_eos_to_aruba_aoss/static_routes.md
      title: "Static routes: Arista EOS versus Aruba AOS-S"
      source_url: "https://www.arubanetworks.com/techdocs/AOS-S/16.10/IPv4/2930F-3810-5400/index.htm"
      retrieved: "2026-05-01"
    - id: snmp
      path: docs/vendor-references/arista_eos_to_aruba_aoss/snmp.md
      title: "SNMP: Arista EOS versus Aruba AOS-S"
      source_url: "https://www.arista.com/en/um-eos/eos-snmp"
      retrieved: "2026-05-01"
    - id: local_users
      path: docs/vendor-references/arista_eos_to_aruba_aoss/local_users.md

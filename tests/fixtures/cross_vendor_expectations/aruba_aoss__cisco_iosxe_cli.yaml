# Cross-vendor expectations: aruba_aoss -> cisco_iosxe_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_cisco_iosxe_cli/
#
# Phase 3 follow-up pair: REVERSE direction of cisco_iosxe_cli ->
# aruba_aoss.  Campus refresh Aruba -> Cisco where the source
# (ProCurve heritage AOS-S, L2/basic-L3) typically carries fewer
# features than the target (Cisco IOS-XE) accepts.  The asymmetry
# inverts the lossy fields:
#
#   * VRF / BGP / EIGRP / IS-IS — Aruba source never populates
#     these (no platform support), so the canonical fields are
#     empty and the Cisco render emits nothing.  Re-classified as
#     not_applicable rather than unsupported.
#   * DHCP server pools — Aruba is relay-only, so no source data
#     to lose.
#   * Hash formats are still incompatible (Aruba SHA-1/bcrypt vs
#     Cisco type-9 scrypt) — same lossy direction either way.

meta:
  source_vendor: aruba_aoss
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    Campus refresh from Aruba ProCurve / AOS-S (2930F / 2930M /
    3810 / 5400R) to Cisco Catalyst (IOS-XE 15.x / 16.x / 17.x).
    Aruba source is L2/basic-L3 only, so most Cisco-only L3
    surface is structurally absent on the source side and the
    cross-pair has fewer lossy categories than the reverse
    direction.
  certainty: medium
  references:
    - id: vlans

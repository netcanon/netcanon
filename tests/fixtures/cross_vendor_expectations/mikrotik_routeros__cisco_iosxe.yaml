      retrieved: "2026-05-01"
    - id: oc-vlan
      path: docs/vendor-references/mikrotik_routeros_to_cisco_iosxe/vlan_render_gap.md
      title: "openconfig-vlan YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-vlan.html"

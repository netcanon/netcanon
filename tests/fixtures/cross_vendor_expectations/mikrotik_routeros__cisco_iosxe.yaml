# Cross-vendor fidelity expectations: mikrotik_routeros -> cisco_iosxe
#
# Source: mikrotik_routeros codec — RouterOS /export verbose text.
# Parser is feature-complete: populates hostname / DNS / NTP / syslog /
# VLANs (Plane 1 + partial Plane 2) / static_routes / DHCP / SNMP
# (v1/v2c + v3 USM) / LAGs / local_users / RADIUS into a fully-
# realised CanonicalIntent.
#
# Target: cisco_iosxe codec — OpenConfig NETCONF YANG XML (Phase-0.5
# stub).  Render emits ONLY the openconfig-interfaces subtree
# (interfaces, IPv4, IPv6, description, enable, IANA type).  Every
# other canonical field that the MikroTik source carries lands on
# the canonical tree but is silently dropped by the cisco_iosxe
# target render.
#
# Direction-specific framing: for fields the cisco_iosxe codec's
# CapabilityMatrix declares `supported` but its render() never
# emits (system, vlans, snmp, static-routes), the disposition here
# is `unsupported` with reason citing the render-side wire-up gap.
# Compare with the inverse direction (cisco_iosxe -> mikrotik_routeros)
# where the source-side parse gap dominates and the disposition is
# `not_applicable`.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/mikrotik_routeros_to_cisco_iosxe/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit (one of
# fifteen parallel pairs).

meta:
  source_vendor: mikrotik_routeros
  target_vendor: cisco_iosxe
  primary_use_case: >
    MikroTik RouterOS source consumed into a NETCONF/OpenConfig-driven
    orchestration pipeline that uses the cisco_iosxe codec.  The
    target render emits only the openconfig-interfaces subtree, so
    this pair is appropriate ONLY for the narrow case where the
    downstream consumer needs interface-level data and accepts that
    everything else (hostname, DNS, NTP, syslog, VLANs, SNMP, RADIUS,
    users, LAGs, static routes, DHCP) must be applied separately.
    For a real RouterOS-to-Cisco migration with the full canonical
    surface, route through cisco_iosxe_cli instead — that pair is
    `certified` and emits the full canonical surface.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/mikrotik_routeros_to_cisco_iosxe/openconfig_yang_scope.md
      title: "openconfig-interfaces YANG schema docs"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"

# Cross-vendor fidelity expectations: aruba_aoss -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_opnsense/
#
# Phase 3 follow-up pair.  Aruba AOS-S is an enterprise campus
# L2/basic-L3 switch (ProCurve heritage); OPNsense is a FreeBSD-based
# router/firewall (pfSense fork).  Two vendor roles barely overlap.
# Shared canonical surface:
#
#   * hostname — good
#   * domain / DNS / NTP / syslog / timezone — lossy until OPNsense
#     parse + render wires up the corresponding `<system>` children
#     (Aruba has no domain directive, so domain is N/A here)
#   * interfaces (IP, enable, descr) — good
#   * VLANs — id good; name/description collapse; port-membership and
#     SVI sub-fields unsupported (OPNsense has no VLAN-centric port
#     lists, no first-class SVI)
#   * Static routes — lossy (OPNsense `<gateways>` + `<staticroutes>`
#     model is two-stage, codec doesn't currently render either)
#   * DHCP server scopes — N/A (Aruba is relay-only; canonical list
#     always empty on parse)
#   * SNMP v1/v2c — good; SNMPv3 USM unsupported (lives in plugin's
#     snmpd.conf, not config.xml)
#   * Local users — lossy (Aruba sha1 / bcrypt / plaintext vs
#     OPNsense bcrypt-only)
#   * RADIUS — good
#   * LAGs — lossy (Trk<N> ↔ lagg<N> rename, LACP mode collapse on
#     OPNsense's single 'lacp' proto, mode-name semantics differ)
#
# What's firmly out of scope on OPNsense (target unsupported):
#
#   * switchport modes / per-VLAN tagged/untagged port lists /
#     voice_vlan / spanning-tree state — OPNsense has no switching
#     fabric
#   * VRF / routing-instance — neither vendor models VRFs (N/A)
#   * VXLAN / EVPN Type-5 — neither vendor models them (N/A)

meta:
  source_vendor: aruba_aoss
  target_vendor: opnsense
  primary_use_case: >
    Hybrid migration: Aruba AOS-S campus switch (2930F / 2930M /
    3810 / 5400R) -> OPNsense firewall/router.  Shared surface is
    hostname / DNS / interface IPs / VLAN tags / SNMP v1/v2c /
    local users / RADIUS / LAGs.  Aruba switching state (per-VLAN
    port lists, voice-VLAN, spanning-tree) is firmly out of scope
    on the OPNsense side.  OPNsense's firewall / NAT / VPN feature
    set is firmly out of scope on the Aruba source side.
  certainty: medium
  references:
    - id: opnsense-interfaces
      path: docs/vendor-references/aruba_aoss_to_opnsense/interfaces.md

      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe_cli/static_routes.md
      title: "Static routes: FortiGate FortiOS versus Cisco IOS-XE"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/"

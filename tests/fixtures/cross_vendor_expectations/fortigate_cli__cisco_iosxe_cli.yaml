# Cross-vendor fidelity expectations: fortigate_cli -> cisco_iosxe_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_cisco_iosxe_cli/
#
# Reverse-direction sibling of cisco_iosxe_cli__fortigate_cli.yaml.
# Per the schema README's "Reverse pairs are independent files —
# arista_eos__juniper_junos.yaml and juniper_junos__arista_eos.yaml are
# not assumed symmetric" rule, this file authors the dispositions
# independently rather than mirroring.  Several fields are
# direction-asymmetric:
#
#   * dns_servers: Cisco -> FortiGate is lossy (FortiGate caps at 2-3
#     servers).  FortiGate -> Cisco is good (FortiGate-source had at
#     most three; Cisco accepts unbounded).
#
#   * dhcp_client: Cisco -> FortiGate is lossy (FortiGate render does
#     not emit ``set mode dhcp``).  FortiGate -> Cisco is good (Cisco
#     render emits ``ip address dhcp`` correctly).
#
#   * dhcp_servers: Cisco -> FortiGate is lossy with caveats (model
#     divergence).  FortiGate -> Cisco is more lossy (Cisco IOS-XE
#     codec capability matrix does not advertise DHCP render).
#
#   * Switching features: in both directions, unsupported, but for
#     opposite reasons (Cisco -> FortiGate: target absent;
#     FortiGate -> Cisco: source absent).

meta:
  source_vendor: fortigate_cli
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    FortiGate firewall edge -> Cisco IOS-XE router/switch migration.
    Common scenario: replacing a FortiGate edge with a Cisco-shop's
    standardised Cat 9000 / ISR 4000 platform.  L3 routing + system-
    services translates well; FortiGate's rich firewall / UTM /
    application-control product surface has no Cisco analogue and is
    lost on migration.  Operators should treat the FortiGate firewall
    config as documentation rather than a translatable artefact.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe_cli/system_services.md
      title: "System services: FortiGate FortiOS versus Cisco IOS-XE"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-04-30"

      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/954635/interface-settings"
      retrieved: "2026-04-30"
    - id: vlans
      path: docs/vendor-references/fortigate_cli_to_cisco_iosxe_cli/vlans.md
      title: "VLAN configuration: FortiGate FortiOS versus Cisco IOS-XE"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cookbook/"
      retrieved: "2026-04-30"
    - id: switchport

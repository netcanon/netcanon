# Cross-vendor expectations: aruba_aoss -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/aruba_aoss_to_juniper_junos/
#
# Switch-to-DC-router pair.  Aruba AOS-S is a campus L2 / basic-L3
# platform (HPE ProCurve heritage on 2930F / 2930M / 3810 / 5400R);
# Juniper Junos is a full DC-class router with EVPN-VXLAN, apply-
# groups inheritance, and routing-instances.  The Aruba source
# carries a smaller feature footprint than the Junos target accepts,
# so most Junos-only surface is structurally absent on the source
# side (not_applicable) rather than actively dropped on render
# (unsupported).
#
# Wire formats differ fundamentally — Aruba uses ProCurve-style
# stanzas with `;` comment markers and VLAN-centric port lists;
# Junos uses `set` form with hierarchical inheritance, name-keyed
# VLANs, and per-unit interface families.  The keyword-stable
# surface (hostname, vlan id, snmp-server, radius-server, static
# routes) survives the structural transformation cleanly.

meta:
  source_vendor: aruba_aoss
  target_vendor: juniper_junos
  primary_use_case: >
    Campus / branch refresh from Aruba ProCurve / AOS-S
    (2930F / 2930M / 3810 / 5400R) to a Juniper QFX / EX access
    or distribution layer.  The smaller Aruba feature footprint
    means most Junos-only surface (VRF, VXLAN, EVPN, apply-groups)
    is structurally empty on Aruba parse and the cross-pair has
    fewer lossy categories than the reverse direction.

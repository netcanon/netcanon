# ---------------------------------------------------------------------------
# Per-field expectations.  Walks CanonicalIntent top-down.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      Aruba quotes the hostname in ``show running-config``; codec
      strips the quotes on parse.  Junos render emits a bare
      ``set system host-name <name>``.  Round-trip lossless on the
      string content.
    references: [aruba-system-services, junos-initial-config]

  domain:
    disposition: not_applicable
    note: >
      Aruba AOS-S has no first-class domain directive in the codec's
      parse surface; the field is always empty on this direction so
      Junos render emits no ``set system domain-name`` line.

  dns_servers:
    disposition: good
    note: >
      Aruba ``ip dns server-address priority N <addr>`` collapses to
      a bare address list on canonical (priority sort applied).
      Junos render emits ``set system name-server <addr>`` lines in
      that order.  The priority numeric drops on the canonical layer.
    references: [aruba-system-services, junos-initial-config]

  ntp_servers:
    disposition: lossy
    reason: >
      Aruba uses SNTP (``sntp server priority N <addr>``) as its
      time-protocol primitive while Junos uses NTP
      (``set system ntp server <addr>``).  The protocol distinction
      is lost on the canonical layer (field is ``list[str]`` of
      addresses).  Per-server modifiers (Aruba priority overrides;
      Junos ``prefer`` / ``key``) drop on round-trip.  Functional
      equivalence at the server-list level for typical deployments.
    references: [aruba-system-services, junos-initial-config]

  timezone:
    disposition: not_applicable
    note: >
      The aruba_aoss codec parser does not extract ``time timezone``
      directives (intentionally omitted per the kitchen-sink fixture
      header comment); the canonical field is always empty on Aruba
      source so Junos render emits no ``set system time-zone`` line.

  syslog_servers:
    disposition: not_applicable
    note: >
      The aruba_aoss codec parser does not extract ``logging <host>``
      directives today; the canonical list is always empty on Aruba
      source so Junos render emits no ``set system syslog host``
      lines.
    references: [aruba-system-services]

  # ── Tier 1 — interfaces ──

  interfaces[].name:
    disposition: lossy
    reason: >
      Port-name mesh maps Aruba bare-numeric ``1`` / ``A1`` / ``1/1``
      / ``Trk1`` -> Junos ``ge-0/0/0`` / ``ae0`` / ``irb.<id>``.
      Speed hint defaults to ``ge-`` (gigabit) since AOS-S carries
      no speed prefix; 10G / 25G / 100G ports require operator
      override via the per-pane port-rename surface (typically
      ``xe-`` / ``mge-`` / ``et-``).  Aruba has no first-class
      loopback construct; Junos's ``lo0.0`` does not arise from
      Aruba parse.
    references: [aruba-port-naming, junos-iface-naming]

  interfaces[].description:
    disposition: good
    note: >
      Aruba's ``name "<text>"`` directive (per-interface
      description) maps to Junos's
      ``set interfaces <name> description "<text>"``.  Both quote
      values containing whitespace.

  interfaces[].enabled:
    disposition: good
    note: >
      Aruba's ``enable`` / ``disable`` maps to Junos's
      ``delete interfaces <name> disable`` / ``set interfaces <name>
      disable``.

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      Aruba does not declare IANA ifType; the codec infers the type
      from the interface-name shape (bare number -> ethernet, ``Trk``
      -> port-channel, ``Vlan`` -> l3ipvlan).  Junos's media prefix
      (``ge-`` / ``xe-`` / ``ae`` / ``irb``) carries similar
      semantics on render.  Documented in the aruba_aoss codec
      capability matrix as ``/interfaces/interface/config/type``
      lossy.
    references: [aruba-port-naming, junos-iface-naming]

  interfaces[].mtu:
    disposition: not_applicable
    note: >
      The aruba_aoss codec parser does not extract MTU directives;
      ``CanonicalInterface.mtu`` is always empty on Aruba parse so
      Junos render emits no ``set interfaces <name> mtu`` line.
      Codec-side wire-up gap (lossy by deferral on Aruba source).

  interfaces[].ipv4_addresses:
    disposition: good
    note: >
      Aruba's CIDR ``ip address X/N`` (on a routed port via the
      ``routing`` directive) maps to Junos's ``set interfaces <name>
      unit 0 family inet address X/N``.  Aruba VLAN-absorbed SVI
      addresses go via ``CanonicalVlan.ipv4_addresses`` and surface
      as ``set interfaces irb unit <id> family inet address X/N``.
    references: [aruba-ip-addressing, junos-iface-fundamentals]

  interfaces[].ipv6_addresses:
    disposition: good
    note: >
      Junos uses the per-unit ``family inet6`` form; canonical
      ``scope=link-local`` discriminator preserved across vendors.
      Aruba's explicit ``link-local`` keyword maps to Junos's
      prefix-based auto-detection (``fe80::/10``).
    references: [aruba-ip-addressing, junos-family-inet6]

  interfaces[].switchport_mode:
    disposition: lossy
    reason: >
      The aruba_aoss codec parses VLAN-centric port lists rather
      than per-interface switchport state; Aruba source's
      ``CanonicalInterface.switchport_mode`` is populated by
      ``project_vlan_to_switchport`` from the membership lists
      before Junos render walks the interface list.  The Junos
      render emits ``family ethernet-switching interface-mode
      {access | trunk}`` from the synthesised state.

  interfaces[].access_vlan:
    disposition: good
    note: >
      Aruba's ``vlan N / untagged <ports>`` projection populates
      ``access_vlan`` on the synthesised port record; Junos render
      emits ``set interfaces <name> unit 0 family ethernet-switching
      vlan members <vlan-name>``.

  interfaces[].trunk_allowed_vlans:
    disposition: good
    note: >
      Aruba's ``vlan N / tagged <ports>`` projection populates the
      trunk allowed-vlan list; Junos render emits
      ``set interfaces <name> unit 0 family ethernet-switching vlan
      members [ <name> ... ]``.

  interfaces[].trunk_native_vlan:
    disposition: lossy
    reason: >
      Aruba's native-VLAN concept lives implicitly through the
      ``no untagged 1-22`` + ``untagged <port>`` shape on a single
      VLAN.  The codec's projection synthesises ``trunk_native_vlan``
      heuristically; Junos render emits ``set interfaces <name>
      native-vlan-id N`` at the parent-interface hierarchy (NOT the
      unit).  Round-trip preserves the integer; structural
      transformation is internal to each codec.

  interfaces[].voice_vlan:
    disposition: not_applicable
    note: >
      The aruba_aoss codec parser does not extract a voice-VLAN
      primitive; the field is always empty on Aruba source.  Junos
      QFX/EX has no first-class voice-VLAN construct anyway, so
      this field is structurally absent on both sides of this
      cross-pair.

  interfaces[].lag_member_of:
    disposition: good
    note: >
      Aruba's ``trunk <ports> trk<N> lacp`` populates
      ``CanonicalInterface.lag_member_of`` for each member port
      (back-pointer); Junos render emits
      ``set interfaces <name> ether-options 802.3ad ae<N>`` for
      each member.
    references: [aruba-lags, junos-lag-overview]

  interfaces[].dhcp_client:
    disposition: lossy
    reason: >
      Aruba parse populates ``dhcp_client`` for VLAN SVIs that use
      ``ip address dhcp-bootp``; Junos render emits
      ``set interfaces <name> unit 0 family inet dhcp``.
      Per-platform DHCP-client option semantics (lease length,
      hostname-option) are not modelled canonically and drop on
      round-trip.

  interfaces[].vrf:
    disposition: not_applicable
    note: >
      Aruba AOS-S has no VRF concept (single global routing table on
      this platform line); ``CanonicalInterface.vrf`` is always
      empty on Aruba source.  Junos render emits no
      ``set routing-instances <vrf> interface <name>`` line.
    references: [aruba-vrf-unsupported]

  # ── Tier 1 — VLANs ──

  vlans[].id:
    disposition: good
    note: >
      Aruba ``vlan N`` -> Junos ``set vlans <name> vlan-id N``.  The
      Junos codec render synthesises a default name (typically
      ``vlan<N>``) when the source had no explicit name.
    references: [aruba-vlans, junos-vlans-statement]

  vlans[].name:
    disposition: lossy
    reason: >
      Junos VLAN names allow letters, digits, hyphens, periods only
      (up to 255 chars); Aruba accepts underscores, spaces (quoted),
      and a wider character set.  Names containing
      ``[A-Za-z0-9.-]`` round-trip losslessly; names with
      underscores are sanitised on Junos render
      (typically underscore -> hyphen).  Aruba source's quoted
      ``"DEFAULT_VLAN"`` becomes ``DEFAULT-VLAN`` on Junos.
    references: [aruba-vlans, junos-vlans-statement]

  vlans[].description:
    disposition: not_applicable
    note: >
      Aruba does not model a VLAN-level description (only interface
      descriptions); ``CanonicalVlan.description`` is always empty
      on Aruba parse.  Junos render emits no
      ``set vlans <name> description`` line.

  vlans[].tagged_ports:
    disposition: good
    note: >
      Aruba's VLAN-centric ``tagged 25-26`` populates the canonical
      list directly; Junos render transposes back to per-interface
      ``family ethernet-switching vlan members <name>`` on the
      affected interfaces.

  vlans[].untagged_ports:
    disposition: good
    note: >
      Same as ``tagged_ports``; rendered via per-interface
      ``interface-mode access`` + ``vlan members <name>``.

  vlans[].ipv4_addresses:
    disposition: good
    note: >
      Aruba's VLAN-absorbed SVI (``vlan 100 / ip address X/N``)
      lands on ``CanonicalVlan.ipv4_addresses``; Junos render emits
      a separate ``set interfaces irb unit 100 family inet address
      X/N`` block plus
      ``set vlans <name> l3-interface irb.100``.
    references: [junos-vlans-statement, junos-bridging-overview]

  # ── Tier 1 — static routes ──

  static_routes:
    disposition: good
    note: >
      Aruba's ``ip route X/N <gw>`` (CIDR) and dotted-mask
      ``ip route DEST MASK <gw>`` both normalise to canonical
      CIDR form via ``_dest_mask_to_cidr``; Junos render emits
      ``set routing-options static route X/N next-hop <gw>``.
      Aruba's legacy ``ip default-gateway <gw>`` directive
      normalises to a ``0.0.0.0/0`` canonical record.  Aruba never
      carries per-VRF static routes (no VRF concept), so the
      Junos-only ``set routing-instances X routing-options static``
      form is structurally absent on this direction.
    references: [aruba-static-routes, junos-static-routing]

  # ── Tier 2 — DHCP server ──

  dhcp_servers:
    disposition: not_applicable
    note: >
      Aruba AOS-S is primarily a DHCP relay platform, not a server.
      The aruba_aoss codec does not advertise ``/dhcp/pool`` in its
      supported set, so ``CanonicalIntent.dhcp_servers`` is always
      empty on Aruba parse — nothing to lose.  ``ip helper-address``
      directives on Aruba VLAN stanzas are not modelled (no
      canonical helper-address field).

  # ── Tier 2 — SNMP ──

  snmp.community:
    disposition: good
    note: >
      Aruba's quoted ``snmp-server community "public" Operator``
      maps to Junos's
      ``set snmp community public authorization read-only``.  The
      Aruba access-keyword (Operator/Manager) maps to Junos
      authorization (read-only/read-write) on render.
    references: [aruba-snmp, junos-snmp-overview]

  snmp.location:
    disposition: good
    references: [aruba-snmp, junos-snmp-overview]

  snmp.contact:
    disposition: good
    references: [aruba-snmp, junos-snmp-overview]

  snmp.trap_hosts:
    disposition: good
    note: >
      Aruba's flat ``snmp-server host <addr>`` lines collect into a
      single ``CanonicalSNMP.trap_hosts`` list; Junos render emits
      ``set snmp trap-group <name> targets <addr>`` lines under a
      synthesised group name.
    references: [aruba-snmp, junos-snmp-overview]

  snmp.v3_users:
    disposition: lossy
    reason: >
      USM username / group / auth-protocol / priv-protocol round-trip
      via the canonical ``CanonicalSNMPv3User`` schema.  Aruba
      ``sha`` (= SHA-1) maps to Junos ``authentication-sha``; Aruba
      ``aes`` (= AES-128 default) maps to Junos ``privacy-aes128``.
      Opaque hashed passphrases are NOT cross-compatible because USM
      keys are salted with vendor-specific engineID-derived
      constants — operator must re-key v3 users on the target after
      migration.
    references: [aruba-snmp, junos-snmpv3-cg]

  # ── Tier 2 — LAGs ──

  lags:
    disposition: lossy
    reason: >
      Aruba ``Trk<N>`` -> Junos ``ae<N-1>`` (one-based -> zero-based
      index translation; codec render maps ``Trk1`` -> ``ae0``,
      preserving sequential ordering).  LACP active mode round-trips
      cleanly; Aruba's ``static`` -> Junos "no LACP" (membership
      without ``aggregated-ether-options lacp``).  Aruba's
      ``dt-lacp`` (multi-chassis) collapses to ``active`` with a
      comment — Junos has no MC-LAG parallel without dedicated
      Virtual Chassis or MC-LAG configuration outside this LAG
      primitive.  Junos requires a chassis-wide
      ``aggregated-devices ethernet device-count`` allocation that
      has no Aruba analogue; render synthesises a default value.
    references: [aruba-lags, junos-lag-overview, junos-ae-example]

  # ── Tier 2 — local users ──

  local_users:
    disposition: lossy
    reason: >
      Aruba's two-role model (``manager`` / ``operator``) maps to
      Junos's named classes (``super-user`` / ``operator``).  Hash
      formats are NOT cross-compatible: Aruba SHA-1 (``<hex>``),
      bcrypt (``$2y$...``), and plaintext are all Aruba-only; Junos
      accepts ``$1$`` (MD5 legacy), ``$5$`` (SHA-256), ``$6$``
      (SHA-512 default since 17.2 per KB31903) but none match
      Aruba's forms.  Cross-vendor migration requires re-setting
      passwords on the target.  SSH public-key authentication on
      Junos has no Aruba analogue in the canonical
      ``hashed_password`` field shape.
    references: [aruba-user-security, junos-password-cli, junos-kb-password-format]

  # ── Tier 2 — RADIUS ──

  radius_servers:
    disposition: lossy
    reason: >
      Aruba's flat ``radius-server host <ip> key "<secret>"`` (or
      separate ``radius-server key`` for the global default) lands
      on the canonical ``host / key / auth_port / acct_port``
      tuple.  Junos render emits ``set system radius-server <host>
      secret <key>``.  Default ports (1812 / 1813) preserved.  The
      shared secret cross-decrypt is impossible — Junos's
      ``$9$...`` reversible blob and Aruba's quoted plaintext /
      encrypted form land verbatim but the target device cannot
      decode the source's form.  Operator must re-set the shared
      secret on the target.
    references: [aruba-radius, junos-radius-cli]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      Aruba AOS-S has no VXLAN concept; the aruba_aoss codec
      capability matrix lists ``/vxlan-vnis/*`` under unsupported
      ("VXLAN not modelled — AOS-S is a campus L2/L3 codec").
      ``CanonicalIntent.vxlan_vnis`` is always empty on Aruba
      parse, so there is nothing to render on Junos — the field is
      structurally absent on this direction.
    references: [aruba-vxlan-unsupported]

  vxlan_vnis[].vlan_id:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis`` (Aruba lacks the concept)."

  vxlan_vnis[].vni:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis``."

  vxlan_vnis[].mcast_group:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis``."

  vxlan_vnis[].flood_list:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis``."

  vxlan_vnis[].source_interface:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis``."

  vxlan_vnis[].udp_port:
    disposition: not_applicable
    note: "Same rationale as ``vxlan_vnis``."

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      Same rationale as ``vxlan_vnis`` — Aruba AOS-S has no EVPN /
      MP-BGP concept, so ``CanonicalIntent.evpn_type5_routes`` is
      always empty on Aruba parse.

  # ── Tier 2 (ship-before-wire) — VRF / routing-instance ──

  routing_instances:
    disposition: not_applicable
    note: >
      Aruba AOS-S has no VRF concept (single global routing table on
      this platform line).  ``CanonicalIntent.routing_instances``
      and ``CanonicalInterface.vrf`` are always empty on Aruba
      parse, so Junos render emits no ``set routing-instances``
      blocks on this direction.
    references: [aruba-vrf-unsupported, junos-instance-type, junos-l3vpn]

  routing_instances[].name:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].instance_type:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].route_distinguisher:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].rt_imports:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].rt_exports:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].description:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances``."

  routing_instances[].l3_vni:
    disposition: not_applicable
    note: "Same rationale as ``routing_instances`` (no EVPN on Aruba)."

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier 3 by design — never auto-rendered.  Each codec's
      raw_sections content is vendor-private; cross-vendor migration
      drops it with a banner.

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec does not
      consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: "Informational metadata only."

  source_version:
    disposition: not_applicable
    note: "Informational metadata only."

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``set apply-groups <G>`` per GAP 9b);
      Aruba source has no equivalent and never populates this list.

  group_content:
    disposition: not_applicable
    note: >
      Companion to ``apply_groups``; same not-applicable status for
      Aruba as source.

# ---------------------------------------------------------------------------
# Notes on confidence and deferred items
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The keyword-stable surface (vlans / hostname / DNS / SNMP
#     v1+v2c / radius-server / static-routes / IPv4+IPv6 addressing)
#     is high-confidence and grounded by both vendors' published CG.
#
#   * The asymmetric direction (Aruba narrower than Junos) makes
#     most Junos-only categories not_applicable rather than
#     unsupported — there is no source data to lose.
#
#   * The interface-naming, hash-format, NTP/SNTP protocol, and
#     LAG-name index translation surfaces are medium-confidence:
#     vendor docs are clear but cross-vendor render involves codec
#     policy decisions (Operator/Manager -> read-only/read-write,
#     manager/operator -> class super-user/operator, Trk<N> -> ae<N-1>)
#     that operators may want to override.
#
# Deferred items (codec-side wire-up gaps surface as not_applicable
# here; "lossy by deferral" descriptions in the topic markdowns):
#
#   * MTU / voice_vlan / domain / syslog / timezone — aruba_aoss
#     codec parse path does not cover these directives today.
#   * IPv6 static routes — CanonicalStaticRoute is IPv4-shaped today.
#   * Per-VRF static routes — schema gap (no vrf field on
#     CanonicalStaticRoute) AND structurally absent on Aruba.

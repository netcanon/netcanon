# Cross-vendor fidelity expectations: fortigate_cli -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_juniper_junos/
#
# This is a firewall -> DC-class router pair.  FortiGate FortiOS is a
# session-based stateful firewall + UTM appliance with a thin L2
# surface (hardware-switch only on entry-level boxes); Junos is a
# carrier/DC-class router with a rich EVPN-VXLAN + apply-groups +
# instance-type discriminator model that has no FortiGate analogue
# on the source side.
#
# The asymmetric loss concentrates on three surfaces:
#
#   1.  FortiGate's primary product surface (firewall policy, NAT,
#       VPN, IPsec, UTM, SD-WAN, virtual-IP) has no canonical model
#       and no Junos auto-render target.  Operators accept that
#       FortiGate's stateful security plane is lost on migration —
#       Junos-as-router does not replace a firewall.
#   2.  FortiGate's VDOMs (heavyweight multi-tenancy with independent
#       firewall + admin sessions) cannot be auto-projected onto
#       Junos's logical-systems / routing-instances.  Per-interface
#       integer VRF (FortiOS 7.0+) is parse-and-ignore in v1.
#   3.  FortiGate has no Junos-source-only constructs: apply-groups
#       and group_content are structurally absent on FortiGate
#       source (always empty).  EVPN-VXLAN VNI mappings, MAC-VRF,
#       L3 VNI, switch-options globals — none exist in FortiOS.
#
# Foundations (hostname / DNS / NTP / syslog / SNMP / RADIUS /
# static routes / IPv4-IPv6 + MTU / LAGs) translate via the
# canonical tree with documented per-field caveats.
#
# certainty=medium because:
#   * Shared scalar surface (hostname / domain / dns / ntp / syslog
#     /static-routes / RADIUS / SNMP v1+v2c) is high-confidence
#     under the canonical scope: FortiOS CLI Reference and Junos
#     TechLibrary are unambiguous on the grammar.
#   * Switching features (switchport_mode / access_vlan / trunk_*
#     / voice_vlan) are confidently not_applicable from FortiGate
#     source — FortiGate parse never populates those canonical
#     fields, so Junos render emits a routed-port-only layout.
#   * Firewall / NAT / UTM / VPN surfaces are confidently
#     unsupported (canonical schema gap; out of v1 scope).
#   * VRF / routing-instances are confidently unsupported in this
#     direction (FortiGate codec does not parse ``set vrf <id>``
#     into CanonicalRoutingInstance in v1; Junos source-side does
#     wire it via GAP 6, but that is the reverse direction).
#   * VXLAN / EVPN are confidently not_applicable from FortiGate
#     source (firewall codec; FortiOS has no fabric data plane).

meta:
  source_vendor: fortigate_cli
  target_vendor: juniper_junos
  primary_use_case: >
    FortiGate firewall edge / SD-WAN aggregator -> Juniper Junos
    DC or carrier router (MX / QFX / EX) migration.  Common scenario:
    folding a FortiGate-as-router (where FortiGate was deployed in
    a routing-only role with the firewall surface unused) into a
    Juniper-shop's standardised MX / QFX / EX platform, OR replacing
    a FortiGate edge with a Juniper SRX router + an upstream firewall
    appliance.  L3 routing, IP addressing, system services, SNMP,
    RADIUS, LAGs, and on-device DHCP servers translate; FortiGate's
    rich security plane (firewall policy, VIP, IPsec, UTM, SD-WAN)
    has no canonical model and no Junos target.  VDOMs do not
    auto-project to Junos logical-systems.
  certainty: medium
  references:

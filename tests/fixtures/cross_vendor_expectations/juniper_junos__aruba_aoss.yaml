# Cross-vendor expectations: juniper_junos -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_aruba_aoss/
#
# DC-router-to-switch pair.  Juniper Junos is a full DC-class router
# with EVPN-VXLAN, apply-groups inheritance, instance-typed routing-
# instances, and per-unit interface families; Aruba AOS-S is a
# campus L2 / basic-L3 platform (HPE ProCurve heritage).  The
# asymmetry is heavier in this direction than the reverse:
#
#   * Junos source actively populates VRFs, VXLAN VNIs, EVPN Type-5
#     L3 VNIs, and apply-groups inheritance.  Aruba target has NO
#     construct to render any of these — they actively drop on
#     render (unsupported), not structurally empty (not_applicable).
#   * The aruba_aoss codec's parse / render path is narrower than
#     Junos's — domain, syslog, mtu, timezone parse-and-ignore on
#     the Aruba codec today, so even Tier-1 surface partially drops
#     on cross-vendor round-trip.
#   * Hash formats ($1$/$5$/$6$ vs sha1/bcrypt) do not overlap;
#     re-keying always required.
#
# The keyword-stable surface (vlan id, hostname, snmp community,
# radius-server host, static routes) maps cleanly through canonical
# when both sides have a parse / render path.

meta:
  source_vendor: juniper_junos
  target_vendor: aruba_aoss
  primary_use_case: >
    Junos QFX / EX -> Aruba ProCurve / AOS-S downsizing /
    consolidation.  Heavy asymmetry: Junos source carries DC-class
    L3 / overlay surface that Aruba cannot represent (VRFs, VXLAN,
    EVPN, apply-groups), so the cross-pair has more `unsupported`
    fields than the reverse direction.  Best-suited use case:
    extracting access-layer port + VLAN + IP + SNMP intent from a
    Junos config to repurpose on a campus Aruba switch.
  certainty: medium

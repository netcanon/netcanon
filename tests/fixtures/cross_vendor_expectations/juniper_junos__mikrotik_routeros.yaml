# Cross-vendor expectations: juniper_junos -> mikrotik_routeros
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_mikrotik_routeros/
#
# DC-class router to SMB/WISP router pair.  Junos = full DC-class
# router with EVPN-VXLAN, apply-groups inheritance, two-pass parse,
# multi-instance routing.  RouterOS = SMB / WISP router-first OS with
# rich firewall / NAT / queue / wireless / hotspot plumbing but no
# fabric overlay.  Same router-class chassis but very different
# feature focus and target market.
#
# Asymmetry shape on this direction:
#
#   * Junos is broader on the L2/L3/EVPN-fabric / apply-groups axis;
#     fabric-overlay surface (vxlan_vnis, evpn_type5_routes,
#     mac-vrf routing-instances) is unsupported on the RouterOS
#     target.
#   * Junos's apply-groups STRUCTURE drops on render (group_content
#     is flattened into the canonical tree by GAP 8's two-pass parse,
#     so the post-inheritance values land on RouterOS faithfully —
#     but the original group naming + group reuse is lost).
#   * RouterOS-rich Tier-3 plumbing (firewall / NAT / scripts /
#     hotspot / queues / wireless / WireGuard / OVPN-server) is
#     structurally absent on Junos source side — nothing to lose
#     in this direction.
#
# Wire formats differ fundamentally — Junos `set ...` form with
# hierarchical inheritance and per-unit interface families;
# RouterOS `/section` + `add/set` flat record lists.  The keyword-
# stable surface (hostname, DNS, NTP, IP addresses, static routes,
# SNMP, RADIUS) round-trips through the canonical model despite
# the syntactic gap.

meta:
  source_vendor: juniper_junos
  target_vendor: mikrotik_routeros
  primary_use_case: >
    Junos DC / branch site retired in favour of a MikroTik
    RouterOS deployment (typical: SMB consolidating from a Junos
    branch QFX/EX/SRX onto a smaller RouterOS footprint, or
    operators rebuilding a Junos lab on RouterOS hardware for
    cost reduction).  The basic surface (hostname / DNS / NTP /
    IPv4-IPv6 addresses / static routes / SNMP v1/v2c + v3 /
    RADIUS / LAGs / DHCP servers) round-trips with documented
    losses; deeper Junos-only surface (EVPN-VXLAN, mac-vrf,
    apply-groups, policy-statement) drops on RouterOS render.

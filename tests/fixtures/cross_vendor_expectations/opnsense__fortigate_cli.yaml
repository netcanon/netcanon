# Cross-vendor fidelity expectations: opnsense -> fortigate_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_fortigate_cli/
#
# Phase 3 follow-up pair.  REVERSE direction of fortigate_cli ->
# opnsense.  Per the schema README's "Reverse pairs are independent
# files — not assumed symmetric" rule, this file authors the
# dispositions independently rather than mirroring.
#
# Direction-asymmetric losses on this pair:
#
#   * dns_servers: FortiGate -> OPNsense is good (FortiOS 3-cap fits
#     OPNsense's unbounded list).  OPNsense -> FortiGate is lossy
#     (OPNsense's unbounded `<dnsserver>` list may exceed FortiOS
#     primary/secondary/tertiary three-cap, dropping the tail).
#
#   * radius_servers: FortiGate -> OPNsense lossy (FortiOS ENC
#     secret can't be re-encrypted offline by codec; operator must
#     re-key on target).  OPNsense -> FortiGate lossy with different
#     mechanic (OPNsense cleartext gets passed through but FortiOS
#     re-encrypts on commit; operator can paste cleartext into
#     FortiOS GUI/CLI to commit).  Both directions need re-keying
#     but for different reasons.
#
#   * acct_port: FortiGate -> OPNsense good (FortiGate has no field;
#     defaults preserve OPNsense's 1813).  OPNsense -> FortiGate
#     lossy (non-default OPNsense acct-port drops because FortiOS
#     has no separate field).
#
#   * snmp.v3_users: FortiGate -> OPNsense unsupported (FortiGate
#     carries them but OPNsense can't accept).  OPNsense ->
#     FortiGate not_applicable (OPNsense source never carries them).
#
#   * routing_instances: FortiGate -> OPNsense unsupported (FortiGate
#     codec doesn't parse VRF in v1; OPNsense has no VRF anyway).
#     OPNsense -> FortiGate not_applicable (OPNsense source never
#     carries VRFs).
#
# Symmetric losses (lossy in both directions for the same reasons):
#
#   * Hash formats — FortiOS ENC versus OPNsense bcrypt; vendor-
#     private on either side.
#   * Firewall / NAT / VPN / UTM — Tier 3 in canonical schema; both
#     ends drop on parse with `unsupported`.

meta:
  source_vendor: opnsense
  target_vendor: fortigate_cli
  primary_use_case: >
    Hybrid migration: OPNsense firewall/router (FreeBSD-based,
    pfSense fork) -> FortiGate firewall edge.  Common scenario:
    growing organisation moving from open-source OPNsense onto a
    commercial FortiGate appliance for vendor support, advanced UTM
    features, or compliance requirements.  Foundations (hostname /
    domain / DNS / NTP / interface IPs / VLAN tags / SNMP v1/v2c /
    RADIUS / local users / DHCP server scopes / LAGs) translate via
    the canonical tree.  OPNsense's firewall (pf-based) / NAT /
    IPsec / WireGuard / plugin surface has no canonical-portable
    representation in v1; operators must manually reconstruct
    firewall policy on the FortiGate target.
  certainty: medium
  references:
    - id: opn-system
      path: docs/vendor-references/opnsense_to_fortigate_cli/system_services.md
      title: "OPNsense General Settings manual"
      source_url: "https://docs.opnsense.org/manual/settingsmenu.html"

# Cross-vendor fidelity expectations: fortigate_cli -> opnsense
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_opnsense/
#
# Phase 3 follow-up pair.  This is the FIREWALL × FIREWALL pair —
# the most role-compatible pair in the cross-mesh matrix.  Both
# vendors are session-based stateful firewalls with native models
# for the same core concepts: WAN/LAN/zone interfaces, DHCP scopes,
# IPsec VPN, RADIUS, local users, SNMP, NAT, firewall policy.
#
# Shared canonical surface (Tier 1 + Tier 2):
#
#   * hostname / domain — good (both vendors carry single-suffix
#     domain on a separate field-of-its-own)
#   * DNS / NTP / syslog / timezone — lossy on parser wire-up gaps
#     (both codecs have <system>/<dnsserver>/<timeservers>/<syslog>/
#     <timezone> wire-up incomplete)
#   * interfaces — IP/MTU/enable round-trip well; switching state
#     unsupported on both ends (firewalls)
#   * vlans — both vendors use 802.1Q child interfaces (NOT VLAN-
#     centric port lists).  This is the unusual fit-on-this-pair —
#     in the wider mesh Cisco/Aruba/Arista all use port-list shape.
#   * static_routes — lossy (OPNsense's two-block <gateways> +
#     <staticroutes> model with named-gateway JOIN; OPNsense codec
#     parser/render unwired)
#   * dhcp_servers — interface-bound on both ends, lossy on
#     edit-id-vs-zone-label addressing and DNS three-cap on FortiOS
#   * snmp — v1/v2c good; v3 USM unsupported on OPNsense (lives in
#     snmpd.conf, not config.xml)
#   * local_users — lossy (FortiOS `ENC` versus OPNsense bcrypt;
#     both vendor-private, not cross-compatible)
#   * radius_servers — lossy (FortiOS ENC versus OPNsense cleartext
#     secret; cross-vendor re-keying required)
#   * lags — lossy (FortiOS operator-named versus OPNsense `lagg<N>`
#     FreeBSD lagg(4) driver naming; LACP-mode collapse)
#
# What's firmly out of scope on the canonical-portable form
# (unsupported despite both ends modelling natively):
#
#   * FortiGate firewall policy / VIPs / address-objects — Tier 3
#   * FortiGate IPsec / SSL-VPN — Tier 3
#   * FortiGate UTM (web filter, IPS, application control) — Tier 3
#   * FortiGate VDOMs — heavyweight multi-tenancy primitive
#   * FortiGate per-interface integer VRF — codec doesn't parse v1
#
# This is the unfortunate gap on what should be the most
# role-compatible pair in the matrix: both ends model the same
# concepts natively, but the canonical-portable form does not carry
# the data (Tier 3 — policy semantics differ enough between vendors
# that auto-translation would be unsafe).  Operators must manually
# reconstruct security policy after migration.

meta:
  source_vendor: fortigate_cli
  target_vendor: opnsense
  primary_use_case: >
    Hybrid migration: FortiGate firewall edge -> OPNsense
    firewall/router (FreeBSD-based, pfSense fork).  Common scenario:
    cost-driven consolidation onto open-source OPNsense for SMB /
    home-lab deployments, or migration off legacy FortiGate hardware
    nearing EOL.  Foundations (hostname / DNS / NTP / interface IPs /
    VLAN tags / SNMP v1/v2c / RADIUS / local users / DHCP server
    scopes / LAGs) translate via the canonical tree.  FortiGate's
    rich firewall / NAT / UTM / IPsec product surface has no
    canonical-portable representation in v1; operators must
    manually reconstruct on the OPNsense target.
  certainty: medium
  references:
    - id: fgt-system-services

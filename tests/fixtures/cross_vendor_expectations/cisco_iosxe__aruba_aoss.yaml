# Cross-vendor fidelity expectations: cisco_iosxe -> aruba_aoss
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML (Phase-0.5
# stub; parse() walks `<interfaces>` only).
# Target: aruba_aoss codec — `certified`-grade AOS-S CLI render.
#
# Reverse direction of aruba_aoss__cisco_iosxe.  The asymmetry on
# this cross-pair is dominated by the cisco_iosxe codec's parse()
# being narrow: it walks `<interfaces>` and ignores `<system>`,
# `<vlans>`, `<network-instances>`, `<snmp>`, `<routing-policy>`,
# etc.  Even when a real device's `<get-config>` reply carries all
# of those, the parser drops them silently.  The canonical tree
# the AOS-S target render consumes is therefore overwhelmingly
# empty for non-interface fields.
#
# Direction-specific framing: classification skews toward
# `not_applicable` rather than `unsupported`/`lossy`.  The schema
# README's not_applicable definition covers this case: "the field
# is structurally absent on the source vendor's wire format" —
# here the wire format CARRIES it but the codec doesn't extract,
# which is operationally the same thing from the perspective of
# the canonical tree the target render sees.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_aruba_aoss/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit (one of
# six aruba_aoss-mesh parallel pairs).

meta:
  source_vendor: cisco_iosxe
  target_vendor: aruba_aoss
  primary_use_case: >
    NETCONF-source orchestration pipeline emitting AOS-S CLI for
    a campus device — narrow case where the orchestrator can
    reliably read OpenConfig from the upstream Cisco fabric but
    the access-edge target is an Aruba 2930F/2930M.  The cisco_iosxe
    codec is a Phase-0.5 stub so this pair carries only interface-
    level data; for any real campus migration use cisco_iosxe_cli
    instead.  This pair primarily exists to demonstrate that the
    parse-side wire-up gap dominates classification on every cross-
    pair where cisco_iosxe is the source.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/cisco_iosxe_to_aruba_aoss/oc-parse-narrow.md
      title: "openconfig-interfaces YANG schema docs"

      title: "IPv6 addresses: cisco_iosxe source to fortigate_cli target"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-if-ip.html"
      retrieved: "2026-05-01"
    - id: vlan_render_gap
      path: docs/vendor-references/cisco_iosxe_to_fortigate_cli/vlan_render_gap.md

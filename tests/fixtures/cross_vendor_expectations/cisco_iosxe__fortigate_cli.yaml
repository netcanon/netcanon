# Cross-vendor fidelity expectations: cisco_iosxe -> fortigate_cli
#
# Source: cisco_iosxe codec — OpenConfig NETCONF YANG XML.
# Target: fortigate_cli codec — FortiOS CLI text.
#
# This is the NETCONF/OpenConfig sibling of cisco_iosxe_cli (operator-
# paste running-config) sourcing a FortiGate firewall edge.  The
# asymmetry on this cross-pair is dominated by the cisco_iosxe codec
# being a Phase-0.5 stub whose parser walks `<interfaces>` only — it
# does NOT read `<system>` (hostname / DNS / NTP / syslog / users /
# RADIUS), `<network-instances>` (VLANs / static-routes / VRFs),
# `<snmp>`, or `<openconfig-if-aggregate>` (LAGs).  After parse, only
# `intent.interfaces` carries data.
#
# Direction-specific framing: for fields the cisco_iosxe parser
# never populates (which is everything except interface basics), the
# disposition here is `not_applicable` (source structurally absent)
# rather than `lossy` (would imply data was dropped).  This mirrors
# the cisco_iosxe__cisco_iosxe_cli pair's framing: when the source
# wire format already lost the data before the codec saw it, the
# loss is `not_applicable` on the cross-pair.  Honest classification
# beats matrix-deference — the codec's `_CAPS.supported` declarations
# for `/system/hostname`, `/system/dns-server`, `/snmp/community`,
# etc. are aspirational (cross-codec mesh friendliness) but the
# actual parser body never populates them.
#
# Plus a firewall-target asymmetry: FortiGate's primary product
# surface (firewall policy / NAT / VIP / UTM) has no canonical
# representation in v1 — but on this forward direction the cisco_iosxe
# parser also doesn't read OpenConfig `<acl>` / NAT subtrees, so the
# question is moot upstream of canonical.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_to_fortigate_cli/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit.

meta:
  source_vendor: cisco_iosxe
  target_vendor: fortigate_cli
  primary_use_case: >
    Cisco IOS-XE source consumed via NETCONF/OpenConfig and re-emitted
    as FortiGate FortiOS CLI for a routing-and-security edge
    consolidation.  Appropriate ONLY for the narrow case where the
    upstream orchestrator has already gathered system / VLAN /
    static-route / SNMP / users / RADIUS data via a separate channel
    (e.g. the device's `cisco_iosxe_cli` running-config) and is using
    `cisco_iosxe -> fortigate_cli` for the interface-only sub-step.
    For a full Catalyst / ISR -> FortiGate migration, route through
    `cisco_iosxe_cli -> fortigate_cli` instead — that pair is
    `certified` on the source side and emits the full canonical
    surface.
  certainty: medium
  references:
    - id: openconfig_yang_scope
      path: docs/vendor-references/cisco_iosxe_to_fortigate_cli/openconfig_yang_scope.md
      title: "OpenConfig YANG scope: what the cisco_iosxe parser reads from a NETCONF reply"
      source_url: "https://openconfig.net/projects/models/schemadocs/yangdoc/openconfig-interfaces.html"
      retrieved: "2026-05-01"

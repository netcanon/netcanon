# ---------------------------------------------------------------------------
# Per-field expectations.  Walks every top-level CanonicalIntent field
# (and meaningful sub-fields) defined in
# netcanon/migration/canonical/intent.py.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: not_applicable
    note: >
      The cisco_iosxe NETCONF parser walks `<interfaces>` only and
      never populates `intent.hostname`.  Even when the source XML
      includes a `<system><config><hostname>` element, the parser
      ignores it.  Disposition is `not_applicable` (parser never
      produces) rather than `lossy` (would be data loss) — the input
      to the FortiGate render is structurally empty for this field.
      The cisco_iosxe matrix declares `/system/hostname` `supported`
      aspirationally; the actual parser body doesn't walk `<system>`.
      Once the NETCONF parser wires `<system>` reading this flips to
      good (hostname round-trips bare-text on FortiOS `set hostname
      "X"` modulo the 35-char FortiOS cap).
    references: [openconfig_yang_scope, oc_system]

  domain:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  cisco_iosxe parser doesn't read
      `<system><config><domain-name>` today.  Flips to good once
      wired (FortiOS `set domain "X"` under `config system dns`).
    references: [openconfig_yang_scope, oc_system]

  dns_servers:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  cisco_iosxe parser doesn't read
      `<system><dns><servers>` today.  Once wired, flips to lossy
      because FortiOS schemas DNS into `set primary` / `set secondary`
      (and a hidden `set tertiary`) — at most three; Cisco-side
      configurations with more than three servers would lose the tail
      on FortiGate render.
    references: [openconfig_yang_scope, oc_system]

  ntp_servers:
    disposition: not_applicable
    note: >
      Same parse-side wire-up gap.  cisco_iosxe parser doesn't read
      `<system><ntp><servers>` today.  Once wired, flips to lossy
      (per-server `prefer` / `key` / `source` modifiers not modelled
      in canonical; FortiOS additionally requires `set ntpsync enable`
      / `set type custom` outside the per-server table).
    references: [openconfig_yang_scope, oc_system]

  timezone:
    disposition: not_applicable
    note: >
      Parser doesn't read `<system><clock><config><timezone-name>`
      today.  Once wired, flips to lossy: OpenConfig prefers IANA
      tz database identifiers (`America/Los_Angeles`); FortiOS uses
      a numeric index (`set timezone <NN>`) per the FortiOS Cookbook
      timezone table.  Cross-format mapping requires an operator-
      curated lookup.
    references: [openconfig_yang_scope, oc_system]

  syslog_servers:
    disposition: not_applicable
    note: >
      Parser doesn't read `<system><logging><remote-servers>` today.
      Flips to lossy once wired (FortiOS `config log syslogd setting`
      / `syslogd2` / `syslogd3` cap at three; longer Cisco lists
      would drop the tail).
    references: [openconfig_yang_scope, oc_system]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips through the cisco_iosxe
      codec's parse path and the FortiGate codec's render path —
      name / description / enabled / interface_type / IPv4 / IPv6 are
      good (with caveats below).  The lossy classification reflects
      per-field drift listed below: secondary IPv4 addresses drop on
      FortiGate render (FortiGate accepts only one address per
      interface natively), interface_type IANA ident is not preserved
      on the FortiOS side (inferred from name shape), IPv6 link-local
      scope is hard-coded global on parse, and switchport / VLAN /
      LAG / VRF / DHCP-client fields are not_applicable (cisco_iosxe
      parser doesn't read them today; parse-side wire-up gap).
    references: [interface_fields]

  "interfaces[].name":
    disposition: good
    note: >
      Cisco `GigabitEthernet0/0/0` -> FortiOS `port1` after the
      port-rename mesh translates the names.  Without the rename
      mesh, the literal Cisco name reaches the FortiOS render and a
      real FortiGate would reject it on edit-config.  The canonical
      string round-trips byte-for-byte through the canonical layer.
    references: [interface_fields]

  "interfaces[].description":
    disposition: lossy
    reason: >
      OpenConfig `<config><description>` text -> FortiOS `set alias
      "<text>"`.  FortiOS caps alias at 25 characters — longer Cisco
      descriptions truncate on FortiGate render.  Cisco IOS-XE caps
      description at 240 characters per the Interface and Hardware
      Component Configuration Guide, so truncation is plausible on
      real captures.  The fortigate_cli codec already declares this
      via LossyPath at `/interfaces/interface/config/description`;
      the kitchen_sink fixture exercises five interfaces with
      descriptions of 30/34/40/44/33 chars which all truncate at
      byte 25 on FortiGate render.
    references: [interface_fields]

  "interfaces[].enabled":
    disposition: good
    note: >
      YANG `<enabled>true</enabled>` / `<enabled>false</enabled>` ->
      FortiOS `set status up` / `set status down`.  Strict YANG-bool
      parsing on cisco_iosxe ensures only `"true"` / `"false"`
      (case-insensitive) survive parse; anything else fails loud on
      input.
    references: [interface_fields]

  "interfaces[].interface_type":
    disposition: lossy
    reason: >
      Cisco source emits IANA ifType ident verbatim (e.g.
      `iana-if-type:ethernetCsmacd`, `iana-if-type:l2vlan`,
      `iana-if-type:ieee8023adLag`).  FortiOS has no IANA ifType
      concept — the FortiGate render encodes type implicitly via
      `set type vlan` / `set type aggregate` or via the parent edit
      ID's name shape.  The canonical IANA ident does NOT survive
      to the FortiOS wire; round-trip cisco_iosxe -> fortigate_cli ->
      cisco_iosxe would lose the type ident.
    references: [interface_fields]

  "interfaces[].mtu":
    disposition: not_applicable
    note: >
      The cisco_iosxe codec's `_iface_dict_to_canonical()` reads
      `<config><mtu>` into the raw parser dict but does NOT project
      it onto `CanonicalInterface.mtu`.  Field is empty on parse;
      FortiGate render emits no `set mtu` line regardless of source
      content.  Promotes to lossy once cisco_iosxe parse wires mtu
      projection (OpenConfig's single mtu leaf doesn't distinguish
      link-MTU from `ip mtu` / `ipv6 mtu` / `mpls mtu`; FortiOS
      `set mtu` is a single integer).
    references: [interface_fields]

  "interfaces[].ipv4_addresses":
    disposition: lossy
    reason: >
      cisco_iosxe parser reads
      `<subinterfaces><subinterface><ipv4><addresses>` populating the
      full address list with prefix-length.  FortiGate render emits
      `set ip <addr> <mask>` — but FortiOS accepts only ONE primary
      IPv4 per interface natively (secondary addresses are configured
      via `config ipv4-secondary` which the FortiGate render path
      does not emit in v1).  Multi-address Cisco source -> first
      address only on FortiGate target; tail addresses drop with a
      banner.
    references: [interface_fields]

  "interfaces[].ipv6_addresses":
    disposition: lossy
    reason: >
      The cisco_iosxe codec hard-codes `scope="global"` on every
      parsed IPv6 address (link-local inference not yet wired) — a
      Cisco source with `fe80::/10` link-local addresses gets the
      addresses mis-categorised as global on canonical.  FortiOS
      `set ip6-address` infers link-local from prefix internally, so
      the cross-pair render emits correctly in practice; the lossy
      bit is the canonical-model gap (scope discriminator dropped
      on parse).
    references: [ipv6_addresses]

  "interfaces[].switchport_mode":
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk the `openconfig-vlan:
      switched-vlan` augment under `<ethernet>`.  Even when the
      source XML carries switchport state (which Catalyst devices
      emit), the parser skips it.  `intent.interfaces[].switchport_mode`
      is None after parse — there is no data for FortiGate render to
      drop.  When parser is extended this flips to unsupported
      (FortiGate is L3-only beyond the hardware-switch sub-feature
      on a few low-end models).
    references: [vlan_render_gap]

  "interfaces[].access_vlan":
    disposition: not_applicable
    note: >
      Same `switched-vlan` parse-side wire-up gap.  Flips to
      unsupported once wired (FortiGate has no access-VLAN concept on
      routed interfaces).
    references: [vlan_render_gap]

  "interfaces[].trunk_allowed_vlans":
    disposition: not_applicable
    note: >
      Same wire-up gap.  Flips to unsupported once wired (FortiGate
      child-interface model encodes membership via the parent's
      identity, not as a port list per VLAN).
    references: [vlan_render_gap]

  "interfaces[].trunk_native_vlan":
    disposition: not_applicable
    note: Same wire-up gap. Flips to unsupported once wired.
    references: [vlan_render_gap]

  "interfaces[].voice_vlan":
    disposition: not_applicable
    note: >
      Same wire-up gap, plus FortiGate has no voice-VLAN concept
      (L3-only product surface).  Doubly absent.
    references: [vlan_render_gap]

  "interfaces[].lag_member_of":
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk the `openconfig-if-aggregate`
      augment.  `<aggregate-id>` leaf under `<ethernet>` would
      indicate Port-channel membership; parser skips it.  Flips to
      good once wired (FortiOS aggregate `set member` references
      survive the rename mesh).
    references: [interface_fields]

  "interfaces[].dhcp_client":
    disposition: not_applicable
    note: >
      Parser doesn't walk the OpenConfig DHCP-client augment.  Flips
      to lossy once wired — the FortiGate codec's render path does
      not currently emit `set mode dhcp` from
      `intent.interfaces[].dhcp_client`.
    references: [interface_fields]

  "interfaces[].vrf":
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `<network-instances>`
      (where VRF interface-membership lives).  The FortiGate codec
      also doesn't surface `set vrf <id>` onto canonical in v1.
      Cross-pair drops VRF membership entirely.
    references: [vxlan_evpn_gap, oc_network_instance]

  vlans:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `<network-instances><vlans>`.
      `intent.vlans` is empty after parse regardless of source XML
      content.  FortiGate render therefore emits no VLAN child
      interfaces.  Flips to lossy once wired (FortiGate's child-
      interface model requires synthesising one interface per
      (parent, vlan-id) tuple; v1 render does not auto-synthesise).
    references: [vlan_render_gap]

  static_routes:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk
      `<network-instances><protocols><protocol identifier=STATIC>`.
      `intent.static_routes` is empty after parse.  Flips to good
      for default-VRF routes once wired (FortiOS `config router
      static / edit N / set dst / set gateway` round-trips cleanly);
      per-VRF routes remain lossy until canonical model gains a vrf
      field on CanonicalStaticRoute.
    references: [openconfig_yang_scope, oc_network_instance]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: not_applicable
    note: >
      OpenConfig has no fully-baked DHCP server model in widely-
      deployed Cisco IOS-XE versions.  The cisco_iosxe parser doesn't
      attempt to read DHCP XML.  Disposition stays `not_applicable`
      (no input to render); future work could bridge the
      Cisco-IOS-XE-dhcp native YANG via a sibling codec but that's
      out of scope for the OpenConfig-only `cisco_iosxe` codec.
      FortiGate target would accept `intent.dhcp_servers` records and
      emit `config system dhcp server` blocks if populated.
    references: [openconfig_yang_scope]

  snmp:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk SNMP XML.  `intent.snmp`
      is None after parse.  FortiGate render emits no SNMP stanzas
      regardless.  Flips to lossy once wired (multi-community
      collapse: FortiGate's edit-table can carry multiple community
      strings but canonical holds a single scalar; vendor-specific
      engineID-salting on v3 passphrases requires re-keying on
      target).
    references: [snmp_render_gap]

  "snmp.community":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [snmp_render_gap]

  "snmp.location":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [snmp_render_gap]

  "snmp.contact":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [snmp_render_gap]

  "snmp.trap_hosts":
    disposition: not_applicable
    note: Parse-side wire-up gap. Same as `snmp` above.
    references: [snmp_render_gap]

  "snmp.v3_users":
    disposition: not_applicable
    note: >
      The cisco_iosxe codec capability matrix lists `/snmp/v3-user`
      under `unsupported` explicitly ("Phase 0.5 stub — SNMPv3 USM
      wire-up requires Cisco-IOS-XE-snmp native YANG bridging").
      Parser doesn't read v3 user XML; `intent.snmp.v3_users` is
      empty after parse.  Even if the v1/v2c surface eventually
      wires up, v3 stays unsupported on the cisco_iosxe source until
      native-YANG bridging lands.  When wired, cross-vendor
      passphrase migration to FortiGate requires re-keying because
      USM keys are salted with vendor-specific engineID-derived
      constants.
    references: [snmp_render_gap]

  lags:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `openconfig-if-aggregate`.
      `intent.lags` is empty after parse.  FortiGate render emits no
      aggregate stanzas.  Flips to lossy once wired (Cisco's
      mandated `Port-channel<N>` form differs from FortiGate's
      operator-named aggregates `LAG_<role>` / `agg<n>`; PAgP modes
      `auto` / `desirable` have no FortiOS equivalent and coerce to
      LACP active / passive with a banner).
    references: [openconfig_yang_scope]

  local_users:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `<system><aaa>`.
      `intent.local_users` is empty after parse.  FortiGate render
      emits no admin user stanzas regardless.  Flips to lossy once
      wired (Cisco's numeric privilege levels vs FortiGate's named
      accprofile strings; hash format incompatibility requires
      re-keying on target — Cisco type-9 / type-8 / type-5 are not
      FortiOS-accepted, FortiOS uses proprietary `ENC <base64>`).
    references: [openconfig_yang_scope]

  radius_servers:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `<system><aaa><server-groups>`.
      `intent.radius_servers` is empty after parse.  FortiGate render
      emits no RADIUS stanzas.  Flips to lossy once wired (shared-
      secret format incompatibility — Cisco type-7 reversible vs
      FortiOS `ENC <opaque-base64>` — requires re-keying on target;
      FortiOS has no separate acct-port field, derived as auth-port + 1).
    references: [openconfig_yang_scope]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      Both codecs declare every `/vxlan-vnis/*` path as `unsupported`
      in their capability matrices.  cisco_iosxe parser doesn't
      populate `intent.vxlan_vnis`; FortiGate renderer doesn't emit
      VXLAN regardless ("VXLAN not modelled — FortiGate is a firewall
      codec").  Doubly missing.
    references: [vxlan_evpn_gap]

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      No codec populates per-prefix EVPN Type-5 records today.
      FortiGate as a firewall has no EVPN data plane; cross-vendor
      migration is not applicable.
    references: [vxlan_evpn_gap]

  routing_instances:
    disposition: not_applicable
    note: >
      The cisco_iosxe parser doesn't walk `<network-instances>`.
      `intent.routing_instances` is empty after parse.  FortiGate
      codec also doesn't parse `set vrf <id>` into canonical
      `CanonicalRoutingInstance` records in v1, and VDOMs are a
      heavier multi-tenancy primitive that requires per-VDOM
      canonical-tree splitting (out of v1 pipeline scope).
    references: [vxlan_evpn_gap, oc_network_instance]

  # ── Tier 3 — informational only (never auto-rendered) ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 by design.  cisco_iosxe parser populates raw_sections
      only with leftover XML it can't classify (typically empty);
      FortiGate renderer ignores raw_sections entirely on this side
      of the pipeline.  Cross-vendor translation is out of scope for
      this field — including FortiGate-side firewall policy / NAT /
      VIP / UTM stanzas which are vendor-private (see
      firewall_unsupported reference).
    references: [firewall_unsupported]

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec doesn't
      consume it.  Not a translation field.

  source_format:
    disposition: not_applicable
    note: Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific (`apply-groups` statement preservation per GAP
      9b).  Cisco IOS-XE and FortiGate codecs do not emit
      apply_groups; field is always empty on this cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Junos-specific (group-scoped set-line tails).  Same as
      apply_groups — empty on this cross-pair.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The structural framing is high-confidence: the cisco_iosxe
#     codec's parse() body is in-tree code that any reader can verify,
#     and the conclusion that it walks <interfaces> only is verifiable
#     by code inspection.  The cisco_yang_blog reference confirms
#     OpenConfig's broader scope (system / network-instances / snmp /
#     aaa) is real on the wire — the gap is on the codec side.
#
#   * The interface canonical-core dispositions (good for name /
#     description / enabled; lossy for type / ipv6 link-local /
#     ipv4 secondaries) are confidence-high — both codecs already
#     round-trip the canonical fields on real-capture fixtures.
#
#   * The non-interface not_applicable dispositions are confidence-
#     medium: it's mechanically true that the parser doesn't populate
#     today, but the matrix declarations as `supported` (rather than
#     `unsupported`) make the codec's INTENT clear — these should
#     round-trip eventually.  An operator running this today must

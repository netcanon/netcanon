# Cross-vendor fidelity expectations: cisco_iosxe_cli -> cisco_iosxe
#
# Same vendor, different wire format:
#   * source = `cisco_iosxe_cli`  — operator-paste running-config text
#   * target = `cisco_iosxe`      — NETCONF / OpenConfig YANG XML
#
# Both codecs target the same Cisco IOS-XE 17.x platform family
# (Catalyst 9K, ISR, ASR1K, Cat8000V).  In theory this cross-pair
# should round-trip near-100% because both wire formats project the
# same operational state.  In practice this repository's `cisco_iosxe`
# codec is a Phase-0.5 stub (declared `best_effort` certification, not
# `certified`) whose parse/render only walks `<interfaces>` and IPv4 /
# IPv6 addresses — many paths declared `supported` in its capability
# matrix are aspirational.  Drift on this cross-pair is therefore
# overwhelmingly **codec wire-up gap**, not **model gap**.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_cli_to_cisco_iosxe/
#
# Authored 2026-04-30 as part of Phase 3 cross-mesh audit (one of seven
# parallel pairs).

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: cisco_iosxe
  primary_use_case: >
    Cross-format same-vendor migration: pasting a Catalyst 9300 /
    ISR4K `show running-config` into a NETCONF/OpenConfig-driven
    orchestration pipeline (e.g. NSO, Cisco Crosswork, ServiceNow
    OPN integrations).  Demonstrates the `OpenConfig surface` ceiling
    on field portability — anything Cisco-IOS-XE-native models that
    OpenConfig doesn't is dropped on render.
  certainty: medium
  references:
    - id: cisco-yang-blog

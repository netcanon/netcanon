# Cross-vendor fidelity expectations: opnsense -> cisco_iosxe
#
# Source: opnsense codec — `certified` OPNsense `config.xml` parse.
# Target: cisco_iosxe codec — OpenConfig NETCONF YANG XML render
# (Phase-0.5 stub; render emits `<interfaces>` only).
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_cisco_iosxe/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit Batch 2
# (one of seven parallel pair agents).
#
# Direction-specific framing.  Reverse direction of
# cisco_iosxe__opnsense.yaml.  The asymmetry runs the opposite way:
#
#   1. The opnsense SOURCE codec's parse() populates several Tier-1
#      / Tier-2 fields beyond `interfaces`: hostname / domain /
#      local_users / radius_servers / snmp (v1/v2c) / lags /
#      vlans (id + name) / dhcp_servers.  But it leaves DNS / NTP /
#      syslog / timezone / static_routes / IPv6 link-local empty
#      due to its own parse-side wire-up gaps.
#
#   2. The cisco_iosxe TARGET codec's _render_canonical() emits
#      `<interfaces>` only — no `<system>`, `<vlans>`, `<snmp>`,
#      `<network-instances>`, `<routing>`.  Even when the canonical
#      tree carries hostname / SNMP / VLAN / RADIUS / local-users
#      records, the render emits a bare `<interfaces>` document.
#
# The composite effect: heavy `unsupported` (target render-side
# decline for fields the OPNsense source CAN populate) plus some
# `not_applicable` (where the OPNsense source itself doesn't
# populate, e.g. switchport state / VRF).  Schematically different
# from the forward pair which is dominated by `not_applicable` —
# operationally identical though (data not in output regardless).

meta:
  source_vendor: opnsense
  target_vendor: cisco_iosxe
  primary_use_case: >
    NETCONF-target orchestration emitting OpenConfig YANG towards a
    Cisco IOS-XE device, sourced from an OPNsense firewall config.
    The cisco_iosxe codec is a Phase-0.5 stub so this pair pushes
    only interface-level data through to render; for any real
    perimeter-to-router migration use cisco_iosxe_cli as the
    target.  This pair primarily exists to demonstrate that the
    render-side wire-up gap dominates classification on every
    cross-pair where cisco_iosxe is the target.
  certainty: medium
  references:
    - id: oc-interfaces
      path: docs/vendor-references/opnsense_to_cisco_iosxe/openconfig_yang_scope.md
      title: "openconfig-interfaces YANG schema docs"

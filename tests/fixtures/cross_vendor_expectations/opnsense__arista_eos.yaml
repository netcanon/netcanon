# Cross-vendor fidelity expectations: opnsense -> arista_eos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/opnsense_to_arista_eos/
#
# Phase 3 follow-up pair.  REVERSE direction of arista_eos -> opnsense.
# OPNsense source carries firewall-shape state (zones, gateways, dhcpd
# interface-keyed pools, authservers) that has no first-class
# destination on an Arista DC switch.  Arista's DC switching state
# (per-port switchport modes, spanning-tree, voice-VLAN), VRF /
# EVPN-VXLAN fabric, and BGP control-plane are structurally absent on
# OPNsense parse.  The role-mismatch surfaces invert versus the
# forward direction:
#
#   * Switching state: not_applicable here (OPNsense source never
#     populates it); was unsupported on the forward direction
#     (Arista carried it, OPNsense couldn't render).
#   * VRF / EVPN-VXLAN fabric: not_applicable here (OPNsense never
#     carries them); was unsupported on the forward direction.
#   * DHCP server pools: lossy here (OPNsense has them, Arista
#     accepts them with codec wire-up gap); was lossy on the forward
#     direction too.
#   * Hash formats: still lossy in both directions.

meta:
  source_vendor: opnsense
  target_vendor: arista_eos
  primary_use_case: >
    Edge migration: OPNsense firewall/router -> Arista EOS DC leaf
    (e.g. promoting an OPNsense edge into an Arista DC fabric leaf
    while preserving the small router/firewall canonical surface).
    Source side carries firewall-shape state that the Arista target
    cannot accept; OPNsense's small canonical surface (hostname /
    domain / DNS / NTP / syslog / interface IPs / VLAN tags / SNMP
    v1/v2c / RADIUS / local users / DHCP server pools / LAGs) lands
    partially.  Arista DC-switching state (per-VLAN port lists,
    voice-VLAN), VRF / EVPN-VXLAN fabric, and BGP control-plane
    are structurally absent on OPNsense parse.
  certainty: medium
  references:
    - id: opnsense-interfaces
      path: docs/vendor-references/opnsense_to_arista_eos/interfaces.md
      title: "OPNsense Interfaces manual"
      source_url: "https://docs.opnsense.org/manual/interfaces.html"
      retrieved: "2026-04-30"

# ---------------------------------------------------------------------------
# Per-field expectations.  Walks CanonicalIntent top-down per
# netconfig/migration/canonical/intent.py.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      OPNsense ``<system>/<hostname>`` (bare short name) ↔ Arista
      ``hostname <name>``.  Round-trip is lossless on the string
      content.
    references: [opnsense-system, arista-system-cg]

  domain:
    disposition: good
    note: >
      OPNsense ``<system>/<domain>`` ↔ Arista ``dns domain <fqdn>``
      (``ip domain-name`` is the older parse-compatible form).
      Both vendors model the DNS suffix as a separate scalar.
    references: [opnsense-system, arista-system-cg]

  dns_servers:
    disposition: lossy
    reason: >
      OPNsense ``<system>/<dnsserver>`` repeated elements collapse
      to a bare list on canonical (in element order).  Arista
      codec renders ``ip name-server vrf default <addr>`` lines
      cleanly, but the OPNsense parser does not currently wire
      ``<dnsserver>`` into ``CanonicalIntent.dns_servers``
      (capability matrix declares the path supported but parser
      branch is incomplete).  Cross-pair drops the resolver list
      pending wire-up.
    references: [opnsense-system, arista-system-cg]

  ntp_servers:
    disposition: lossy
    reason: >
      OPNsense's space-separated ``<system>/<timeservers>`` element
      maps to Arista ``ntp server <addr>`` lines (one per host).
      OPNsense codec parser does not currently wire ``<timeservers>``
      into canonical.  Per-server NTP options (``prefer`` /
      ``iburst`` / ``key`` / ``source``) are not modelled on
      either side.
    references: [opnsense-system, arista-system-cg]

  timezone:
    disposition: lossy
    reason: >
      OPNsense Olson zoneinfo (``America/Los_Angeles``) versus
      Arista ``clock timezone <name> <hh-offset> <min-offset>``
      (e.g. ``PST -8 0``) require an operator-curated mapping
      table.  Codec wire-up gap on both ends.
    references: [opnsense-system, arista-system-cg]

  syslog_servers:
    disposition: lossy
    reason: >
      OPNsense ``<system>/<syslog>/<remoteserver>`` ↔ Arista
      ``logging host <addr>``.  OPNsense codec does not currently
      wire ``<syslog>`` into canonical on parse; cross-pair drops
      pending wire-up.
    references: [opnsense-system, arista-system-cg]

  interfaces:
    disposition: lossy
    reason: >
      The interface list itself round-trips, but several per-
      interface sub-fields are lossy or not_applicable.  See the
      ``interfaces[].*`` entries below for the breakdown.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].name:
    disposition: lossy
    reason: >
      OPNsense zone labels (``<wan>``, ``<lan>``, ``<opt2>``) do
      not survive on Arista.  Arista expects flat
      ``Ethernet<N>`` / ``Loopback<N>`` / ``Port-Channel<N>`` /
      ``Vlan<N>`` / ``Management1`` / ``Vxlan1`` names.  Port-
      rename mesh handles via the codec's ``classify_port_name`` /
      ``format_port_identity`` delegates; mapping is operator-
      driven (which OPNsense zone becomes which Arista port).
      Canonical preserves the source string verbatim.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].description:
    disposition: lossy
    reason: >
      OPNsense ``<descr>`` (no length limit) ↔ Arista
      ``description "<text>"`` (240-character CLI limit).  Text
      exceeding 240 characters truncates on the Arista CLI parser
      re-apply.  OPNsense codec capability matrix already
      declares ``/interfaces/interface/config/description`` lossy
      with this rationale (oriented at the broader vendor surface
      including Arista).
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].enabled:
    disposition: good
    note: >
      OPNsense ``<enable>1</enable>`` (or absence) ↔ Arista
      ``no shutdown`` / ``shutdown``.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      OPNsense doesn't surface a type field; Arista codec defaults
      to a ``gig`` speed-hint for unknown speeds (capability
      matrix lossy entry).  Cross-pair drops the type hint.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].mtu:
    disposition: good
    note: >
      OPNsense ``<mtu>`` ↔ Arista ``mtu <N>``.  Both render
      explicitly when set.  Arista DC-class platforms accept up
      to 9214 (jumbo); OPNsense allows 576-9000.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].ipv4_addresses:
    disposition: good
    note: >
      OPNsense ``<ipaddr>`` + ``<subnet>`` ↔ Arista CIDR
      (``10.0.0.2/30``).  Mechanical conversion.  OPNsense's
      non-static keywords (``dhcp``, ``pppoe``) skip this branch
      (see ``dhcp_client``).
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].ipv6_addresses:
    disposition: good
    note: >
      OPNsense ``<ipaddrv6>`` + ``<subnetv6>`` ↔ Arista
      ``ipv6 address X/N``.  ``scope`` discriminator (global /
      link-local) preserved.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].switchport_mode:
    disposition: not_applicable
    note: >
      OPNsense never populates switchport state on parse (no
      switching fabric).  Arista target accepts ``switchport``
      directives but on this direction there is nothing to
      render.
    references: [switching-absent]

  interfaces[].access_vlan:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switching-absent]

  interfaces[].trunk_allowed_vlans:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switching-absent]

  interfaces[].trunk_native_vlan:
    disposition: not_applicable
    note: >
      Same rationale as switchport_mode — empty on OPNsense parse.
    references: [switching-absent]

  interfaces[].voice_vlan:
    disposition: not_applicable
    note: >
      OPNsense has no LLDP-MED voice-VLAN signalling; canonical
      field is always empty on OPNsense parse.
    references: [switching-absent]

  interfaces[].lag_member_of:
    disposition: lossy
    reason: >
      OPNsense's ``<laggs>/<lagg>/<members>`` carries member lists
      under ``<laggif>laggN</laggif>``; canonical back-points to
      ``lagg<N>`` on each member.  Arista's ``channel-group N
      mode active`` declaration applies the back-pointer as
      ``Port-Channel<N>``.  Both round-trip the back-pointer but
      the LAG name itself differs (zero-based ``lagg0`` ↔ one-
      based ``Port-Channel1``); port-rename mesh canonicalises.
    references: [opnsense-laggs, arista-lacp-cg]

  interfaces[].dhcp_client:
    disposition: lossy
    reason: >
      OPNsense ``<ipaddr>dhcp</ipaddr>`` (common on the WAN zone)
      ↔ Arista ``ip address dhcp``.  Neither codec currently
      wires this into ``CanonicalInterface.dhcp_client``;
      cross-pair drops pending wire-up.
    references: [opnsense-interfaces, arista-iface-cg]

  interfaces[].vrf:
    disposition: not_applicable
    note: >
      OPNsense ``config.xml`` has no VRF schema, so the field is
      always empty on OPNsense parse.  Arista target accepts
      per-interface ``vrf <name>`` but on this direction there is
      nothing to render.
    references: [vrf-unsupported]

  vlans:
    disposition: lossy
    reason: >
      The list itself round-trips for the id field.  Per-VLAN
      sub-fields collapse or drop — see ``vlans[].*`` entries
      below.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].id:
    disposition: good
    note: >
      OPNsense ``<vlan>/<tag>N</tag>`` ↔ Arista ``vlan N``.  Both
      vendors share the 1-4094 range.
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].name:
    disposition: lossy
    reason: >
      OPNsense's ``<descr>`` is the only label field; canonical
      ``name`` and ``description`` both populate from it on parse,
      so both fields carry the same text.  Arista per-VLAN
      ``name <x>`` lands cleanly with no Arista-side loss; the
      loss is upstream (OPNsense never carried distinct fields).
    references: [opnsense-vlans, arista-vlan-cg]

  vlans[].description:
    disposition: lossy
    reason: >
      Same rationale as ``vlans[].name`` — one OPNsense XML field
      populating two canonical fields.
    references: [opnsense-vlans]

  vlans[].tagged_ports:
    disposition: not_applicable
    note: >
      OPNsense never populates per-VLAN port-membership lists on
      parse (no per-VLAN port concept).  Arista target render
      emits no ``switchport trunk allowed vlan`` lines because
      canonical list is empty.  Operator must reconstruct trunk
      topology manually.
    references: [switching-absent, opnsense-vlans]

  vlans[].untagged_ports:
    disposition: not_applicable
    note: >
      Same rationale as tagged_ports — empty on OPNsense parse.
    references: [switching-absent, opnsense-vlans]

  vlans[].ipv4_addresses:
    disposition: lossy
    reason: >
      OPNsense doesn't have a first-class SVI concept; the closest
      equivalent is a zone interface (``<opt2>``) referencing the
      VLAN's ``<vlanif>`` device name with the IP on the zone.
      The opnsense codec does not currently project the zone-side
      IP back onto a ``CanonicalVlan.ipv4_addresses`` record;
      cross-pair render emits no ``interface Vlan<N>`` SVI block
      on the Arista target.
    references: [opnsense-vlans, arista-vlan-cg]

  static_routes:
    disposition: lossy
    reason: >
      OPNsense's two-block model (``<gateways>/<gateway_item>`` +
      ``<staticroutes>/<route>``) requires a JOIN to resolve named
      gateway references to bare next-hop IPs.  The opnsense
      codec capability matrix lists ``/staticroutes/route`` as
      supported in the kitchen-sink XML but parser wire-up is
      incomplete; cross-pair render emits nothing on the Arista
      target until parse lands.  The OPNsense default-route idiom
      (implicit ``<gateway>`` on the WAN zone) requires
      synthesising a ``0.0.0.0/0`` canonical record on parse —
      currently not done.  Arista target accepts ``ip route
      0.0.0.0/0 <gw>`` natively when canonical surfaces it.
    references: [opnsense-gateways, arista-routing-cg]

  # ── Tier 2 — auto-translate with review ──

  dhcp_servers:
    disposition: lossy
    reason: >
      OPNsense source populates ``CanonicalIntent.dhcp_servers``
      with one record per zone interface carrying a ``<dhcpd>``
      block (interface, range, gateway, dns_servers, lease_time,
      domain_name).  Arista target accepts ``ip dhcp pool <name>``
      blocks via the standard Cisco-style grammar — Arista
      capability matrix does not currently advertise
      ``/dhcp/pool``, so cross-pair render is partial.  Pool
      network / mask must be SYNTHESISED from the canonical
      ``network`` field (which OPNsense parse populates by
      computing it from the zone interface's IP + subnet).
      Lease-time conversion (seconds ↔ Arista d/h/m triple) is
      mechanical.
    references: [opnsense-dhcp, arista-dhcp-cg]

  snmp:
    disposition: lossy
    reason: >
      v1/v2c surface (community / location / contact / trap_hosts)
      round-trips cleanly — OPNsense
      ``<snmpd>/<rocommunity>/<syslocation>/<syscontact>/<traphost>``
      ↔ Arista ``snmp-server community / location / contact /
      host``.  OPNsense's ``<rwcommunity>`` (rare) collapses to
      read-only on canonical.  v3 USM is not_applicable on this
      direction (OPNsense source never populates ``v3_users`` —
      capability matrix declares ``/snmp/v3-user`` unsupported
      because OPNsense's v3 store lives in the bsnmpd plugin's
      own snmpd.conf rather than config.xml).  Arista target
      capability matrix declares ``/snmp/v3-user`` supported but
      on this direction there is nothing to render.  Marked lossy
      rather than good because of the RO/RW collapse and the v3
      absence on the source side.
    references: [opnsense-snmp, arista-snmp-cg]

  lags:
    disposition: lossy
    reason: >
      OPNsense ``lagg<N>`` (FreeBSD lagg(4) driver, zero-based) ↔
      Arista ``Port-Channel<N>`` (capital-C, one-based), so
      ``lagg0`` ↔ ``Port-Channel1`` via the port-rename mesh.
      Member lists round-trip via the rename mesh.  LACP modes:
      OPNsense ``<proto>lacp</proto>`` ↔ Arista ``mode active``
      (FreeBSD always advertises actively, so passive LACP is
      unreachable from this direction); OPNsense
      ``<proto>none</proto>`` ↔ Arista ``mode on`` (static).
      OPNsense's failover / loadbalance / roundrobin protos have
      no Arista LACP equivalent and collapse to ``mode on`` with
      a comment.  OPNsense codec parses ``<laggs>`` but its
      capability matrix doesn't currently advertise
      ``/lag/aggregate``; round-trip is partial pending wire-up.
    references: [opnsense-laggs, arista-lacp-cg]

  local_users:
    disposition: lossy
    reason: >
      OPNsense bcrypt hashes (``$2a$`` / ``$2b$`` / ``$2y$``) are
      NOT accepted by Arista's ``secret`` parser (which expects
      type ``5`` MD5-crypt or ``sha512`` SHA-512-crypt forms);
      cross-pair render passes the bcrypt blob verbatim and the
      Arista CLI rejects it on apply.  Operators reset passwords
      on the Arista target.  Privilege number collapses bidirec-
      tionally: OPNsense's binary admin / non-admin source maps
      directly to Arista's privilege 15 / 1 endpoints; mid-range
      privileges (5, 10) are unrecoverable.  Arista's richer role
      vocabulary (``network-admin`` / ``network-operator`` /
      custom roles) is unreachable from an OPNsense source.
    references: [opnsense-users, arista-user-security]

  radius_servers:
    disposition: unsupported
    reason: >
      The arista_eos codec has no RADIUS surface today —
      ``netconfig/migration/codecs/arista_eos/parse.py`` and
      ``render.py`` contain zero references to ``radius`` (case-
      insensitive).  The canonical ``radius_servers`` list
      populated by the OPNsense parser (``<authserver>`` blocks
      with ``<host>`` / ``<radius_secret>`` / ``<radius_auth_port>``
      / ``<radius_acct_port>``) is silently dropped on Arista
      render.  Implementing the full EOS RADIUS render
      (``radius-server host <ip> auth-port 1812 acct-port 1813
      key <key>``) plus parse counterpart is a feature lift on
      the codec backlog; until that lands, the field is unreach-
      able on this direction.
    references: [opnsense-radius, arista-snmp-cg]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN fabric schema ──

  vxlan_vnis:
    disposition: not_applicable
    note: >
      opnsense codec capability matrix lists ``/vxlan-vnis/vni``
      (and source-interface, udp-port) under unsupported with
      rationale "VXLAN not modelled — OPNsense is a firewall
      codec", so canonical list is always empty on OPNsense
      parse.  Arista target capability matrix declares
      ``/vxlan-vnis/vni`` supported but on this direction there
      is nothing to render.
    references: [vrf-unsupported]

  evpn_type5_routes:
    disposition: not_applicable
    note: >
      Same rationale as vxlan_vnis — OPNsense has no EVPN concept
      so canonical list is always empty on OPNsense parse.
    references: [vrf-unsupported]

  routing_instances:
    disposition: not_applicable
    note: >
      OPNsense ``config.xml`` has no VRF / routing-instance
      schema.  Arista target accepts ``vrf instance <name>`` plus
      per-VRF RD / RT under ``router bgp`` but on this direction
      there is nothing to render.  Field structurally absent on
      OPNsense parse.
    references: [vrf-unsupported, arista-vrf-cg]

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier-3 dict by design — never auto-rendered.  OPNsense-
      source firewall / NAT / VPN / captive-portal / plugin
      content may land here but Arista target couldn't accept it
      as ACLs — the semantic mismatch (stateful pf rules vs
      stateless ACL entries) makes auto-translation unsound, and
      Arista has no NAT / VPN / captive-portal surface to land
      on.
    references: [firewall-out-of-scope, arista-acls-cg]

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec does not
      consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: >
      Same as source_vendor — informational metadata only.

  source_version:
    disposition: not_applicable
    note: >
      OS version hint from the parser; not a translation field.

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``apply-groups`` statement
      preservation per GAP 9b).  OPNsense source never populates
      this list; field is always empty on this cross-pair.

  group_content:
    disposition: not_applicable
    note: >
      Companion to apply_groups; same not_applicable status for
      OPNsense source.

# ---------------------------------------------------------------------------
# Notes on confidence
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * The reverse direction is asymmetric versus arista_eos__opnsense.
#     OPNsense source carries DHCP server pools (lossy here, was
#     lossy on forward too) but never carries switching state
#     (not_applicable here, was unsupported on forward) and never
#     carries VRF / EVPN-VXLAN fabric (not_applicable here, was
#     unsupported on forward).
#
#   * The keyword-stable surface (hostname / domain / SNMP v1+v2c /
#     RADIUS / interface IP / VLAN id / IPv6) is high-confidence
#     and grounded in well-documented vendor wire forms.
#
#   * The wire-up gaps on the OPNsense side (no DNS / NTP / syslog
#     / timezone parser branch wired into canonical; no
#     <staticroutes> parse) push several Tier-1 fields into 'lossy'
#     rather than 'good'.  Codec-implementation gaps, not vendor-
#     modelling gaps.
#
#   * The role mismatch (firewall versus DC switch) drives most
#     not_applicable categories.  Confident.
#
#   * Hash-format incompatibility (OPNsense bcrypt versus Arista
#     $1$ / $6$ accepted via `secret` parser) is confidently lossy
#     in this direction.
#
# Deferred items (none — all fields walked and dispositioned):
#
#   * (none — every CanonicalIntent top-level field carries an
#     explicit per_field_expectation entry; sub-fields enumerated
#     where the disposition varies by sub-field).

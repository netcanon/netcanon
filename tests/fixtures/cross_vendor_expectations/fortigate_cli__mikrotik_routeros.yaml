# Cross-vendor fidelity expectations: fortigate_cli -> mikrotik_routeros
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/
#
# This is a firewall -> SMB/WISP router pair.  FortiGate is a
# session-based stateful firewall with rich UTM and limited L2
# switching; MikroTik RouterOS is a router-first SMB/WISP platform
# with bridge-based switching as a sub-feature.  Both are "router-
# class" but with very different feature focus.
#
#   * Foundations (hostname / DNS / NTP / interfaces with IP+MTU /
#     static routes / SNMP / RADIUS / DHCP server / LAGs) translate
#     via the canonical tree; per-field divergence is documented
#     below.
#   * FortiGate's firewall / NAT / VPN / UTM / VDOMs are
#     FortiGate-only product surfaces with no canonical
#     representation — they are unsupported on this direction
#     because the source carries meaningful policy data with no
#     canonical landing place.
#   * RouterOS-unique features (bridge VLAN filtering, queues,
#     wireless, scripts) are not_applicable on this direction —
#     FortiGate source never populates them.
#   * VRF / VDOM are unsupported on both sides (neither codec
#     parses them in v1; even when they do, FortiGate VDOMs and
#     RouterOS named VRFs are structurally distinct).
#   * VXLAN / EVPN are unsupported on both sides.
#
# certainty=medium because:
#   * Shared scalar surface (hostname / DNS / interfaces with IP /
#     static routes / SNMP v1+v2c / RADIUS / DHCP server / LAGs) is
#     high-confidence — both codecs round-trip the canonical fields
#     on real-capture / synthetic kitchen-sink fixtures and the
#     vendor docs are unambiguous.
#   * v3 USM cross-vendor migration is medium-confidence lossy:
#     algorithm-set divergence (FortiOS SHA-2 + AES-256 vs RouterOS
#     MD5/SHA1 + AES-128) and engineID-salted passphrases are
#     well-documented but the exact narrowing depends on RouterOS
#     version (some recent ROS 7.x accept SHA256/AES-256-CFB).
#   * Local users are medium-confidence lossy on this direction:
#     FortiOS source HAS hashed passwords (in ENC form) but RouterOS
#     does not surface password material in /export, so the rendered
#     RouterOS config carries no password attribute at all.
#   * Firewall / NAT / VDOM / UTM are confidently unsupported in
#     this direction — FortiGate source carries meaningful policy
#     data with no canonical landing place.

meta:
  source_vendor: fortigate_cli
  target_vendor: mikrotik_routeros
  primary_use_case: >
    FortiGate firewall edge -> MikroTik RouterOS migration (typical:
    SMB / WISP operators consolidating an aging FortiGate edge into
    cost-effective RouterOS hardware, or operators repurposing a
    FortiGate's L3 routing role onto RouterOS while moving the
    security policy upstream to a different platform).  L3 routing +
    system-services translates well; FortiGate's rich firewall / UTM
    / VPN product surface has no RouterOS analogue and is lost on
    migration.  Operators should treat the FortiGate firewall config
    as documentation rather than a translatable artefact.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/system_services.md
      title: "System services (hostname / DNS / NTP / timezone / syslog): FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-04-30"
    - id: interfaces
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/interfaces.md
      title: "Interfaces: FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/954635/interface-settings"
      retrieved: "2026-04-30"
    - id: vlans
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/vlans.md
      title: "VLAN configuration: FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/88014957/VLAN"
      retrieved: "2026-04-30"
    - id: static_routes
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/static_routes.md
      title: "Static routes: FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/328084/IP+Routing"
      retrieved: "2026-04-30"
    - id: snmp_aaa
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/snmp_aaa.md
      title: "SNMP / RADIUS / AAA: FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-04-30"
    - id: local_users
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/local_users.md
      title: "Local users + admin profiles: FortiGate FortiOS versus MikroTik RouterOS"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/8978504/User"
      retrieved: "2026-04-30"
    - id: lags
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/lags.md
      title: "LAGs: FortiGate aggregate versus MikroTik RouterOS bonding"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/8323193/Bonding"
      retrieved: "2026-04-30"
    - id: dhcp
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/dhcp.md
      title: "DHCP server: FortiGate FortiOS versus MikroTik RouterOS three-section form"
      source_url: "https://help.mikrotik.com/docs/spaces/ROS/pages/24805500/DHCP"
      retrieved: "2026-04-30"
    - id: firewall_unsupported
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/firewall_unsupported.md
      title: "Firewall / NAT / VPN / VDOM (unsupported): FortiGate FortiOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cookbook/"
      retrieved: "2026-04-30"
    - id: vrf
      path: docs/vendor-references/fortigate_cli_to_mikrotik_routeros/routing_instances_vrf.md

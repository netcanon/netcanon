# Cross-vendor expectations: arista_eos -> mikrotik_routeros
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_mikrotik_routeros/
#
# Phase 3 follow-up pair.  Arista EOS is a DC-class enterprise switch
# (DCS-7280SR / 7050X / 7060X / 7300 series) with rich VRF / EVPN /
# VXLAN / dynamic-routing support.  MikroTik RouterOS targets SMB /
# WISP / power-user markets with a router-first model and optional
# bridge for switching.  This is the asymmetrically harder direction
# of the pair: Arista's DC fabric data (EVPN, MAC-VRF, L3-VRF, EVPN-
# VXLAN bindings) has no first-class home on RouterOS, while the
# basic-services surface (hostname / DNS / NTP / IPv4-IPv6 addresses /
# static routes / SNMP v1+v2c) round-trips with documented losses.
#
# Asymmetry on this direction concentrates on:
#
#   * EVPN / VXLAN / MAC-VRF / L3-VRF — Arista's DC-fabric surface
#     is rich; RouterOS does not model any of it.  Major asymmetric
#     loss; see vxlan_evpn_unsupported.md.
#   * Switchport mode plane mismatch — Arista's interface-centric
#     access/trunk model versus RouterOS's bridge-VLAN-filtering
#     plane (Plane 2) which the MikroTik codec parses partially in
#     v1.
#   * VLAN-SVI absorption versus VLAN sub-interface — Arista's
#     ``interface Vlan<N>`` first-class L3 entity versus RouterOS's
#     ``/interface vlan name=vlan<N>`` + ``/ip address`` two-section
#     form.  Round-trips at the address level; loses the SVI's
#     description and VRF binding.
#   * Hash-format incompatibility — Arista's Linux-crypt SHA-512
#     dominant case versus RouterOS's vendor-private password format
#     not surfaced in /export.  Operator MUST re-set passwords on
#     the RouterOS target.

meta:
  source_vendor: arista_eos
  target_vendor: mikrotik_routeros
  primary_use_case: >
    DC-class Arista EOS switch (DCS-7280SR-class leaf, 7050X /
    7060X spine) replaced by a MikroTik RouterOS deployment
    (typical: lab / branch / WISP-fronted edge consolidating off
    a previously over-provisioned Arista estate, or operators
    repurposing inherited Arista hardware behind a RouterOS L3
    boundary).  The basic-services surface (hostname / DNS / NTP /
    IPv4-IPv6 addresses / static routes / SNMP v1+v2c / local users
    / RADIUS) round-trips with documented losses; the DC-fabric
    surface (EVPN-VXLAN, MAC-VRF, L3-VRF) drops on the cross-pair
    because RouterOS does not model it.
  certainty: medium
  references:
    - id: arista_vlan_cg
      path: docs/vendor-references/arista_eos_to_mikrotik_routeros/vlans.md
      title: "Arista EOS VLAN Configuration Guide"

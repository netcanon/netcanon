# Cross-vendor fidelity expectations: mikrotik_routeros -> cisco_iosxe_cli
#
# This file enumerates the per-field translation disposition for every
# top-level field on CanonicalIntent.  Per-direction inverse of
# cisco_iosxe_cli__mikrotik_routeros.yaml.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache:
#   docs/vendor-references/mikrotik_routeros_to_cisco_iosxe_cli/
#
# Phase 3 follow-up pair.  Inverse of cisco_iosxe_cli__mikrotik_routeros.
# Same wire-format and switching-philosophy gulf, but viewed from the
# RouterOS source side: lossy points cluster around RouterOS-richer
# surfaces (firewall / queues / wireless / scripting that fall outside
# canonical scope and land in raw_sections) and around the password-
# export gap (RouterOS does not surface its hashed passwords in /export,
# so the Cisco render emits no `secret` clause for migrated users).

meta:
  source_vendor: mikrotik_routeros
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    MikroTik RouterOS to Cisco IOS-XE migration (typical: SMB / WISP
    operator scaling up to enterprise-grade Cisco hardware, or
    consolidating onto a Cisco-standard estate).  Inverse of the
    enterprise-to-SMB pair; loses RouterOS-rich plumbing that does
    not have a canonical field (firewall, queues, wireless,
    scripting), and loses password material because RouterOS's
    /export does not include hashed passwords.
  certainty: medium
  references:
    - id: mikrotik_vlan
      path: docs/vendor-references/mikrotik_routeros_to_cisco_iosxe_cli/vlans.md
      title: "VLAN — RouterOS"

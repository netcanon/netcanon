# Cross-vendor expectations: cisco_iosxe_cli -> aruba_aoss
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_cli_to_aruba_aoss/
#
# Phase 3 follow-up pair: campus refresh (Cisco Catalyst -> Aruba
# 2930F/2930M/3810/5400R class).  Both vendors are CLI codecs with
# Cisco-derived syntax, so the keyword-stable surface (hostname,
# vlan N, snmp-server, radius-server) round-trips well.  Divergence
# concentrates on:
#
#   * VLAN membership model (Cisco port-centric vs Aruba VLAN-centric).
#     Bridged via project_switchport_to_vlan / project_vlan_to_switchport.
#   * Mask format (Cisco dotted-decimal vs Aruba CIDR).
#   * Hash formats (Cisco type-9 scrypt vs Aruba SHA-1 / bcrypt;
#     not cross-compatible).
#   * Feature surface (Cisco supports VRF / BGP / EIGRP / DHCP-server
#     pools; Aruba AOS-S has no VRF concept and is relay-only).

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: aruba_aoss
  primary_use_case: >
    Campus refresh from Cisco Catalyst (IOS-XE 15.x / 16.x / 17.x) to
    Aruba ProCurve / AOS-S (2930F / 2930M / 3810 / 5400R).  L2 and
    basic-L3 features land cleanly; Cisco-only L3 surface
    (VRF, BGP, IS-IS, EIGRP, DHCP server pools) drops on the
    Aruba target.
  certainty: medium
  references:

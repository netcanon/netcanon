# Cross-vendor fidelity expectations: cisco_iosxe_cli -> fortigate_cli
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_cli_to_fortigate_cli/
#
# This is a switch/router -> firewall pair.  Cisco IOS-XE covers L2
# switching, L3 routing, basic NAT/ACL.  FortiGate is a session-based
# stateful firewall with rich UTM and limited L2 switching.  The
# foundations (hostname / NTP / DNS / SNMP / static routes / basic IP)
# carry across, but switching features lose their target and firewall
# policies have no canonical model to land on.
#
# certainty=medium because:
#   - The shared scalar surface (hostname / domain / dns / ntp /
#     syslog / static-routes / radius) is well-documented on both
#     vendors and the FortiGate codec round-trips it cleanly today.
#   - Switching features (switchport / spanning-tree / voice-VLAN)
#     are confidently unsupported on FortiGate.
#   - Firewall / NAT / ZBF surfaces are confidently unsupported in
#     both directions (canonical schema gap).
#   - VRF is confidently unsupported (both codecs parse-and-ignore).
#   - DHCP is lossy with caveats (model divergence: pool-only vs
#     interface-bound).

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: fortigate_cli
  primary_use_case: >
    Cisco IOS-XE router/switch -> FortiGate firewall edge migration.
    Common scenario: replacing an aging Cisco ISR / Cat 9000 edge
    with a FortiGate as a converged routing-and-security appliance.
    The L3 routing + system-services surface translates well; L2
    switching loses its target (FortiGate is L3-only) and Cisco's
    ACL/ZBF/NAT have no canonical model to express their migration
    to FortiGate's policy + VIP product.
  certainty: medium
  references:

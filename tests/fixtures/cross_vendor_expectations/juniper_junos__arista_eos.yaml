# Cross-vendor expectations: juniper_junos -> arista_eos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_arista_eos/
#
# Inverse of arista_eos__juniper_junos.yaml (commit e50a1fc).  DC
# leaf-to-leaf migration at peer feature depth (both vendors target
# EVPN-VXLAN spine-leaf at parity).  Asymmetries this direction adds:
#
#   * Junos's apply-groups inheritance flattens into canonical content;
#     the group structure itself drops on Arista render.
#   * Junos's `instance-type virtual-router` (CE-LAN style L3 isolation
#     without RD/RT) has no Arista analogue.
#   * Junos's per-unit interface families (`unit 1+` with independent
#     family blocks) collapse on Arista's flat-interface model;
#     `unit 0` round-trips, higher units degrade.
#   * Junos SSH-public-key authentication has no canonical fit in the
#     hash-shaped CanonicalLocalUser today (deferred).
#
# The forward direction's vendor-doc cache
# (docs/vendor-references/arista_eos_to_juniper_junos/) carries shared
# vendor primitives (VLAN-to-VNI binding, VTEP source interface,
# IPv6 link-local discrimination, port-naming convention, hash-format
# table); references[].path entries below cite forward-direction docs
# where the same primitive applies, and the new
# docs/vendor-references/juniper_junos_to_arista_eos/ cache covers
# Junos-source-specific considerations (apply-groups, instance-type
# discriminators, per-unit -> flat collapse).

meta:
  source_vendor: juniper_junos
  target_vendor: arista_eos
  primary_use_case: >
    DC EVPN-VXLAN spine-leaf migration (Junos QFX leaf -> Arista leaf).
    Set-form to stanza-form structural transformation.  Both vendors
    target the same DC overlay surface at parity feature depth, so
    cross-pair drift is dominated by Junos-source-richer constructs
    (apply-groups inheritance, instance-type discriminators, per-unit
    families) that flatten on Arista's simpler model rather than by
    target-side structural omissions.
  certainty: medium
  references:

# Cross-vendor fidelity expectations: fortigate_cli -> arista_eos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/fortigate_cli_to_arista_eos/
#
# Reverse direction of arista_eos -> fortigate_cli.  Per the schema
# README's "Reverse pairs are independent files" rule, this file
# authors the dispositions independently rather than mirroring.
# Direction-asymmetric concerns:
#
#   * dns_servers / syslog_servers: arista -> fortigate is lossy
#     (FortiOS 3-cap drops Arista tail).  fortigate -> arista is
#     good (FortiOS source carries at most three; Arista accepts
#     unbounded — no truncation in this direction).
#   * vlans port-membership: arista -> fortigate loses the
#     re-projected port lists (canonical has them; FortiGate
#     render does not synthesise child VLAN interfaces).
#     fortigate -> arista is unsupported in the inverse sense
#     (FortiGate parse never populated tagged_ports /
#     untagged_ports because the parent-interface VLAN model
#     carries membership via the parent's identity, so Arista
#     render needs the operator to reconstruct switchport state).
#   * Switching features (switchport_mode / access_vlan /
#     trunk_*): arista -> fortigate is unsupported (target
#     absent — FortiGate is L3-only).  fortigate -> arista is
#     also unsupported but for the inverse reason: the canonical
#     fields are empty after FortiGate parse (source absent).
#   * Firewall / NAT / VIP / VPN / IPsec / UTM: fortigate ->
#     arista drops the FortiGate primary product surface (Tier
#     3, out of canonical scope).  No Arista analogue.
#   * VDOMs and per-interface integer VRF: fortigate -> arista
#     is unsupported (FortiGate codec doesn't parse `set vrf
#     <id>` in v1; even if it did, integer-VRF lacks the RD/RT
#     semantics Arista's named-VRF + EVPN model needs).
#   * EVPN-VXLAN: arista -> fortigate is unsupported (target
#     absent).  fortigate -> arista is not_applicable (FortiGate
#     source has no fabric data plane to populate canonical).

meta:
  source_vendor: fortigate_cli
  target_vendor: arista_eos
  primary_use_case: >
    FortiGate firewall edge -> Arista EOS DC-switch / campus-switch
    demotion.  Less common than the reverse direction; surfaces when
    an operator demotes a FortiGate to a pure L2/L3 routing role and
    offloads the security duties to a separate appliance.  System
    services + IPv4/IPv6 (global) + LAG + RADIUS + SNMP translate;
    FortiGate's firewall / NAT / VIP / VPN / IPsec / UTM product
    surface has no Arista analogue and is lost on migration.
    Operators should treat the FortiGate firewall config as
    documentation rather than a translatable artefact for this
    cross-pair.  VLAN port-membership requires manual reconstruction
    on the Arista target because FortiGate's child-interface model
    never populated the canonical port-lists.
  certainty: medium
  references:
    - id: system_services
      path: docs/vendor-references/fortigate_cli_to_arista_eos/system_services.md
      title: "System services: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-05-01"
    - id: system_services_arista
      path: docs/vendor-references/fortigate_cli_to_arista_eos/system_services.md
      title: "Arista EOS Switch Administration Commands"
      source_url: "https://www.arista.com/en/um-eos/eos-switch-administration-commands"
      retrieved: "2026-05-01"
    - id: interfaces
      path: docs/vendor-references/fortigate_cli_to_arista_eos/interfaces.md
      title: "Interfaces: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/954635/interface-settings"
      retrieved: "2026-05-01"
    - id: interfaces_arista
      path: docs/vendor-references/fortigate_cli_to_arista_eos/interfaces.md
      title: "Arista EOS Interface Configuration"
      source_url: "https://www.arista.com/en/um-eos/eos-interface-configuration"
      retrieved: "2026-05-01"
    - id: vlans
      path: docs/vendor-references/fortigate_cli_to_arista_eos/vlans.md
      title: "VLAN configuration: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cookbook/"
      retrieved: "2026-05-01"
    - id: static_routes
      path: docs/vendor-references/fortigate_cli_to_arista_eos/static_routes.md
      title: "Static routes: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/"
      retrieved: "2026-05-01"
    - id: snmp_aaa
      path: docs/vendor-references/fortigate_cli_to_arista_eos/snmp_aaa.md
      title: "SNMP + AAA / RADIUS: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/cli-reference/"
      retrieved: "2026-05-01"
    - id: snmp_aaa_arista
      path: docs/vendor-references/fortigate_cli_to_arista_eos/snmp_aaa.md
      title: "Arista EOS SNMP + RADIUS"
      source_url: "https://www.arista.com/en/um-eos/eos-snmp"
      retrieved: "2026-05-01"
    - id: local_users
      path: docs/vendor-references/fortigate_cli_to_arista_eos/local_users.md
      title: "Local users + admin profiles: FortiGate FortiOS versus Arista EOS"
      source_url: "https://docs.fortinet.com/document/fortigate/7.4.0/administration-guide/"

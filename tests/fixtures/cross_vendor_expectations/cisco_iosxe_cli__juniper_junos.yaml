# ---------------------------------------------------------------------------
# Per-field expectations.  Walks intent.py top-down.
# ---------------------------------------------------------------------------

per_field_expectation:

  # ── Tier 1 — auto-translatable scalars / lists ──

  hostname:
    disposition: good
    note: >
      Cisco's ``hostname X`` -> Junos's ``set system host-name X``.
      Round-trip is lossless on the FQDN/short-name string.
    references: [cisco-fundamentals, junos-initial-config]

  domain:
    disposition: good
    note: >
      Cisco's ``ip domain name X`` -> Junos's
      ``set system domain-name X``.
    references: [cisco-fundamentals, junos-initial-config]

  dns_servers:
    disposition: good
    note: >
      Both vendors accept multiple ``name-server`` lines.  Round-
      trip is lossless on the address list.
    references: [cisco-fundamentals, junos-initial-config]

  ntp_servers:
    disposition: lossy
    reason: >
      Address list round-trips losslessly.  Per-server options
      (``prefer``, ``iburst``, ``key``, ``source``) are not
      modelled canonically and drop on cross-vendor round-trip.
    references: [cisco-fundamentals, junos-initial-config]

  timezone:
    disposition: lossy
    reason: >
      Cisco emits ``clock timezone PST -8 0`` (abbreviation +
      offset/minute tokens) plus optional ``clock summer-time`` for
      DST; Junos emits ``set system time-zone America/Los_Angeles``
      (Olson zoneinfo name).  Canonical preserves the source
      string verbatim, so a Cisco-derived ``PST -8 0`` token will
      not round-trip cleanly to Junos without operator-curated
      translation.
    references: [cisco-fundamentals, junos-initial-config]

  syslog_servers:
    disposition: lossy
    reason: >
      Cisco's ``logging host X`` (implicit any-severity) maps to
      Junos's ``set system syslog host X any info`` (severity
      required).  Host list round-trips; per-facility / severity
      filters are not modelled canonically.
    references: [cisco-fundamentals, junos-syslog-overview]

  # ── Tier 1 — interfaces ──

  interfaces[].name:
    disposition: lossy
    reason: >
      Cisco's speed-encoded names (``GigabitEthernet1/0/1``,
      ``HundredGigE1/0/49``) and Junos's media-prefix form
      (``ge-0/0/0``, ``et-0/0/48``) carry the same speed
      semantic; the port-rename mesh handles the cross-vendor
      mapping.  Slot/sub-slot/port indices may not be 1:1
      (Cisco sub-slot vs Junos PIC); operators override via the
      per-pane port-rename surface.
    references: [cisco-interface-cli, junos-iface-naming]

  interfaces[].description:
    disposition: good
    note: >
      Both vendors accept free-form descriptions; Junos quotes
      when whitespace present.

  interfaces[].enabled:
    disposition: good
    note: >
      Cisco's ``shutdown`` / ``no shutdown`` maps to Junos's
      ``set interfaces X disable`` / ``delete interfaces X disable``.

  interfaces[].interface_type:
    disposition: lossy
    reason: >
      The CLI parser infers interface type from the name prefix
      (Cisco's ``GigabitEthernet`` -> ethernetCsmacd; Junos's
      ``ge-`` -> ethernetCsmacd) but cannot detect all IANA types.
      Documented in the Cisco IOS-XE codec capability matrix's
      ``/interfaces/interface/config/type`` lossy entry.
    references: [cisco-interface-cli]

  interfaces[].mtu:
    disposition: good
    note: >
      Both accept integer MTU; Cisco's ``mtu N`` maps to Junos's
      ``set interfaces X mtu N`` (parent-interface scope).

  interfaces[].ipv4_addresses:
    disposition: good
    note: >
      Cisco's ``ip address A.B.C.D MASK`` parses to canonical
      ``CanonicalIPv4Address{ip, prefix_length}`` and renders to
      Junos's ``set interfaces X unit 0 family inet address
      A.B.C.D/N``.  Multiple addresses (Cisco ``secondary``) become
      additional ``set address`` lines on Junos.
    references: [cisco-ip-cg, junos-iface-fundamentals]

  interfaces[].ipv6_addresses:
    disposition: good
    note: >
      Junos uses ``family inet6`` form; canonical
      ``scope=link-local`` discriminator preserved.  Cisco's
      explicit ``link-local`` keyword maps to Junos's prefix-based
      auto-detection (``fe80::/10``).
    references: [cisco-ipv6-cg, junos-family-inet6]

  interfaces[].switchport_mode:
    disposition: good
    note: >
      Cisco's ``switchport mode access | trunk`` maps to Junos's
      ``family ethernet-switching interface-mode {access | trunk}``.
    references: [cisco-vlan-cg, junos-vlans-statement]

  interfaces[].access_vlan:
    disposition: good
    note: >
      Cisco's ``switchport access vlan N`` maps to Junos's
      ``set interfaces X unit 0 family ethernet-switching vlan
      members <name>`` where <name> is synthesised from the VLAN id.
    references: [cisco-vlan-cg, junos-vlans-statement]

  interfaces[].trunk_allowed_vlans:
    disposition: good
    note: >
      Cisco's ``switchport trunk allowed vlan 100,200`` maps to
      Junos's ``set ... family ethernet-switching vlan members
      [ v100 v200 ]``.

  interfaces[].trunk_native_vlan:
    disposition: lossy
    reason: >
      Cisco's ``switchport trunk native vlan N`` lives inline on the
      interface; Junos's ``native-vlan-id N`` lives at the parent-
      interface hierarchy (NOT under the unit).  Round-trip
      preserves the integer; the structural difference is internal
      to each codec's render path.
    references: [cisco-vlan-cg, junos-vlans-statement]

  interfaces[].voice_vlan:
    disposition: unsupported
    reason: >
      Junos QFX/EX has no first-class voice-VLAN construct
      equivalent to Cisco's ``switchport voice vlan N``.  LLDP-MED
      voice-VLAN advertisement is configured per-interface under
      ``protocols lldp-med`` with different semantics.  Canonical
      field carried but Junos render emits a comment.
    references: [junos-vlans-statement]

  interfaces[].lag_member_of:
    disposition: good
    note: >
      Cisco's ``channel-group N mode active`` maps to Junos's
      ``set interfaces X gigether-options 802.3ad ae<N>``.
    references: [cisco-etherchannel, junos-lag-overview]

  interfaces[].dhcp_client:
    disposition: good
    note: >
      Cisco's ``ip address dhcp`` maps to Junos's
      ``set interfaces X unit 0 family inet dhcp``.

  interfaces[].vrf:
    disposition: unsupported
    reason: >
      Cisco IOS-XE codec capability matrix lists
      ``/routing-instances/instance`` under unsupported with
      rationale "VRF declarations and per-interface ``vrf
      forwarding`` parse-and-ignore in v1; canonical schema
      exists, wire-up deferred."  Junos source side has the path
      supported (GAP 6) but Cisco-side parse is empty, so the
      cross-pair migration silently drops the VRF binding.
    references: [cisco-vrf-cli, cisco-vrf-lite-cg, junos-instance-type]

  # ── Tier 1 — VLANs ──

  vlans[].id:
    disposition: good
    note: >
      Cisco's ``vlan N`` maps to Junos's ``set vlans <name>
      vlan-id N``.  Junos addresses by name; codec render
      synthesises a default name (typically ``vlan<N>``) when
      the source had no explicit name.

  vlans[].name:
    disposition: lossy
    reason: >
      Junos VLAN names allow letters, digits, hyphens, periods
      only (up to 255 chars); Cisco accepts underscores and wider
      character set.  Names containing ``[A-Za-z0-9.-]`` round-
      trip losslessly; names with underscores are sanitised on
      Junos render (typically underscore -> hyphen).
    references: [cisco-vlan-cg, junos-vlans-statement]

  vlans[].description:
    disposition: lossy
    reason: >
      Junos supports ``set vlans <name> description X``; Cisco has
      no first-class VLAN-level description (only interface
      descriptions).  Cisco source -> Junos preserves the empty
      description; Junos source -> Cisco drops the description with
      a comment in render.
    references: [junos-vlans-statement]

  vlans[].tagged_ports:
    disposition: good
    note: >
      VLAN-centric port-list is canonically VLAN-centric.  Junos
      render transposes back to per-interface ``family ethernet-
      switching vlan members``.

  vlans[].untagged_ports:
    disposition: good
    note: >
      Same as tagged_ports; rendered via interface-side ``interface-
      mode access`` + ``vlan members <name>``.

  vlans[].ipv4_addresses:
    disposition: good
    note: >
      Cisco's ``interface Vlan100 / ip address X/N`` (SVI) maps to
      Junos's ``set interfaces irb unit 100 family inet address
      X/N`` plus ``set vlans <name> l3-interface irb.100``.
    references: [junos-evpn-irb-example]

  # ── Tier 1 — static routes ──

  static_routes:
    disposition: lossy
    reason: >
      Default-VRF static routes round-trip cleanly (Cisco's
      dotted-mask form converts to/from Junos's CIDR via codec
      parsers).  Per-VRF static routes (``ip route vrf X ...``)
      are parse-and-ignore in v1 (CanonicalStaticRoute lacks a
      ``vrf`` field).  Cisco's "administrative distance" and
      Junos's "preference" are vendor-specific scalars not 1:1;
      ``CanonicalStaticRoute.metric`` is the operator-visible
      metric, not preference/AD.  Junos's ``qualified-next-hop``
      flattens to multiple canonical entries.
    references: [cisco-static-routes, junos-static-routing]

  # ── Tier 2 — DHCP server ──

  dhcp_servers:
    disposition: lossy
    reason: >
      Cisco's single ``ip dhcp pool`` stanza (network +
      default-router + dns-server + lease) maps to Junos's two-
      stage ``dhcp-local-server`` + ``access address-assignment
      pool`` model.  Basic pools round-trip; advanced options
      (option 43 / 60 / 66 / 150) are not modelled canonically
      and drift.  Cisco's ``ip dhcp excluded-address`` has no
      Junos analogue (Junos uses range low/high inversion).
    references: [cisco-dhcp-cg, junos-dhcp-server, junos-dhcp-local-server]

  # ── Tier 2 — SNMP ──

  snmp.community:
    disposition: good
    note: >
      Cisco's ``snmp-server community X RO`` maps to Junos's
      ``set snmp community X authorization read-only``.
    references: [cisco-snmp-cg, junos-snmp-overview]

  snmp.location:
    disposition: good
    references: [cisco-snmp-cg, junos-snmp-overview]

  snmp.contact:
    disposition: good
    references: [cisco-snmp-cg, junos-snmp-overview]

  snmp.trap_hosts:
    disposition: good
    note: >
      Cisco's ``snmp-server host X version 2c <community>`` maps to
      Junos's ``set snmp trap-group <name> targets X`` +
      ``version v2``.  Canonical ``trap_hosts: list[str]`` flattens
      both forms.
    references: [cisco-snmp-cg, junos-snmp-overview]

  snmp.v3_users:
    disposition: lossy
    reason: >
      USM username / group / auth-protocol / priv-protocol round-
      trip cleanly via the canonical ``CanonicalSNMPv3User`` schema.
      Auth/priv passphrases do NOT cross-decrypt: Cisco encrypts
      with engineID-derived constants, Junos uses ``$9$...``
      reversible-encrypted blobs.  Operator must re-key v3 users on
      the target after migration.
    references: [cisco-snmp-cg, junos-snmpv3-cg]

  # ── Tier 2 — LAGs ──

  lags:
    disposition: lossy
    reason: >
      Vendor-correct LAG rename: Cisco's ``Port-channel<N>`` maps to
      Junos's ``ae<N>``.  Member lists, LACP mode (active / passive /
      static), and aggregation semantics all preserved — only the
      ``lags[].name`` token differs by design.  Phase 4 comparator
      flags this as drift on the whole-record name comparison
      (``batfish_cisco_interface.txt``, ``user_contrib_cat9300_iosxe1712.txt``,
      ``kitchen_sink.txt`` all show the same Port-channel<N> ↔ ae<N>
      rename being reported as a CODEC_BUG).  Demote from ``good``
      to ``lossy`` to acknowledge the rename — vendor-correct LAG
      rename, comparator currently flags as drift.  PAgP modes
      (``auto`` / ``desirable``) are Cisco-only; Junos source never
      populates these.  Junos's required chassis-wide ``device-count``
      allocation has no Cisco analogue; render synthesises a default
      value.
    references: [cisco-etherchannel, junos-lag-overview, junos-ae-example]

  # ── Tier 2 — local users ──

  local_users:
    disposition: lossy
    reason: >
      Hash-format compatibility is partial.  Only ``$1$`` (MD5)
      crypts cross between Cisco's ``secret 5`` and Junos's
      ``encrypted-password``.  Cisco's ``secret 8`` (pbkdf2) and
      ``secret 9`` (scrypt) are Cisco-only — Junos rejects.
      Junos's ``$6$`` (SHA-512) default is rare on Cisco today —
      modern IOS-XE may not parse it.  Cisco's numeric
      ``privilege 1-15`` and Junos's named ``class super-user /
      operator / read-only`` don't 1:1; canonical preserves the
      source string but operator-curated mapping required.  Re-key
      after migration is the safe path.
    references: [cisco-username-cli, cisco-password-types, junos-password-cli, junos-kb-password-format]

  # ── Tier 2 — RADIUS ──

  radius_servers:
    disposition: lossy
    reason: >
      Both support host / secret / auth-port / acct-port.  Cisco's
      ``key 7 <obfuscated>`` and Junos's ``$9$...``-encrypted
      secret do NOT cross-decrypt; operator must re-set the shared
      secret on the target.  Auth-port / acct-port preserved.
    references: [cisco-aaa-cli, junos-radius-cli]

  # ── Tier 2 (ship-before-wire) — EVPN-VXLAN ──

  vxlan_vnis:
    disposition: unsupported
    reason: >
      Cisco IOS-XE codec capability matrix lists
      ``/vxlan-vnis/vni`` under unsupported with rationale "IOS-XE
      VXLAN mappings (``interface nve1 / member vni <N>``) parse-
      and-ignore in v1.  CanonicalVxlan schema exists; wire-up
      deferred until demand arrives for Catalyst-to-Arista (or
      Catalyst-to-Junos) migrations."  Junos codec advertises
      ``/vxlan-vnis/vni`` as supported, so the cross-pair drops to
      unsupported.
    references: [cisco-evpn-vxlan-cg, junos-evpn-overview, junos-evpn-irb-example]

  vxlan_vnis[].vlan_id:
    disposition: unsupported
    reason: "Same as vxlan_vnis (Cisco parse-and-ignore in v1)."

  vxlan_vnis[].vni:
    disposition: unsupported
    reason: "Same as vxlan_vnis (Cisco parse-and-ignore in v1)."

  vxlan_vnis[].mcast_group:
    disposition: unsupported
    reason: "Same as vxlan_vnis (Cisco parse-and-ignore in v1)."

  vxlan_vnis[].flood_list:
    disposition: unsupported
    reason: "Same as vxlan_vnis (Cisco parse-and-ignore in v1)."

  vxlan_vnis[].source_interface:
    disposition: unsupported
    reason: >
      Cisco IOS-XE codec capability matrix lists
      ``/vxlan-vnis/source-interface`` under unsupported.  Same
      scope as ``/vxlan-vnis/vni`` — both land when Catalyst VXLAN
      demand arrives.

  vxlan_vnis[].udp_port:
    disposition: unsupported
    reason: >
      Cisco IOS-XE codec capability matrix lists
      ``/vxlan-vnis/udp-port`` under unsupported.

  evpn_type5_routes:
    disposition: unsupported
    reason: >
      Both codecs list ``/evpn-type5-routes/route`` under lossy
      with rationale that EVPN Type-5 is a VRF-property model
      (``CanonicalRoutingInstance.l3_vni``) rather than per-prefix
      records; no codec populates the per-prefix list today.
      Effectively unsupported on the cross-pair until route-map /
      policy-statement parsing lands.
    references: [cisco-evpn-vxlan-cg, junos-evpn-overview]

  # ── Tier 2 (ship-before-wire) — VRF / routing-instance ──

  routing_instances:
    disposition: good
    note: >
      Cisco IOS-XE CLI ``vrf definition <name>`` blocks (with
      ``rd``, ``address-family ipv4``, ``route-target import/export``,
      ``description``) parse into ``CanonicalIntent.routing_instances``
      via ``cisco_iosxe_cli.parse._parse_routing_instances``.  Junos
      codec renders ``set routing-instances <name> instance-type vrf``
      with matching ``route-distinguisher`` / ``vrf-target`` /
      ``description`` statements (GAP 6).  Wave 10β re-flip: the
      original "Cisco parse-and-ignore in v1" rationale is stale —
      both the user_contrib_cat9300 capture (Mgmt-vrf) and the
      cisco_iosxe_cli kitchen_sink (Mgmt-vrf + CUSTOMER-A with
      route-distinguisher 65000:1 / 65000:100 + multi-RT lists)
      round-trip cleanly across every populated sub-field.  The
      ``cisco_iosxe_cli`` capability matrix still lists
      ``/routing-instances/instance`` under unsupported (an
      independent stale claim worth a follow-up codec audit), but
      the Phase-1 mechanical drift JSON proves both ends now
      preserve the canonical record.
    references: [cisco-vrf-cli, cisco-vrf-lite-cg, junos-instance-type]

  routing_instances[].name:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].instance_type:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].route_distinguisher:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].rt_imports:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].rt_exports:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].description:
    disposition: good
    note: "Same as routing_instances — Wave 10β re-flip; round-trips cleanly."

  routing_instances[].l3_vni:
    disposition: good
    note: >
      Same as routing_instances — Wave 10β re-flip.  l3_vni is None
      on every populated fixture; the field round-trips by being
      uniformly absent.  Flips back to ``lossy`` if a future fixture
      exercises a populated L3 VNI on a Cisco source against the
      Junos render path (which currently doesn't emit
      ``vrf-target ... l3vni``).

  # ── Tier 3 — informational only ──

  raw_sections:
    disposition: not_applicable
    note: >
      Tier 3 by design — never auto-rendered.  Each codec's
      raw_sections content is vendor-private (Cisco preserves
      ``router bgp / ospf / eigrp`` stanzas, Junos preserves
      ``protocols / policy-options / firewall``); cross-vendor
      migration drops the section with a banner.

  # ── Metadata ──

  source_vendor:
    disposition: not_applicable
    note: >
      Set by the source codec on parse; the target codec does not
      consume it (cross-vendor round-trip explicitly changes
      vendor).  Not a translation field.

  source_format:
    disposition: not_applicable
    note: "Informational metadata only."

  source_version:
    disposition: not_applicable
    note: "Informational metadata only."

  # ── Vendor-provenance hints ──

  apply_groups:
    disposition: not_applicable
    note: >
      Junos-specific concept (``set apply-groups <G>``).  Cisco
      source has no equivalent and never populates this list.

  group_content:
    disposition: not_applicable
    note: >
      Companion to apply_groups; same not-applicable status for
      Cisco as source.

# ---------------------------------------------------------------------------
# Notes on confidence and deferred items
# ---------------------------------------------------------------------------
#
# certainty=medium because:
#
#   * Keyword-stable surface (hostname / DNS / NTP / SNMP v1+v2c /
#     VLANs / interfaces / static routes / IPv4-IPv6 addressing)
#     is high-confidence — vendor docs cite identical primitives,
#     and the Cisco IOS-XE codec parses these supports today.
#
#   * VRF / routing-instances + EVPN-VXLAN are confidently
#     unsupported (Cisco capability matrix says parse-and-ignore in
#     v1; canonical schema exists, wire-up deferred).
#
#   * Local user hash compatibility is well-documented across
#     Cisco's secret 0/5/8/9 families and Junos's $1$/$5$/$6$/$sha1$
#     forms.  Lossy with confidence.
#
# Deferred items:
#
#   * Per-VRF static routes — schema gap on CanonicalStaticRoute
#     (no vrf field).  Lands alongside VRF wire-up.
#
#   * NTP per-server options / qualified-next-hop preservation —
#     canonical model is host-list-only / single-NH-only.
#
#   * TACACS+ servers — no canonical model in v1.
#
#   * Cisco's `address-family ipv4` per-AF route-targets under
#     `vrf definition` — flattens to a single rt_imports/rt_exports
#     list canonically.

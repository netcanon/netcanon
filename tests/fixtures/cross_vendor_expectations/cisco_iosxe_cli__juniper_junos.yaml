# Cross-vendor fidelity expectations: cisco_iosxe_cli -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/cisco_iosxe_cli_to_juniper_junos/
#
# DC / carrier-grade pair.  Both platforms model the same set of L2/L3 +
# overlay primitives, but the structural transformation between Cisco's
# stanza-form CLI and Junos's hierarchical set-form is substantial.
# Keyword-stable surface (hostname / DNS / NTP / static routes / SNMP
# v1+v2c / VLANs) round-trips cleanly; semantic-divergent surfaces
# (interface naming, VRF, password hashes, EVPN-VXLAN) are flagged
# lossy or unsupported.  This is one of the most-likely-real-world
# migration directions in the industry.

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: juniper_junos
  primary_use_case: >
    Cisco IOS-XE -> Juniper Junos DC migration (Catalyst / ASR ->
    QFX / EX / MX).  Stanza-to-set structural transformation is
    the dominant cost; canonical-portable feature surface is wide.

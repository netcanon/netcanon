# Cross-vendor fidelity expectations: juniper_junos -> cisco_iosxe
#
# Source: juniper_junos codec (Junos set-form CLI, rich canonical
# surface — hostname, DNS, NTP, syslog, timezone, VLANs, VXLAN VNIs,
# MAC-VRF, L3-VRF, SNMPv1/v2c/v3, local users, static routes,
# apply-groups inheritance per GAP 9b).
# Target: cisco_iosxe codec — OpenConfig NETCONF YANG XML.  This is
# the NETCONF/OpenConfig sibling of cisco_iosxe_cli (operator-paste
# CLI).  Both target the same Cisco device family; the asymmetry on
# this cross-pair is dominated by the cisco_iosxe codec being a
# Phase-0.5 stub whose render emits ONLY the openconfig-interfaces
# subtree (interfaces, IPv4, IPv6, description, enable, IANA type).
# Every other canonical category that Junos parses (hostname, DNS,
# NTP, syslog, timezone, VLANs, VXLAN, VRF, SNMP, local users, RADIUS,
# LAGs, static routes, apply-groups) lands on the canonical tree but
# is silently dropped by the cisco_iosxe target render — the codec
# walks intent.interfaces only.
#
# Direction-specific framing: for fields the cisco_iosxe codec's
# CapabilityMatrix declares `supported` but its render() never
# emits (system, vlans, snmp, static-routes), the disposition here
# is `unsupported` with reason citing the render-side wire-up gap.
# The matrix declarations are aspirational — they exist so that
# cross-codec mesh translations don't classify these paths as
# `unsupported` on the target side, but the actual emit path is
# narrow.  Honest classification beats matrix-deference.
#
# This is the mirror of cisco_iosxe__juniper_junos.yaml.  Forward
# direction is dominated by parser-side gap on cisco_iosxe (-> skews
# `not_applicable`); reverse is dominated by render-side gap (->
# skews `unsupported`).  Both reach the same operational endpoint:
# data not in output.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/juniper_junos_to_cisco_iosxe/
#
# Authored 2026-05-01 as part of Phase 3 cross-mesh audit.

meta:
  source_vendor: juniper_junos
  target_vendor: cisco_iosxe
  primary_use_case: >
    Junos source consumed into a NETCONF/OpenConfig-driven
    orchestration pipeline that uses the cisco_iosxe codec.  The
    target render emits only the openconfig-interfaces subtree, so
    this pair is appropriate ONLY for the narrow case where the
    downstream consumer needs interface-level data and accepts that
    everything else (VLANs, SNMP, RADIUS, users, LAGs, static
    routes, system services, VXLAN, VRF) must be applied separately.
    For a real DC migration from Junos to Cisco IOS-XE, route
    through cisco_iosxe_cli instead — that pair is `certified` and
    emits the full canonical surface (still imperfect on EVPN/VRF
    but structurally rich).
  certainty: medium

# Cross-vendor fidelity expectations: cisco_iosxe_cli -> mikrotik_routeros
#
# This file enumerates the per-field translation disposition for every
# top-level field on CanonicalIntent (see netcanon/migration/canonical/
# intent.py).  Each disposition is grounded in vendor documentation
# excerpts under docs/vendor-references/cisco_iosxe_cli_to_mikrotik_routeros/.
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
#
# Phase 3 follow-up pair.  Cisco IOS-XE -> MikroTik RouterOS is an
# enterprise-to-SMB/WISP migration.  The wire formats (Cisco stanza
# config vs RouterOS /export section-and-set form) and the underlying
# switching philosophy (Cisco interface-centric switchport vs
# RouterOS router-first with optional bridge) differ enough that even
# concepts both vendors model end up lossy on the cross-pair.

meta:
  source_vendor: cisco_iosxe_cli
  target_vendor: mikrotik_routeros
  primary_use_case: >
    Enterprise Cisco IOS-XE router/switch to MikroTik RouterOS
    (typical: SMB / WISP migrations replacing aging Cisco gear with
    cost-effective RouterOS hardware; or operators consolidating
    branch sites onto MikroTik for OPEX reduction).  The basic
    surface (hostname / DNS / NTP / IPv4-IPv6 addresses / static
    routes / SNMP v1/v2c) round-trips with documented losses;
    deeper features (switchport semantics, VRF, voice VLAN, EVPN-
    VXLAN) either parse-and-ignore on one codec or have no shape-
    compatible target syntax.
  certainty: medium
  references:
    - id: mikrotik_vlan
      path: docs/vendor-references/cisco_iosxe_cli_to_mikrotik_routeros/vlans.md
      title: "VLAN configuration: Cisco IOS-XE versus MikroTik RouterOS"

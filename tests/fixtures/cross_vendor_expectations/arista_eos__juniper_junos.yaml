# Cross-vendor expectations: arista_eos -> juniper_junos
#
# Schema spec: tests/fixtures/cross_vendor_expectations/README.md
# Vendor reference cache: docs/vendor-references/arista_eos_to_juniper_junos/
#
# Worked-example pair for the Phase 3a infrastructure: DC EVPN-VXLAN
# spine-leaf migration is the user's original surfacing case.


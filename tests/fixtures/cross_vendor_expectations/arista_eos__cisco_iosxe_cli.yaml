# Cross-vendor fidelity expectations: arista_eos -> cisco_iosxe_cli
#
# This file enumerates the per-field translation disposition for every
# top-level field on CanonicalIntent (see netconfig/migration/canonical/
# intent.py).  Each disposition is grounded in vendor documentation
# excerpts under docs/vendor-references/arista_eos_to_cisco_iosxe_cli/.
#
# Schema authored by Agent A in tests/fixtures/cross_vendor_expectations/
# README.md (sibling file).  Disposition vocabulary:
#   good            - field round-trips without semantic loss
#   lossy           - field round-trips with documented degradation
#   unsupported     - field is parse-and-ignore on one or both codecs
#   not_applicable  - field has no concept on the target vendor
#
# This pair is the INVERSE of cisco_iosxe_cli__arista_eos.yaml.  Most
# of the keyword-stable surface is symmetric (Arista EOS deliberately
# mirrors Cisco IOS CLI grammar) but the asymmetries differ:
#
#   * Going Arista -> Cisco IOS-XE, the source codec parses VRF
#     declarations (vrf instance) AND the per-VRF RD + RT under
#     router-bgp / vrf <name>; the Cisco IOS-XE RENDER path emits
#     vrf definition blocks with the canonical RD + RTs under
#     address-family ipv4.  This is the better direction for L3 VRF
#     fidelity (the Cisco PARSE side is parse-and-ignore but parse
#     direction is irrelevant on a one-way migration).
#
#   * Going Arista -> Cisco IOS-XE, EVPN MAC-VRF (router bgp / vlan N
#     / rd ... / route-target ...) is asymmetrically lossy: the
#     Arista parser populates instance_type="mac-vrf" routing-instance
#     records, but the Cisco IOS-XE renderer has no MAC-VRF emit path
#     (would need l2vpn-evpn instance ... or vlan configuration ...
#     forms).  Records get emitted as plain vrf definition blocks,
#     which is L3, not L2 — semantically wrong.  Operator review
#     required.
#
#   * Going Arista -> Cisco IOS-XE, VXLAN data (interface Vxlan1
#     with vlan/vrf VNI mappings + source-interface + udp-port) is
#     unsupported: Arista parses, Cisco IOS-XE renders nothing on the
#     /vxlan-vnis/* xpaths (capability matrix lists them all under
#     unsupported).
#
#   * Going Arista -> Cisco IOS-XE, the speed-hint loss runs the
#     "wrong way": Arista source has no speed token in interface
#     names so Cisco render must default the prefix.  The codec
#     emits GigabitEthernet for all Ethernet<N> ports, which under-
#     specifies on 10G+ fabrics.

meta:
  source_vendor: arista_eos
  target_vendor: cisco_iosxe_cli
  primary_use_case: >
    Arista EOS -> Cisco IOS-XE migration; high feature overlap on
    the keyword-stable surface (Arista EOS deliberately mirrors
    Cisco IOS CLI grammar).  Used when an operator standardises a
    Cisco-only fleet and absorbs an Arista deployment from a
    merger or a tier-2 datacenter consolidation.  The keyword-
    stable surface (vlans / switchport / static routes / SNMP
    v1/v2c / hostname / NTP / DNS / logging) round-trips cleanly;
    semantic-divergent surfaces (interface naming, VRF flavour,
    local user hashes, EVPN MAC-VRF, VXLAN, routing protocols)
    are flagged lossy or unsupported.
  certainty: medium
  references:
    - id: vlans
      path: docs/vendor-references/arista_eos_to_cisco_iosxe_cli/vlans.md
      title: "VLAN configuration: Arista EOS versus Cisco IOS-XE"

      title: "Interface naming: Arista EOS versus Cisco IOS-XE"
      source_url: "https://www.arista.com/en/um-eos/eos-data-transfer"
      retrieved: "2026-04-30"
    - id: ip_addressing
      path: docs/vendor-references/arista_eos_to_cisco_iosxe_cli/ip_addressing.md
      title: "IPv4 / IPv6 addressing: Arista EOS versus Cisco IOS-XE"
      source_url: "https://www.arista.com/en/um-eos/eos-ipv4"

#config-version=FGT60E-7.4.1-FW-build2653-240417:opmode=0:vdom=0:user=admin
#conf_file_ver=14285
#buildno=2653
#global_vdom=1
config system global
    set admintimeout 30
    set hostname "fgt-edge-01"
    set timezone 22
    set gui-theme green
end
config system dns
    set primary 1.1.1.1
    set secondary 8.8.8.8
end
config system ntp
    set ntpsync enable
    set type custom
    config ntpserver
        edit 1
            set server "pool.ntp.org"
        next
        edit 2
            set server "time.google.com"
        next
    end
end
config system interface
    edit "port1"
        set vdom "root"
        set mode static
        set ip 198.51.100.2 255.255.255.252
        set allowaccess ping https ssh
        set alias "WAN uplink"
        set role wan
        set status up
    next
    edit "port2"
        set vdom "root"
        set mode static
        set ip 192.168.10.1 255.255.255.0
        set alias "LAN"
        set role lan
        set status up
    next
    edit "port3"
        set vdom "root"
        set alias "DMZ reserved"
        set status down
    next
    edit "port2.10"
        set vdom "root"
        set type vlan
        set interface "port2"
        set vlanid 10
        set alias "USERS"
        set ip 192.168.11.1 255.255.255.0
        set status up
    next
end
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 198.51.100.1
        set device "port1"
    next
    edit 2
        set dst 10.100.0.0 255.255.255.0
        set gateway 192.168.10.254
        set device "port2"
    next
end

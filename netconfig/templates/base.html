<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NetConfig{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    nav { background: #1a1a2e; padding: .75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #eee; text-decoration: none; font-size: .95rem; }
    nav a:hover { color: #fff; text-decoration: underline; }
    nav a.active { color: #fff; border-bottom: 2px solid #7eb8f7; padding-bottom: 2px; }
    nav .brand { color: #7eb8f7; font-weight: bold; font-size: 1.1rem; margin-right: auto; text-decoration: none; }
    nav .brand:hover { color: #a8d0ff; text-decoration: none; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.25rem; font-size: 1.5rem; }
    h2 { margin: 1.5rem 0 .75rem; font-size: 1.15rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th { background: #e8e8f0; text-align: left; padding: .5rem .75rem; font-size: .85rem; }
    td { padding: .5rem .75rem; font-size: .9rem; border-top: 1px solid #eee; vertical-align: top; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .8rem; font-weight: 600; }
    .badge-failed  { background: #f8d7da; color: #721c24; }
    .badge-running { background: #fff3cd; color: #856404; }
    .badge-pending { background: #e2e3e5; color: #383d41; }
    .badge-completed { background: #d4edda; color: #155724; }
    .badge-partial { background: #ffeaa7; color: #7a5d00; }
    form { background: #fff; padding: 1.25rem; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .form-row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: .75rem; }
    .form-group { display: flex; flex-direction: column; gap: .25rem; }
    label { font-size: .8rem; font-weight: 600; color: #555; }
    input, select { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 4px; font-size: .9rem; }
    input:focus, select:focus { outline: 2px solid #7eb8f7; border-color: transparent; }
    button { padding: .45rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: .9rem; font-weight: 600; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2a2a4e; }
    .btn-secondary { background: #e2e3e5; color: #383d41; }
    .btn-secondary:hover:not(:disabled) { background: #d0d0d8; }
    .btn-danger { background: #dc3545; color: #fff; font-size: .8rem; padding: .3rem .7rem; }
    .btn-danger:hover:not(:disabled) { background: #c82333; }
    .empty-msg { color: #888; font-style: italic; padding: 1rem 0; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; overflow: auto; font-size: .85rem; line-height: 1.5; }
    .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .alert-info { background: #d1ecf1; color: #0c5460; }
    /* Config viewer modal */
    #_config-viewer { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:10000; align-items:center; justify-content:center; }
    #_config-viewer-box { background:#fff; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,.3); width:min(800px,94vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
    #_config-viewer-header { display:flex; align-items:center; padding:.5rem 1rem; background:#1a1a2e; color:#eee; gap:.5rem; flex-wrap:wrap; }
    #_config-viewer-title { flex:1 1 180px; font-family:monospace; font-size:.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #_config-viewer-search { background:#2c2c44; color:#eee; border:1px solid #555; border-radius:3px;
                             padding:.2rem .45rem; font-size:.8rem; width:150px; }
    #_config-viewer-search:focus { outline:1px solid #7eb8f7; border-color:#7eb8f7; }
    #_config-viewer-search-count { font-size:.75rem; color:#bbb; min-width:4.5rem; text-align:center;
                                   font-family:monospace; }
    .cv-nav-btn { background:transparent; color:#eee; font-size:.85rem; padding:.15rem .4rem;
                  border:1px solid #555; border-radius:3px; cursor:pointer; font-weight:normal; }
    .cv-nav-btn:hover:not(:disabled) { background:#333; }
    .cv-nav-btn:disabled { opacity:.4; cursor:not-allowed; }
    #_config-viewer-box pre { flex:1; overflow:auto; margin:0; border-radius:0; white-space:pre; }
    /* Syntax highlighting — VS Code "Dark+" inspired palette */
    #_config-viewer-pre .tok-comment { color:#6a9955; font-style:italic; }
    #_config-viewer-pre .tok-keyword { color:#569cd6; font-weight:600; }
    #_config-viewer-pre .tok-string  { color:#ce9178; }
    #_config-viewer-pre .tok-ip      { color:#b5cea8; }
    #_config-viewer-pre .tok-number  { color:#b5cea8; }
    #_config-viewer-pre .tok-tag     { color:#569cd6; }
    #_config-viewer-pre .tok-attr    { color:#9cdcfe; }
    /* Search highlighting */
    #_config-viewer-pre mark         { background:#665a00; color:#fff3b0; border-radius:2px; padding:0 1px; }
    #_config-viewer-pre mark.current { background:#d4a017; color:#1e1e1e; outline:1px solid #ffe066; }
  </style>
</head>
<body>
  <nav data-testid="nav">
    <a href="/" class="brand" data-testid="nav-brand">NetConfig</a>
    <a href="/"            data-testid="nav-home"        {% if active_page == 'home' %}class="active" aria-current="page"{% endif %}>Dashboard</a>
    <a href="/devices"     data-testid="nav-devices"     {% if active_page == 'devices' %}class="active" aria-current="page"{% endif %}>Devices</a>
    <a href="/jobs"        data-testid="nav-jobs"        {% if active_page == 'jobs' %}class="active" aria-current="page"{% endif %}>Jobs</a>
    <a href="/schedules"   data-testid="nav-schedules"   {% if active_page == 'schedules' %}class="active" aria-current="page"{% endif %}>Schedules</a>
    <a href="/configs"     data-testid="nav-configs"     {% if active_page == 'configs' %}class="active" aria-current="page"{% endif %}>Configs</a>
    <a href="/definitions" data-testid="nav-definitions" {% if active_page == 'definitions' %}class="active" aria-current="page"{% endif %}>Definitions</a>
    <a href="/migrate"     data-testid="nav-migrate"     {% if active_page == 'migrate' %}class="active" aria-current="page"{% endif %}>Migrate</a>
    <a href="/docs"        data-testid="nav-api-docs">API Docs</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Config viewer modal -->
  <div id="_config-viewer" data-testid="config-viewer"
       role="dialog" aria-labelledby="_config-viewer-title" aria-modal="true"
       onclick="if(event.target===this)closeConfigViewer()">
    <div id="_config-viewer-box">
      <div id="_config-viewer-header">
        <span id="_config-viewer-title" data-testid="config-viewer-title"></span>
        <input type="search" id="_config-viewer-search"
               data-testid="config-viewer-search"
               placeholder="Search…" aria-label="Search within config"
               autocomplete="off" spellcheck="false">
        <span id="_config-viewer-search-count"
              data-testid="config-viewer-search-count"
              aria-live="polite"></span>
        <button type="button" class="cv-nav-btn"
                data-testid="config-viewer-search-prev"
                onclick="configViewerNav(-1)" aria-label="Previous match"
                title="Previous match (Shift+Enter)">&#9650;</button>
        <button type="button" class="cv-nav-btn"
                data-testid="config-viewer-search-next"
                onclick="configViewerNav(1)" aria-label="Next match"
                title="Next match (Enter)">&#9660;</button>
        <button type="button" class="cv-nav-btn"
                data-testid="config-viewer-close"
                onclick="closeConfigViewer()" aria-label="Close"
                style="font-size:1.1rem">&#10005;</button>
      </div>
      <pre id="_config-viewer-pre" data-testid="config-viewer-content">Loading&#8230;</pre>
    </div>
  </div>

  <!-- Job progress panel (global — persists across navigation & reloads) -->
  <style>
    #_job-progress {
      position:fixed; bottom:1rem; right:1rem; width:min(420px,92vw);
      z-index:9998; background:#fff; border-radius:8px;
      box-shadow:0 4px 18px rgba(0,0,0,.25); font-size:.85rem;
      overflow:hidden; border:1px solid #d0d4e0;
      /* Default display is driven by inline style on the element +
         JS — don't set display:none here, it defeats .style.display=''. */
    }
    #_job-progress-header {
      display:flex; align-items:center; gap:.5rem; padding:.5rem .75rem;
      background:#1a1a2e; color:#eee; cursor:pointer; user-select:none;
    }
    #_job-progress-header:hover { background:#2a2a4e; }
    #_job-progress-summary { flex:1; font-family:monospace; font-size:.82rem; }
    #_job-progress-chevron { font-size:.7rem; transition:transform .15s; }
    #_job-progress-chevron.open { transform:rotate(180deg); }
    #_job-progress-body {
      max-height:40vh; overflow:auto; padding:.25rem 0;
    }
    .jp-row {
      display:flex; align-items:center; gap:.5rem; padding:.3rem .75rem;
      border-top:1px solid #f0f0f0; font-size:.82rem;
    }
    .jp-row:first-child { border-top:none; }
    .jp-icon {
      width:1rem; flex:0 0 1rem; text-align:center; font-weight:700;
      font-family:monospace;
    }
    .jp-icon-queued   { color:#888; }
    .jp-icon-running  { color:#856404; animation:jp-spin 1.2s linear infinite; }
    .jp-icon-success  { color:#155724; }
    .jp-icon-failed   { color:#721c24; }
    @keyframes jp-spin { to { transform:rotate(360deg); } }
    .jp-host { flex:1; font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .jp-state { color:#666; font-size:.75rem; text-transform:uppercase; letter-spacing:.03em; }
    .jp-duration { color:#aaa; font-size:.72rem; font-family:monospace; }
    .jp-error {
      font-size:.72rem; color:#721c24; padding:.1rem .75rem .3rem 2.25rem;
      font-family:monospace; overflow:hidden; text-overflow:ellipsis;
      white-space:nowrap;
    }
    #_job-progress-footer {
      display:none; padding:.4rem .75rem; background:#f5f5f8;
      border-top:1px solid #e0e0e8; gap:.5rem; align-items:center;
      justify-content:flex-end; font-size:.8rem;
    }
    #_job-progress-footer a { color:#1a1a2e; text-decoration:none; margin-right:auto; }
    #_job-progress-footer a:hover { text-decoration:underline; }
  </style>
  <div id="_job-progress"
       data-testid="job-progress-panel"
       role="region" aria-label="Backup job progress"
       aria-live="polite"
       style="display:none">
    <div id="_job-progress-header"
         data-testid="job-progress-header"
         onclick="toggleJobProgress()">
      <strong id="_job-progress-job-id"
              data-testid="job-id-display"></strong>
      <span id="_job-progress-summary"
            data-testid="job-progress-summary"
            aria-label="Job progress summary"></span>
      <span id="_job-progress-status"
            data-testid="job-status-display"
            style="display:none"></span>
      <span id="_job-progress-chevron"
            data-testid="job-progress-toggle"
            aria-hidden="true">&#9660;</span>
    </div>
    <div id="_job-progress-body"
         data-testid="job-progress-body"></div>
    <div id="_job-progress-footer"
         data-testid="job-progress-footer">
      <a href="#" id="_job-progress-view-link"
         data-testid="job-progress-view-link">View full job details</a>
      <button type="button" class="btn-secondary"
              data-testid="job-progress-dismiss"
              onclick="dismissJobProgress()"
              style="padding:.2rem .7rem;font-size:.78rem">Dismiss</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="_toast" data-testid="toast" role="status" aria-live="polite" aria-atomic="true"
       style="position:fixed;bottom:1.5rem;right:1.5rem;max-width:360px;z-index:9999;display:none;
              padding:.75rem 1rem;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);
              font-size:.9rem;line-height:1.4">
    <span id="_toast-msg"></span>
  </div>

  <script>
  /* ── Localize UTC timestamps ── */
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-utc]').forEach(el => {
      try { el.textContent = new Date(el.dataset.utc).toLocaleString(); } catch (_) {}
    });
  });

  /* ── Toast notifications ── */
  function showToast(msg, type) {
    var colours = {
      info:    { bg: '#d1ecf1', fg: '#0c5460' },
      error:   { bg: '#f8d7da', fg: '#721c24' },
      success: { bg: '#d4edda', fg: '#155724' }
    };
    var c = colours[type] || colours.info;
    var toast = document.getElementById('_toast');
    var msgEl = document.getElementById('_toast-msg');
    toast.style.background = c.bg;
    toast.style.color = c.fg;
    msgEl.textContent = msg;
    toast.style.display = '';
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.style.display = 'none'; }, 4000);
  }
  /* ── Config viewer (extracted to _partials/config-viewer.js) ── */
  {% include "_partials/config-viewer.js" %}


  /* ── Job progress panel (extracted to _partials/job-progress.js) ── */
  {% include "_partials/job-progress.js" %}

  /* ── Config downloader (WebView-safe blob approach) ── */
  async function downloadConfig(filename) {
    try {
      var res = await fetch('/api/v1/configs/' + encodeURIComponent(filename));
      if (!res.ok) { showToast('Download failed: ' + res.statusText, 'error'); return; }
      var blob = new Blob([await res.text()], { type: 'text/plain' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = filename; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    } catch(e) { showToast('Download error: ' + e.message, 'error'); }
  }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>

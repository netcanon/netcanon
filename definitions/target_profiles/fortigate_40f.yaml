# FortiGate 40F (FG-40F)
# 5 × GE RJ45 total — front panel silkscreen: WAN, A, 1, 2, 3
#     CLI names:                              wan, a, lan1, lan2, lan3
#
# The `a` port defaults to being a member of the FortiLink software
# switch.  lan1/lan2/lan3 default to being members of the `lan`
# virtual-switch (hard-switch).
#
# Validation: default-config naming corroborated by Fortinet support
# post at
# https://community.fortinet.com/t5/Support-Forum/40F-Physical-ports-hard-switch-Disambiguation-Default-config/m-p/277431
# which shows a verbatim `config system virtual-switch` block from a
# factory-default 40F.  HIGH confidence on interface naming — do NOT
# use `internal1-4` / `port1-5` / `lan4` / `wan1`/`wan2` (common
# copy-paste mistakes from reseller product pages; they don't
# correspond to the actual factory-default CLI).
vendor: fortigate
model: 40F
display_name: "FortiGate 40F (FG-40F)"
device_class: firewall
stacking: ""
ports:
  - {id: "wan", kind: uplink, speed: gig}
  - {id: "a", kind: physical, speed: gig, notes: "FortiLink default"}
  - {range: "lan1-3", kind: physical, speed: gig, notes: "lan hard-switch default"}
# FortiGate LAGs are user-named; leave prefix empty to signal
# "free-form LAG name".
lags: {max: 4, prefix: ""}
# FortiGate 40F VLAN cap: 512 VLAN interfaces, *per-VDOM*, sourced
# from Fortinet's Maximum Values Table
# (https://docs.fortinet.com/max-value-table → FortiGate 40F,
# `system.interface` row filtered by `type=vlan`).  The Max Values
# Table is a FortiOS-version-scoped document — Fortinet publishes a
# fresh table for each firmware release (7.0 / 7.2 / 7.4 / 7.6) and
# values can drift by ±1 between releases.  512 is the conservative
# floor for the FortiOS 7.x line on the 40F class and matches the
# FortiOS 7.2 publication; re-verify against the live Max Values
# Table if operators report their device accepting more VLANs than
# the fit-check banner suggests.  Earlier comment incorrectly said
# "across all VDOMs" — Max Values Table rows are per-VDOM limits,
# clarified here.
#
# max_local_users intentionally unset — the FortiGate admin-account
# cap varies materially by FortiOS version and isn't a reliable
# datasheet number.
# (Post-Option-A note: the fortigate_cli codec DOES round-trip
# CanonicalLocalUser via ``config system admin`` blocks, so renames
# reach rendered output.  The earlier compat-banner rationale for
# leaving this unset no longer applies.)
max_vlans: 512
max_vlans_source: "FortiOS 7.2 Maximum Values Table, per-VDOM system.interface type vlan"

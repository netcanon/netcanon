# Cisco Catalyst 9300-24P
# 24 × 10/100/1000 BASE-T RJ45 + PoE+ (30W/port, 445W budget)
# 1 × network module slot — assumes C9300-NM-8X (8× 10G SFP+)
# StackWise-480, 48 Port-channels max
vendor: cisco_iosxe
model: C9300-24P
display_name: "Cisco Catalyst 9300-24P (1G + PoE+)"
device_class: switch
stacking: stackwise
ports:
  - {range: "GigabitEthernet1/0/1-24", kind: physical, speed: gig, poe: true}
  - {range: "TenGigabitEthernet1/1/1-8", kind: uplink, speed: 10gig, sfp: true, notes: "NM-8X slot"}
  - {id: "GigabitEthernet0/0", kind: mgmt, speed: gig, notes: "OOBM (Mgmt-vrf)"}
lags: {max: 48, prefix: Port-channel}

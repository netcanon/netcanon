# Cisco Catalyst 9300-24UX
# 24 × Multigigabit Ethernet (100M/1G/2.5G/5G/10G) + UPOE (90W/port, 90W budget)
# 1 × network module slot (C9300-NM-*): typically 8× 10G SFP+ or
#   2× 40G QSFP or 2× 25G SFP28
# StackWise-480 capable (up to 8 members)
# 48 etherchannels max, prefix "Port-channel"
vendor: cisco_iosxe
model: C9300-24UX
display_name: "Cisco Catalyst 9300-24UX"
device_class: switch
stacking: stackwise
ports:
  # --- 24 × Multigig RJ45 (stack 1 assumed; caller specifies stack
  # member via the port id when needed) ---
  - {id: "GigabitEthernet1/0/1",   kind: physical, speed: 10gig, poe: true, notes: "mGig 100M-10G UPOE"}
  - {id: "GigabitEthernet1/0/2",   kind: physical, speed: 10gig, poe: true, notes: "mGig 100M-10G UPOE"}
  - {id: "GigabitEthernet1/0/3",   kind: physical, speed: 10gig, poe: true, notes: "mGig 100M-10G UPOE"}

# Arista DCS-7050CX3-32S
# 32 x 100GbE QSFP28 + 2 x 10GbE SFP+.  Fixed 1U leaf/spine for
# 100G data-center fabrics.  Each QSFP28 port supports 4x25G
# breakout (Ethernet<N>/1..4) for EVPN leaf roles.
vendor: arista_eos
model: DCS-7050CX3-32S
display_name: "Arista DCS-7050CX3-32S (32x 100G QSFP28 + 2x 10G)"
device_class: switch
stacking: ""
ports:
  - {range: "Ethernet1-32", kind: uplink, speed: 100gig, sfp: true, notes: "100G QSFP28 cage (4x25G breakout capable)"}
  - {range: "Ethernet33-34", kind: physical, speed: 10gig, sfp: true, notes: "10G SFP+ (admin / management data plane)"}
  - {id: "Management1", kind: mgmt, speed: gig, notes: "OOBM"}
lags: {max: 64, prefix: Port-Channel}
max_vlans: 4094
max_vlans_source: "Arista EOS 4.x VLAN capacity per platform datasheet"

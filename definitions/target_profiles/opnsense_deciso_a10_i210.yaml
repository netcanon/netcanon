# Deciso Netboard A10 — Gen2 (DEC670 / DEC690 family)
# 4 × 1GbE via Intel I210 (flashless, copper)
#
# FreeBSD driver: igb(4) — Intel(R) I210/I211 PCIe
# Default BSD iface names: igb0, igb1, igb2, igb3
#
# NOTE on "A10" naming: Deciso has shipped at least four Netboard
# variants under the "A10" label across generations (1x 82574L
# quad, 2x I210 quad, 3x I210/I211 + 2x 10G AMD, and 2.5GbE DEC600
# series).  This profile targets the **I210 GbE Gen2** specifically.
# If your A10 has SFP+ cages or 2.5GbE copper, use a different
# profile (see opnsense_deciso_a10_i210_sfpplus.yaml for Gen3).
#
# Validation: bsd-hardware.info probe e0b8ceecae shows the I210
# generation emitting igb0..igb3 on a real Deciso Netboard A10.
# HIGH confidence on interface naming.  OPNsense core issue #7133
# confirms the <if>igbN</if> XML naming pattern.
vendor: opnsense
model: Netboard-A10-I210
display_name: "Deciso Netboard A10 (4x I210 GbE — Gen2)"
device_class: firewall
stacking: ""
ports:
  - {range: "igb0-3", kind: physical, speed: gig, notes: "Intel I210 copper GbE"}
# OPNsense / FreeBSD LAG uses the lagg(4) driver.
lags: {max: 4, prefix: lagg}

# OPNsense runs FreeBSD's netgraph VLAN stack; the only hard limit
# on VLAN IDs is the 802.1Q protocol ceiling (1-4094).  max_local_users
# intentionally unset \u2014 the OPNsense codec doesn't yet round-trip
# <system><user> blocks, so the local-users pane surfaces a compat
# banner (codec.unsupported_rename_categories) rather than a fit-check.
max_vlans: 4094

# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Wait 7 days after a release before opening the update PR.  Lets
    # upstream yank / hotfix windows close before we adopt; mitigates
    # the rare case of a compromised release tag being noticed and
    # patched within hours.  Closes zizmor dependabot-cooldown #36.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions (.github/workflows/*.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Wait 7 days after release.  Stage 1C's initial suggestion was
    # 3 days (actions release infrequently), but zizmor's rule has
    # an internal minimum of 7 -- re-fires alert #81 at default-days
    # < 7.  Bumping to 7 for uniformity across all 3 ecosystems is
    # cheaper than dismissal-with-justification.  Closes zizmor
    # dependabot-cooldown #37, #81.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base image (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    # Base-image stability -- wait 7 days for upstream Debian
    # backports to land + Trivy to scan.  Closes zizmor
    # dependabot-cooldown #38.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"

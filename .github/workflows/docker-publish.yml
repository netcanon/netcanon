name: Docker — build & publish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'    # rc / alpha / beta pre-release tags
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write          # cosign keyless signing via Sigstore + GitHub OIDC
  security-events: write   # Trivy SARIF upload to Code Scanning

env:
  # GHCR is the primary, signed, SBOM-attested registry.
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub is a convenience mirror — same image bytes, same tags,
  # no cosign signature or SBOM attestation.  Operators in regulated
  # environments should pull from GHCR (see SECURITY.md).
  DOCKERHUB_IMAGE: docker.io/netcanon/netcanon
  # Opt-in to Node.js 24 for JavaScript actions ahead of the June 2026
  # forced cutover (https://github.blog/changelog/2025-09-19-deprecation-
  # of-node-20-on-github-actions-runners/).  Surfaces any Node 24
  # incompatibility now rather than at the cutover deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-publish:
    name: Build, push, sign, attest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Registry logins use explicit secrets passed to
          # docker/login-action; cosign uses keyless OIDC; no git push
          # from this job.  Clear the token-in-.git/config default.
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata + tags
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          # Two images = same tag patterns applied to both registries.
          # The build-push-action below pushes a single image manifest
          # to both registries in one step (no double-build cost).
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Semver-derived (no `v` prefix), e.g. `0.1.0-rc4` or `0.1.0`.
            # Matches the convention of official Docker Hub images
            # (`python:3.13-slim`, `node:20`, etc.) and the PyPI version
            # string.  Earlier `type=ref,event=tag` line was removed
            # (it emitted a redundant `v`-prefixed copy of the same
            # image — `v0.1.0-rc3` AND `0.1.0-rc3` for one release).
            type=semver,pattern={{version}}
            # Major.minor floating tag (only emits for stable releases
            # by default; pre-releases like `-rc4` are skipped).
            type=semver,pattern={{major}}.{{minor}}
            # `:latest` updates on every release-tag push.  Earlier
            # `enable={{is_default_branch}}` gate suppressed `:latest`
            # entirely on tag-triggered runs (the ref is the tag, not
            # `main`, so `is_default_branch` evaluated false).  The
            # README + CHANGELOG both document `docker pull
            # netcanon/netcanon:latest` as the recommended quickstart;
            # `:latest` needs to actually exist for that to work.
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass the resolved package version into the builder stage as
          # SETUPTOOLS_SCM_PRETEND_VERSION_FOR_NETCANON.  metadata-action's
          # `version` output is the semver-parsed tag (e.g. `0.1.0-rc5`
          # for tag `v0.1.0-rc5`).  setuptools_scm consumes this in the
          # builder stage in lieu of reading git tags directly (.git/ is
          # excluded from the Docker context per .dockerignore).
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_NETCANON=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: false   # we generate via syft below for richer SPDX output

      # Trivy scans the published image for CVEs in OS-package layers
      # (Debian/Alpine under python:3.x-slim), the installed Python
      # wheel set, and any secrets accidentally baked into image
      # layers.  CodeQL scans source; this scans the artifact we ship.
      # Results upload as SARIF to Security → Code scanning under the
      # `trivy-image` category (distinct from CodeQL findings).
      #
      # `exit-code: 0` makes findings informational — they don't fail
      # the publish.  Triage via the Security tab.  Flip to `1` with
      # an explicit severity list to gate releases on CRITICAL CVEs.
      #
      # `ignore-unfixed: true` filters out CVEs with no upstream patch
      # available — they'd just be noise we can't act on until the
      # base image (or upstream maintainer) ships a fix.
      - name: Scan published image with Trivy
        # Pinned at v0.36.0 (latest stable, 2026-04-22) — clears
        # GHSA-?? / CVE-2026-33634 "Trivy ecosystem supply chain was
        # briefly compromised" advisory.  Vulnerable ranges were
        # `< 0.35.0` and exact `= 0.69.4`.  Do NOT bump to 0.69.x
        # without re-confirming v0.69.4 has been remediated.  The
        # action repo tags use a `v` prefix (`v0.24.0` not `0.24.0`)
        # — earlier @0.24.0 reference would have failed to resolve.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4.35.4
        if: always()      # upload even if Trivy failed, so partial findings still surface
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign published image (GHCR only, keyless via Sigstore + GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        # Cosign signatures attach as separate OCI artifacts at the
        # registry where the image lives.  We only sign the GHCR copy
        # — Docker Hub is a convenience mirror; operators who need
        # attested provenance pull from GHCR.  Filtering by registry
        # prefix avoids "double-signing" the mirror with no value-add.
        run: |
          for tag in ${TAGS}; do
            case "${tag}" in
              ghcr.io/*)
                echo "Signing ${tag}"
                cosign sign --yes "${tag}@${DIGEST}"
                ;;
              *)
                echo "Skipping cosign for ${tag} (mirror, not signed)"
                ;;
            esac
          done

      - name: Generate SBOM (SPDX JSON) via syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attach SBOM as a cosign attestation
        env:
          IMAGE_DIGEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_DIGEST}"

      - name: Verify signature (post-publish smoke test)
        env:
          IMAGE_DIGEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign verify "${IMAGE_DIGEST}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

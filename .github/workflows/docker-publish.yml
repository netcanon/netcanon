name: Docker — build & publish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'    # rc / alpha / beta pre-release tags
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write     # cosign keyless signing via Sigstore + GitHub OIDC

env:
  # GHCR is the primary, signed, SBOM-attested registry.
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub is a convenience mirror — same image bytes, same tags,
  # no cosign signature or SBOM attestation.  Operators in regulated
  # environments should pull from GHCR (see SECURITY.md).
  DOCKERHUB_IMAGE: docker.io/netcanon/netcanon
  # Opt-in to Node.js 24 for JavaScript actions ahead of the June 2026
  # forced cutover (https://github.blog/changelog/2025-09-19-deprecation-
  # of-node-20-on-github-actions-runners/).  Surfaces any Node 24
  # incompatibility now rather than at the cutover deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-publish:
    name: Build, push, sign, attest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata + tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Two images = same tag patterns applied to both registries.
          # The build-push-action below pushes a single image manifest
          # to both registries in one step (no double-build cost).
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Semver-derived (no `v` prefix), e.g. `0.1.0-rc4` or `0.1.0`.
            # Matches the convention of official Docker Hub images
            # (`python:3.13-slim`, `node:20`, etc.) and the PyPI version
            # string.  Earlier `type=ref,event=tag` line was removed
            # (it emitted a redundant `v`-prefixed copy of the same
            # image — `v0.1.0-rc3` AND `0.1.0-rc3` for one release).
            type=semver,pattern={{version}}
            # Major.minor floating tag (only emits for stable releases
            # by default; pre-releases like `-rc4` are skipped).
            type=semver,pattern={{major}}.{{minor}}
            # `:latest` updates on every release-tag push.  Earlier
            # `enable={{is_default_branch}}` gate suppressed `:latest`
            # entirely on tag-triggered runs (the ref is the tag, not
            # `main`, so `is_default_branch` evaluated false).  The
            # README + CHANGELOG both document `docker pull
            # netcanon/netcanon:latest` as the recommended quickstart;
            # `:latest` needs to actually exist for that to work.
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: false   # we generate via syft below for richer SPDX output

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image (GHCR only, keyless via Sigstore + GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        # Cosign signatures attach as separate OCI artifacts at the
        # registry where the image lives.  We only sign the GHCR copy
        # — Docker Hub is a convenience mirror; operators who need
        # attested provenance pull from GHCR.  Filtering by registry
        # prefix avoids "double-signing" the mirror with no value-add.
        run: |
          for tag in ${TAGS}; do
            case "${tag}" in
              ghcr.io/*)
                echo "Signing ${tag}"
                cosign sign --yes "${tag}@${DIGEST}"
                ;;
              *)
                echo "Skipping cosign for ${tag} (mirror, not signed)"
                ;;
            esac
          done

      - name: Generate SBOM (SPDX JSON) via syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      - name: Attach SBOM as a cosign attestation
        env:
          IMAGE_DIGEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_DIGEST}"

      - name: Verify signature (post-publish smoke test)
        env:
          IMAGE_DIGEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign verify "${IMAGE_DIGEST}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

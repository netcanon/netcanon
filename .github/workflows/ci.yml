name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt-in to Node.js 24 for JavaScript actions ahead of the June 2026
  # forced cutover (https://github.blog/changelog/2025-09-19-deprecation-
  # of-node-20-on-github-actions-runners/).  Surfaces any Node 24
  # incompatibility now rather than at the cutover deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -q --no-header

      - name: Run integration tests
        run: pytest tests/integration -q --no-header

  build-distribution:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

  docker-build-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest

    # Builds the published Dockerfile and verifies the resulting image
    # boots and serves /health.  Catches Dockerfile-side regressions
    # (base image bumps, COPY mistakes, entrypoint breakage) on PRs
    # rather than at tag-time when docker-publish.yml fires.
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t netcanon-smoke:pr .

      - name: Boot image and check /health
        run: |
          docker run -d --name smoke -p 8000:8000 netcanon-smoke:pr
          # Poll /health for up to 60 seconds.  HEALTHCHECK in the
          # Dockerfile has start-period 10s, so ~12s is the typical
          # ready time; budget extra for slow CI runners.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo
              echo "Smoke test passed."
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test FAILED — container never became healthy."
          echo "--- container logs ---"
          docker logs smoke
          exit 1

      - name: Clean up
        if: always()
        run: docker rm -f smoke || true

name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt-in to Node.js 24 for JavaScript actions ahead of the June 2026
  # forced cutover (https://github.blog/changelog/2025-09-19-deprecation-
  # of-node-20-on-github-actions-runners/).  Surfaces any Node 24
  # incompatibility now rather than at the cutover deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Default-deny GITHUB_TOKEN scope.  All ci.yml jobs are read-only:
# pytest, sdist+wheel build (artefacts stay on the runner), and a
# Docker build smoke test (image stays on the runner).  None push
# to registries, write to the repo, or upload to releases.  Child
# jobs inherit; no per-job override needed.
permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags needed for setuptools_scm to derive the
          # package version.  Default is shallow (depth=1, no tags) which
          # would make `pip install -e .` fail with "no tags found" or
          # produce a `0.0.0` fallback version that misleads operators.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -q --no-header

      - name: Run integration tests
        run: pytest tests/integration -q --no-header

  build-distribution:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags needed for setuptools_scm to derive the
          # package version.  Default is shallow (depth=1, no tags) which
          # would make `pip install -e .` fail with "no tags found" or
          # produce a `0.0.0` fallback version that misleads operators.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

  docker-build-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest

    # Builds the published Dockerfile and verifies the resulting image
    # boots and serves /health.  Catches Dockerfile-side regressions
    # (base image bumps, COPY mistakes, entrypoint breakage) on PRs
    # rather than at tag-time when docker-publish.yml fires.
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags needed for setuptools_scm to derive the
          # package version.  Default is shallow (depth=1, no tags) which
          # would make `pip install -e .` fail with "no tags found" or
          # produce a `0.0.0` fallback version that misleads operators.
          fetch-depth: 0

      - name: Build image
        run: docker build -t netcanon-smoke:pr .

      - name: Boot image and check /health + dashboard renders
        run: |
          docker run -d --name smoke -p 8000:8000 netcanon-smoke:pr
          # Poll /health for up to 60 seconds.  HEALTHCHECK in the
          # Dockerfile has start-period 10s, so ~12s is the typical
          # ready time; budget extra for slow CI runners.
          health_ready=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              health_ready=1
              break
            fi
            sleep 2
          done
          if [ "${health_ready}" -ne 1 ]; then
            echo "Smoke test FAILED — container never became healthy."
            echo "--- container logs ---"
            docker logs smoke
            exit 1
          fi
          echo
          echo "Health check passed.  Now verifying the dashboard"
          echo "renders (catches packaging-bug class where /health"
          echo "works but Jinja templates are missing from the wheel —"
          echo "the v0.1.0-rc1/rc2 regression that motivated this check)."
          if curl -fsS -o /dev/null http://127.0.0.1:8000/; then
            echo "Smoke test passed (health + dashboard render)."
            exit 0
          fi
          echo "FAIL: /health returned 200 but / did not."
          echo "Likely cause: a template file (or partial under"
          echo "templates/_partials/) is missing from the built wheel"
          echo "— check pyproject.toml [tool.setuptools.package-data]"
          echo "and confirm every templates/* path the renderer needs"
          echo "is covered by the glob list."
          echo "--- container logs ---"
          docker logs smoke
          exit 1

      - name: Clean up
        if: always()
        run: docker rm -f smoke || true

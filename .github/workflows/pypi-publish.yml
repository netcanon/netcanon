name: PyPI — build & publish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'    # rc / alpha / beta pre-release tags
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt-in to Node.js 24 for JavaScript actions ahead of the June 2026
  # forced cutover (https://github.blog/changelog/2025-09-19-deprecation-
  # of-node-20-on-github-actions-runners/).  Surfaces any Node 24
  # incompatibility now rather than at the cutover deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags for setuptools_scm to derive the package
          # version from the triggering tag.  Without this, the wheel
          # builds with the fallback_version (`0.0.0`) and PyPI gets a
          # garbage version string.
          fetch-depth: 0
          # PyPI publish uses OIDC Trusted Publishing (no token to
          # persist); no git push from this job either.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          # No `cache: "pip"` -- this is a single-shot publish job
          # (runs once per release tag with a cold dep tree); the
          # cache buys nothing and would otherwise expand the
          # cache-poisoning attack surface flagged by zizmor #77.

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata via twine
        run: python -m twine check dist/*

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing — OIDC, no API token)
    needs: [build]
    runs-on: ubuntu-latest
    # GitHub Actions environment for the OIDC binding to PyPI.  Operator
    # creates the `pypi` environment in repo settings; PyPI's trusted
    # publisher must reference this exact name.
    environment:
      name: pypi
      url: https://pypi.org/p/netcanon
    permissions:
      id-token: write     # mandatory for Trusted Publishing

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 (branch ref; Dependabot will not auto-bump — manual SHA refresh required)
        # No `with:` block needed — Trusted Publishing infers everything
        # from the OIDC token + the environment configured on PyPI.
